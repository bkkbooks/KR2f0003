body:
  text: 太宗皇帝實録卷第二十七起太平興國八年十一月盡十二月十一月壬子朔制曰平章百姓唐尭所以疇咨緫領衆職漢宣由是致治非賢㒺乂得士則昌聿求經濟之才授以弼諧之任枚卜斯允成命以行刑部尚書参知政事宋琪宇量冲深規模宏逺工部尚書参知政事李昉欝有公望乆服大僚而皆罄竭謨明禆賛樞軸君臣之際人無間言公家之事行有餘力修經術以自輔體方直而靡渝是冝擢正台衡職兹調爕朕所注意不假審象之求汝旣致君更思𥙷衮之效唯用盡已佇兹沃心欽若訓詞往踐乃位並守本官同中書門下平章事加金紫光禄大夫琪封廣平侯郡侯昉封隴西郡侯以皇姪孫惟吉為左監門衛将軍封平陽郡侯惟正為左千牛衛将軍惟忠惟貞並為右千牛䘙将軍癸丑詔曰先是開寳二年八月丁亥詔書應廣南東西川峡路諸州民祖父母父母在子孫别籍異財者棄市自今並除之論如律泗州言僧伽塔白晝有光民燃頂及焚指㫁臂者数千人吏不能禁甲寅詔曰並建子弟以藩屏王室申命相輔以羽翼公朝舊邸之任雖崇鈞台之寄尤重聿分内外須正等威自今宰相序立冝在親王之上刑部尚書平章事臣琪工部尚書平章事臣昉等頓首言鈞衡之任止曰台司盤維之封實承天緒漢法丞相在諸侯王之下唐制元子非百執事之列典故昭晣載在䇿書伏望聖慈俯遵前䡄上不允琪等又叩頭固讓乆之上曰宰相之任實緫百揆與羣官禮絶藩邸之設止奉朝請而已元佐等尚㓜欲其知謙損之道卿無至固讓也琪等拜舞稱謝戊午高陽関捕得契丹生口送至闕下召見言契丹種族攜貳恐王師討伐扵近塞築城為備上謂宰相曰戎虜以剽掠為事乃修城壘為自全之計盖天亡之時也往者劉繼元盗據汾晋周丗宗及太祖皆親征不利朕决取之除心腹之患為丗宗太祖刷恥擒劉繼元致闕下今日視之猶机上肉耳當其保堅城結北虜為援豈易制乎宋琪對曰臣少陷虜庭備知戎馬之数自晋末始彊盛然種族蕃多其心不一自石嶺関之敗平劉継元三交高陽関及沿邊諸郡頻有克捷以臣度之其部下攜貳必多國家不須致討可坐待其㓕也己未御製蓮花心輪回文偈頌十部共二百五十卷回文圖十軸以示宰相近臣城南太一宫成命樞密直學士張齊賢司天春官正楚芝蘭祠五福太一齊賢等上言太一五帝之佐天神之至貴者也請用祀天之禮殺其丰又小損之上令増教坊伶官百人自昬祠至明如漢祀之制丙寅楚王元佐等五王同日赴中書視事西八作使郝守濬責授慈州團練副使坐護塞河决懲無狀也丁卯宴近臣扵長春殿餞武勝軍節度使趙普武成軍節度使劉遇赴鎭也上賜普詩普捧而泣曰陛下賜臣詩當刻扵石與臣朽骨同葬泉下上亦為之動容宴罷謂近臣曰趙普扵國家有大大力朕布素時與之游從今齒髪哀矣不欲煩以樞務擇善地俾之卧理因詩什以導意普感極且泣朕亦為之墮睫君臣之際亦盡善矣時樞密使王顯等側待頻視上袴上怪而問之顯等曰陛下所衣袴文縷側倒上笑謂曰朕未甞御新衣蓋澣濯頻所致耳上因言此偪下已爲冀王府翊善著作佐郎姚坦為益王府翊善已卯詔江南兩浙劔南東西川峽路嶺南河東知州通判知軍知縣及監掌庶務官等自今滿三考並與移替庚辰詔史館所修太平緫類一千卷冝令日進三卷朕當親覧焉自十二月一日為始宰相宋琪等言曰天寒景短日閱三卷恐聖躬罷倦上曰朕性喜讀書頗得其趣開卷有益豈徒然也因知好學者讀萬卷書非虗語耳以著作佐郎吕文仲為翰林侍讀賜緋魚袋辛已以郴州刺史孫方進為右領軍衛将軍十二月壬午朔詔曰綏銀夏等州民多流亡入蕃部冝令州縣吏設法招誘俾之復業仍給復三年丁亥詔自京至廣州傳置卒月别給百錢河北河東道沿邉戍卒人賜黄姢𥜗一絮以綿京城内外諸軍卒人給米一石淮海國王錢俶上言曰臣以蕞爾之軀䝉𬒳恩寵賦禄百萬兼職数四元帥之任實本扵兵柄國王之號盖屏扵王室尚書則緫百揆之重中書則掌八柄之繁維師冠扵上台開府聿當扵極品臣之眇末㒺克負荷邦國之制式著典常名器之間固有涯分徒速罪戾以取顛擠伏望聖恩特從省罷優詔不允表三上降制曰分茅胙土所以彰丗及之榮大路繁纓所以表器数之重至若襃寵勲舊度越典常曲阜肈分得用六代之楽平䑓光啓許載九斿之旂咨于舊章爰推異数乃有體好謙之徳形固讓之辭三扣帝閽確乎不拔用屈至公之論式光知止之風天下兵馬大元帥開府儀同三司守太師尚書令兼中書令淮海國王食邑八萬户賜劔履上殿詔書不名錢俶方嶽炳靈風雲玄感奄有勾吴之地不忘象魏之心挈族來朝舉宗宿衛盡以版籍入于朝廷爰分寳玉胙之淮海居天子二老之任啓真王萬室之封併加寵名用荅忠順而乃固形表䟽願避官荣諭之再三誠不可奪若以靈臺偃伯武庫櫜兵天下一家書䡄之無外五侯九伯征伐之不行願寝元帥之名勉徇由衷之請其乃世祚明徳存于帶礪之盟帝賚良弼寵以鈞台之任維師之秩馭貴之階非是懋功適以昭徳勉膺渥澤克副乃懐仍加食采之封載光書社之数可依前守太師尚書令兼中書令淮海國王加食邑三千户庚子詔曰史館新纂太平緫類一千卷包括羣書指掌千古頗資乙夜之覧何止名山之藏用錫嘉稱以傳來裔可改名太平御覧癸卯滑州言河决已塞羣臣稱賀甲辰詔曰朝廷比設貢舉以待賢材如聞緇褐之流多棄釋老之業反襲襃愽來竊科名自今貢舉人内有曽為僧道者並須禁㫁其進士舉人只務彫刻之工罕有通緗素之學不暁經義何以官人自今宜令禮部貢院特免帖經只試墨義二十道較其能否以定黜陟其諸科舉人于本業外别試法書墨義十道著為定制乙已以著作郎李沆直史館丙午右𥙷闕直史館胡旦獻河平頌曰巨宋受命二十有五載夏五月河决于滑示哭也冬十有二月塞之明功也古之王者必有大患然後彰大聖必有大災然後成大成故尭之水湯之旱太宗之蝗玄宗之彗皆所以彰哭患而成聖功也當尭之時三苗未舉四凶未除天示大水以滌羣兇湯之時夏政未釐啇民未熈天示大旱以爍澆風太宗之時餘㓂未平大政未成天示其蝗以噉萬物之豊玄宗之時羣賢未集大禮未立天示其彗以掃萬國之雄則患息而啓聖災平而著功斯亦我宋之大道聖績之無窮也太平興國紀號之始在國家經營克復之際蠻戎夷狄㒺不來格礿祠烝甞㒺不充備文教𬒳於内武徳煥其外天子凝旒以示化宰相備位以充職而姦生治平釁發無事賊臣多遜隂泄大政與孽弟廷美詋詛不道衷􅌟大難頼天地社稷之福聖皇之靈覺而黜之時又彊臣普恃功貪天違理背正削廢大典􅌟豪傑之罪飾帝王之非榛賢士之路使恩不大賚澤不廣冾越八年夏河擁積石潰龍門盪砥柱泊大伾高峯為覊長岸為梏怒無所作水潦羣汹大决于滑漂澶蕩濮浮曹沈濟灌于彭門注于淮泗孟諸鉅浸漫漫而海獸無攸䖏鳥無攸居况于人民乎况于州邑乎羣臣僉言築防以為捍帝曰非是也百姓不親五品不訓司徒之過也敷奏不以言明試不以功侍中之咎也壅其下而不聞于上蔽其賢而不進于位宰相之罪也漢家法制以災異責三公申命有司明舉舊典即譴普于鄧假節為帥示優恩也乃命内客省使郭守文督内謁者中常侍暨廷臣受㫖者凡数十百人役兵籍民凡三十萬竹木土石之数不可勝計以某月日經始至某日畢功自始至畢皆騎置成筭以授之莫不鳩大功集巨力如坻如阜如山如崗衣土以薪實舟以石沈之築之是壅是塞濤回浪轉川動雷駭截洪流之迅奔歸故道以長徃巨岸山峙巨防嶽立大災以寕大功以成是月癸卯使者馳以奏甲辰平章事臣琪臣昉参知政事臣穆臣䝉正臣至與將軍大夫郎中愽士再拜稱賀上言曰玄天降靈大河已平聖功巍巍子孫相承斯為陛下之徳也小臣職在史氏位司諌列豈不以天祐聖宋方鳩大功大功無所發必有大哭旱不能有蝗不能生彗不能見必有大水與尭同休是天子前黜多遜後譴臣普防大患而遏大哭也塞洪河之决䟽徳澤之壅彰大聖而成大功也功已立而不宣儒臣之罪也冝其發頌聲襃形容以明萬萬之休烈臣且不敏不明謹獻頌曰天祚我宋以君兆民配天承休惟尭與鄰粤有大水昬墊下人非曰聖祚孰究孰度蔽賢者退壅澤者罪我防大患河豈云敗逆遜逺投姦普屏外聖道如堤崇崇海内帝白守文是塞是親調爾衛兵程爾烝民民以盡力臣以勤職役云其終河以之塞唐尭懐山實警神徳漢武宣防實彰令徳我塞長河融流恵澤明明聖功萬代成則上覧之震怒召宰相謂曰胡旦所獻頌詞意悖戾朕自擢于甲科歴試外任所至無善狀知海州日為部下所訟獄已具適㑹大赦朕録其材而捨其罪尚令在近列又領史職乃敢自恣兇臆狂躁如此今朝多君子如此人豈宜尚列扵侍從耶亟逐去之冝以其頌下史館中書舎人史館修撰王祐等奏議曰胡旦幸以常材謬登上第職在史氏身列諌垣而乃獻頌明廷發泄私憤謗讟聖代指斥大臣躁人詞多前典尤戒下流訕上先儒所悪冝加竄逐以肅縉紳丁未詔曰右𥙷闕直史館胡旦猥以庸瑣謬升科級兼領太史為吾近臣頃以江淮漕運俾司其事賞賜甚厚恩奨備至年少氣鋭所為不法朕思欲全度盡與洗滌俾領東海欲其自新而乃沉湎於酒恣行鞭扑妄奏部下吏課最以圖僥倖増置胥吏侵用官錢醜跡升聞逮捕繋獄證左已具適㑹大赦朕猶示含垢之道未行黜幽之典俾在禁掖司吾䇿書乃敢獻頌闕廷謗讟公輔詞意狂悖莫甚于兹人之無良唯曰不足言之不善雖逺必違豈可寘於周行所冝投諸四裔尚通朝俾隷方州我非無恩汝冝自省可守殿中丞充啇州團練副使依分司官例支給半俸仍不得簽署州事戊申上於禁中讀書自已至申始罷有蒼䳽自上始開卷飛上殿吻殆掩卷而去上怪之以語近臣對曰此上好學之所感也昔揚震方講間有觀雀㗸三鱣魚墮扵庭亦同其應宥州言戎人二萬衆入㓂廵檢李詢率所部蕃漢卒撃走之斬首二千級已酉詔曰先是禁民於沿邉諸郡私市馬戎人賣官馬市良而棄駑又禁民不得私市徃來死扵道者甚衆戎人少利國馬無以充舊貫自今邉郡吏謹視馬之良駑者刻毛以記許民私市庶羌戎獲利而歳驅馬通関市有以𥙷戦騎之闕焉福州言先是錢銅兼用鐡錢三直銅錢之一吏受賕盗用官物参以銅鐡錢計其贓差重自今望悉以銅錢定其罪從之以懿州刺史田漢瓊為錦州刺史錦州刺史田漢希為懿州刺史皆五溪之酋帥願易其地因而授之也庚戌賜左諌議大夫参知政事吕䝉正麗景門宅右諌議大夫簽署樞宻院事張齊賢宜秋門宅王沔崇徳坊宅各一區雷州言颶風飄壊官寺倉庫民廬舎七百區太宗皇帝實録卷第二十七書寫人楊思恭𥘉對班紹宗覆對霍良弼
