body:
  text: 太宗皇帝實録卷第二十七起太平興國八年十一月盡十二月十一月壬子朔制曰平章百姓唐堯所以疇咨總領衆職漢宣由是致治非賢罔乂得士則昌聿求經濟之才授以弼諧之任枚卜斯允成命以行刑部尚書參知政事宋琪宇量沖深規模宏逺工部尚書參知政事李昉鬱有公望久服大僚而皆罄竭謨明禆贊樞軸君臣之際人無間言公家之事行有餘力修經術以自輔體方直而靡渝是冝擢正台衡職兹調燮朕所注意不假審象之求汝既致君更思輔衮之效唯用盡已佇兹沃心欽若訓詞往踐乃位並守本官同中書門下平章事加金紫光祿大夫琪封廣平侯郡侯昉封隴西郡侯以皇姪孫惟吉為左監門衛將軍封平陽郡侯惟正為左千牛衛將軍惟忠惟貞並為右千牛衛將軍癸丑詔曰先是開寶二年八月丁亥詔書應廣南東西川峽路諸州民祖父母父母在子孫别籍異財者棄市自今並除之論如律泗州言僧伽塔白晝有光民燃頂及焚指斷臂者數千人吏不能禁甲寅詔曰並建子弟以藩屏王室申命相輔以羽翼公朝舊邸之任雖崇鈞台之寄尤重聿分內外須正等威自今宰相序立冝在親王之上刑部尚書平章事臣琪工部尚書平章事臣昉等頓首言鈞衡之任止曰台司盤維之封實承天緒漢法丞相在諸侯王之下唐制元子非百執事之列典故昭晣載在䇿書伏望聖慈俯遵前䡄上不允琪等又叩頭固讓久之上曰宰相之任實總百揆與羣官禮絶藩邸之設止奉朝請而已元佐等尚幼欲其知謙損之道卿無至固讓也琪等拜舞稱謝戊午高陽關捕得契丹生口送至闕下召見言契丹種族攜二恐王師討伐于近塞築城為備上謂宰相曰戎虜以剽掠為事乃修城壘為自全之計蓋天亡之時也往者劉繼元盜據汾晉周丗宗及太祖皆親征不利朕決取之除心腹之患為丗宗太祖刷恥擒劉繼元致闕下今日視之猶機上肉耳當其保堅城結北虜為援豈易制乎宋琪對曰臣少陷虜庭備知戎馬之數自晉末始強盛然種族蕃多其心不一自石嶺關之敗平劉繼元三交高陽關及沿邊諸郡頻有克捷以臣度之其部下攜二必多國家不須致討可坐待其滅也己未御製蓮花心輪回文偈頌十部共二百五十卷回文圖十軸以示宰相近臣城南太一宫成命樞密直學士張齊賢司天春官正楚芝蘭祠五福太一齊賢等上言太一五帝之佐天神之至貴者也請用祀天之禮殺其丰又小損之上令增教坊伶官百人自昏祠至明如漢祀之制丙寅楚王元佐等五王同日赴中書視事西八作使郝守濬責授慈州團練副使坐護塞河決懲無狀也丁卯宴近臣于長春殿餞武勝軍節度使趙普武成軍節度使劉遇赴鎮也上賜普詩普捧而泣曰陛下賜臣詩當刻于石與臣朽骨同葬泉下上亦為之動容宴罷謂近臣曰趙普于國家有大大力朕布素時與之遊從今齒髮哀矣不欲煩以樞務擇善地俾之卧理因詩什以導意普感極且泣朕亦為之墮睫君臣之際亦盡善矣時樞密使王顯等側待頻視上袴上怪而問之顯等曰陛下所衣袴文縷側倒上笑謂曰朕未嘗御新衣蓋浣濯頻所致耳上因言此逼下已為冀王府翊善著作佐郎姚坦為益王府翊善已卯詔江南兩浙劔南東西川峽路嶺南河東知州通判知軍知縣及監掌庶務官等自今滿三考並與移替庚辰詔史館所修太平總類一千卷冝令日進三卷朕當親覽焉自十二月一日為始宰相宋琪等言曰天寒景短日閲三卷恐聖躬罷倦上曰朕性喜讀書頗得其趣開卷有益豈徒然也因知好學者讀萬卷書非虗語耳以著作佐郎吕文仲為翰林侍讀賜緋魚袋辛已以郴州刺史孫方進為右領軍衛將軍十二月壬午朔詔曰綏銀夏等州民多流亡入蕃部冝令州縣吏設法招誘俾之復業仍給復三年丁亥詔自京至廣州傳置卒月别給百錢河北河東道沿邉戍卒人賜黃姢𥜗一絮以綿京城內外諸軍卒人給米一石淮海國王錢俶上言曰臣以蕞爾之軀蒙𬒳恩寵賦祿百萬兼職數四元帥之任實本于兵柄國王之號蓋屏于王室尚書則總百揆之重中書則掌八柄之繁維師冠于上台開府聿當于極品臣之眇末罔克負荷邦國之制式著典常名器之間固有涯分徒速罪戾以取顛擠伏望聖恩特從省罷優詔不允表三上降制曰分茅胙土所以彰丗及之榮大路繁纓所以表器數之重至若褒寵勳舊度越典常曲阜肇分得用六代之樂平臺光啓許載九斿之旗咨于舊章爰推異數乃有體好謙之德形固讓之辭三扣帝閽確乎不拔用屈至公之論式光知止之風天下兵馬大元帥開府儀同三司守太師尚書令兼中書令淮海國王食邑八萬户賜劔履上殿詔書不名錢俶方嶽炳靈風雲玄感奄有勾吳之地不忘象魏之心挈族來朝舉宗宿衛盡以版籍入于朝廷爰分寶玉胙之淮海居天子二老之任啓真王萬室之封併加寵名用答忠順而乃固形表疏願避官榮諭之再三誠不可奪若以靈臺偃伯武庫櫜兵天下一家書䡄之無外五侯九伯征伐之不行願寢元帥之名勉徇由衷之請其乃世祚明德存于帶礪之盟帝賚良弼寵以鈞台之任維師之秩馭貴之階非是懋功適以昭德勉膺渥澤克副乃懷仍加食采之封載光書社之數可依前守太師尚書令兼中書令淮海國王加食邑三千户庚子詔曰史館新纂太平總類一千卷包括羣書指掌千古頗資乙夜之覽何止名山之藏用錫嘉稱以傳來裔可改名太平御覽癸卯滑州言河決已塞羣臣稱賀甲辰詔曰朝廷比設貢舉以待賢材如聞緇褐之流多棄釋老之業反襲褒博來竊科名自今貢舉人內有曽為僧道者並須禁斷其進士舉人只務雕刻之工罕有通緗素之學不曉經義何以官人自今宜令禮部貢院特免帖經只試墨義二十道較其能否以定黜陟其諸科舉人于本業外别試法書墨義十道著為定制乙已以著作郎李沆直史館丙午右輔闕直史館胡旦獻河平頌曰巨宋受命二十有五載夏五月河決于滑示哭也冬十有二月塞之明功也古之王者必有大患然後彰大聖必有大災然後成大成故堯之水湯之旱太宗之蝗玄宗之彗皆所以彰哭患而成聖功也當堯之時三苗未舉四凶未除天示大水以滌羣凶湯之時夏政未釐啇民未熙天示大旱以爍澆風太宗之時餘寇未平大政未成天示其蝗以噉萬物之豐玄宗之時羣賢未集大禮未立天示其彗以掃萬國之雄則患息而啓聖災平而著功斯亦我宋之大道聖績之無窮也太平興國紀號之始在國家經營克復之際蠻戎夷狄罔不來格礿祠蒸嘗罔不充備文教𬒳於內武德煥其外天子凝旒以示化宰相備位以充職而姦生治平釁發無事賊臣多遜隂泄大政與孽弟廷美咒詛不道衷􅌟大難賴天地社稷之福聖皇之靈覺而黜之時又強臣普恃功貪天違理背正削廢大典􅌟豪傑之罪飾帝王之非榛賢士之路使恩不大賚澤不廣冾越八年夏河擁積石潰龍門蕩砥柱泊大伾高峯為羈長岸為梏怒無所作水潦羣洶大決于滑漂澶蕩濮浮曹沈濟灌于彭門注于淮泗孟諸巨浸漫漫而海獸無攸處鳥無攸居况于人民乎况于州邑乎羣臣僉言築防以為捍帝曰非是也百姓不親五品不訓司徒之過也敷奏不以言明試不以功侍中之咎也壅其下而不聞于上蔽其賢而不進于位宰相之罪也漢家法制以災異責三公申命有司明舉舊典即譴普于鄧假節為帥示優恩也乃命內客省使郭守文督內謁者中常侍暨廷臣受旨者凡數十百人役兵籍民凡三十萬竹木土石之數不可勝計以某月日經始至某日畢功自始至畢皆騎置成算以授之莫不鳩大功集巨力如坻如阜如山如岡衣土以薪實舟以石沈之築之是壅是塞濤回浪轉川動雷駭截洪流之迅奔歸故道以長往巨岸山峙巨防嶽立大災以寧大功以成是月癸卯使者馳以奏甲辰平章事臣琪臣昉參知政事臣穆臣蒙正臣至與將軍大夫郎中博士再拜稱賀上言曰玄天降靈大河已平聖功巍巍子孫相承斯為陛下之德也小臣職在史氏位司諌列豈不以天祐聖宋方鳩大功大功無所發必有大哭旱不能有蝗不能生彗不能見必有大水與堯同休是天子前黜多遜後譴臣普防大患而遏大哭也塞洪河之決疏德澤之壅彰大聖而成大功也功已立而不宣儒臣之罪也冝其發頌聲褒形容以明萬萬之休烈臣且不敏不明謹獻頌曰天祚我宋以君兆民配天承休惟堯與鄰粵有大水昏墊下人非曰聖祚孰究孰度蔽賢者退壅澤者罪我防大患河豈云敗逆遜逺投姦普屏外聖道如堤崇崇海內帝白守文是塞是親調爾衛兵程爾蒸民民以盡力臣以勤職役云其終河以之塞唐堯懷山實警神德漢武宣防實彰令德我塞長河融流惠澤明明聖功萬代成則上覽之震怒召宰相謂曰胡旦所獻頌詞意悖戾朕自擢于甲科歷試外任所至無善狀知海州日為部下所訟獄已具適會大赦朕録其材而捨其罪尚令在近列又領史職乃敢自恣凶臆狂躁如此今朝多君子如此人豈宜尚列于侍從耶亟逐去之冝以其頌下史館中書舍人史館修撰王祐等奏議曰胡旦幸以常材謬登上第職在史氏身列諌垣而乃獻頌明廷發泄私憤謗讟聖代指斥大臣躁人詞多前典尤戒下流訕上先儒所惡冝加竄逐以肅縉紳丁未詔曰右輔闕直史館胡旦猥以庸瑣謬升科級兼領太史為吾近臣頃以江淮漕運俾司其事賞賜甚厚恩奬備至年少氣鋭所為不法朕思欲全度盡與洗滌俾領東海欲其自新而乃沉湎於酒恣行鞭撲妄奏部下吏課最以圖僥幸增置胥吏侵用官錢醜迹升聞逮捕繫獄證左已具適會大赦朕猶示含垢之道未行黜幽之典俾在禁掖司吾䇿書乃敢獻頌闕廷謗讟公輔詞意狂悖莫甚于兹人之無良唯曰不足言之不善雖逺必違豈可置於周行所冝投諸四裔尚通朝俾隸方州我非無恩汝冝自省可守殿中丞充啇州團練副使依分司官例支給半俸仍不得簽署州事戊申上於禁中讀書自已至申始罷有蒼鶴自上始開卷飛上殿吻殆掩卷而去上怪之以語近臣對曰此上好學之所感也昔揚震方講間有觀雀㗸三鱣魚墮于庭亦同其應宥州言戎人二萬衆入寇巡檢李詢率所部蕃漢卒擊走之斬首二千級已酉詔曰先是禁民於沿邉諸郡私市馬戎人賣官馬市良而棄駑又禁民不得私市往來死于道者甚衆戎人少利國馬無以充舊貫自今邉郡吏謹視馬之良駑者刻毛以記許民私市庶羌戎獲利而歲驅馬通關市有以輔戰騎之闕焉福州言先是錢銅兼用鐡錢三直銅錢之一吏受賕盜用官物參以銅鐡錢計其贓差重自今望悉以銅錢定其罪從之以懿州刺史田漢瓊為錦州刺史錦州刺史田漢希為懿州刺史皆五溪之酋帥願易其地因而授之也庚戌賜左諌議大夫參知政事吕蒙正麗景門宅右諌議大夫簽署樞密院事張齊賢宜秋門宅王沔崇德坊宅各一區雷州言颶風飄壞官寺倉庫民廬舍七百區太宗皇帝實録卷第二十七書寫人楊思恭𥘉對班紹宗覆對霍良弼
