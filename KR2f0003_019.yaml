body:
  text: 太宗皇帝實録卷第七十九起至道二年九月盡十二月九月已已以單州刺史揚瓊為本州防禦使充靈慶路兵馬副部署壬申蘇州言虎夜入福山寨食戍卒四人癸酉六宅使富州刺史張茂宗卒茂宗魏郡繁水人舉進士及第解褐大理評事纍遷太子中允直御史府先是洛陽官市赤堊吏第其價為三第民有訴其罔上者事下河南府踰年不能决命茂宗馳傳視之茂宗徑詣出赤堊處按驗堊皆同色無他異吏伏罪俄兼鹽鐵推官上命欲儒士領內職遷茂宗為六宅副使改西京作坊使知潭州民甚便之善待過客取名譽使車出其境以美聲聞於上者日以充斥徴為六宅使冨州刺史知河南府移知梓州綿州又知興元府至是卒年四十九上頗嗟悼之戊寅右僕射宋琪薨琪字淑寶范陽薊人少好學問與同郡室昉齊名晋天福中戎虜猖熾每歲開貢藉琪舉僞進士中第署夀安王侍讀幽帥趙延壽恐其陷極塞辟為從事㑹戎虜猾夏隨延夀至京師延夀以其子贊領河中節制署琪為記室周廣順中府罷調𥙷澶州觀城未幾丗宗征淮南起贊為排陳使復辟琪在幕府及鎮廬江表為觀察判官部有冤獄琪辨之活三人死命制加朝散大夫國𥘉贊連移鎮壽陽延安皆表為從事召拜左𥙷闕開封府推官上時領府尹禮遇甚厚坐與宰相趙普厚善多逰其門上惡之白太祖出琪知隴州移閬州改護國軍節度判官上即位召拜太子洗馬選太常丞徴歸將大用為盧多遜所沮改都官郎中出知廣州將行求對于便殿上以藩邸舊僚不欲使之逺去因留不遣改兵部郎中判三司句院廷辨事忤㫖責授本曹貟外郎通判開封府事先是開封府未嘗置通判通判之召自琪始也俄拜右諌議大夫同判三司遷左諫議大夫參知政事時李昉參知政事昉已任工部尚書欲令琪居昉上即日拜刑部尚書參知政事如故趙普出鎮與昉同平章事㑹郊祀加門下侍郎昭文館大學士琪嘗遣柴禹錫白上請盧多遜舊宅上惡琪無鍾離意委珠之操又素好詼諧無大臣體因罷為刑部尚書琪將罷前數日晨至侍漏舍有異烏大于梟集琪之坐左右驅不去至是罷人皆異之端拱𥘉上親耕藉田以舊相進位吏部尚書琪生長戎虜習知邊事㑹北戎入寇下詔慱訪有位琪獻平戎十䇿上嘉納之事未果行頗為識者所許拜右僕射月給真俸上以其衰老特詔五日一朝數月𬒳病作多幸老民自叙以見志又口占遺表數百字而卒年八十詔輟視朝兩日贈司空諡惠安琪學術素淺頗口諧捷給在使府前後三十年周知人之情僞尤通明吏術在相位每百執事謁見有所求請必面折之以是人用胥怨詔劔南峽路諸州民家先蓄藏兵器限詔到百日悉上送官敢匿而不以聞發覺者斬已卯夏綏延行營上言兩路合勢破賊于烏池斬首五千級生擒二千餘人獲米募軍主吃囉指揮使等二十七人馬二千匹兵器鎧甲數萬羣臣稱賀先是上怒繼遷親部分諸將攻討李繼隆自環州丁罕自慶州范廷召自延州王超自夏州張守恩自麟州凡五路率兵抵平夏上皆先授以成算師已有期㑹繼隆遣其弟繼和馳驛上言路回逺欲自清岡峽直抵繼遷巢穴不及援靈武上怒召繼和於便殿詰之曰汝兄如此必敗吾事矣因手扎數幅切責繼隆命引進使周瑩齎詣軍前督之瑩至而繼隆已便冝發兵不俟報而與丁罕兵合行十數日不見虜引軍還張守恩見虜不擊率兵歸本部獨王超范廷召至烏白池與賊遇大小數十戰雖頗克捷而諸將失期士卒困乏終不能擒賊焉庚辰詔陳州管內先是節度使石守信在任日科屬縣民輸藥物十二種非風土所産者並除之甲申貶㑹州觀察使環慶路副部署田紹斌為右監門衛率府副率􅉑州安置先是白守榮馬紹忠受詔與大將皇甫繼明護送軍糧紹斌自靈州率兵迎援次浦洛河㑹繼明卒守榮等後期一日至適為繼遷所圍守榮等欲擊之紹斌曰蕃賊輕佻勿棄輜重與戰但按轡結陳徐行守榮等忿曰我不受節度若但率兵來迎爾勿預吾事紹斌因率所部去輜重四五里繼遷𥘉望見紹斌旌旗不敢擊守榮等自欲邀竒功遂與戰敗丁夫相驚潰走蹂踐死者無數紹斌振旅徐還所部不亡失一人上𥘉嘉之未幾李繼隆遣護軍馮訥入奏言浦洛河之敗紹斌握精卒登隴上顧望不救自言靈武非我不能守欲規圖方面有異志上大怒曰是嘗背太原來投今又首鼠兩端真賊臣也立遣使捕繫詔獄鞫問而有是命癸已以右武衛將軍韋韜為本衛大將軍致仕韜年八十餘病足不任序班為御史臺所糾上以其老病憐之故有是命甲午詔翰林學士兩省五品尚書省四品已上各賜一子出身以壽寧節特推恩故也以都官郎中黃夷簡直祕閣夷簡上言浙右人無預館閣之職者因自陳故吳越王僚佐嘗勸王入朝詞甚懇激上憐之故有是命以右諌議大夫雷有終知并州乙未詔建州歲貢龍鳯茶先是研茶丁夫悉剃去鬚髮自今但幅巾洗滌手瓜給新净衣吏敢違者論其罪丙申詔廢衢州銀冶建三泉縣為大安軍以西縣隸焉丁酉以天長軍降為縣依舊隸揚州六合縣隸建安軍冬十月戊戌朔有司言諸州職事令録判司簿尉等共闕一千七百餘貟望令京東江浙荆湖漳泉等處州縣官有兩貟處不更置有三貟處發遣一貟赴闕從之庚子殿前都指揮使夏綏銀等州都部署王超徴闕辛丑環慶丹延晋絳州京兆府皆上言前月十九日地晝夜十二震甲辰壽寧節羣臣上壽退赴佛寺宴飲詔令皇太子赴㑹辛亥月有食之已未以池州新鑄錢監為永豐監庚申宴中書門下翰林學士文武常參官節度觀察防禦圑練使刺史諸軍校百夫長已上諸州進奉使外國蕃客於含光殿辛酉以主客負外郎周浣為京東轉運副使壬戍以泰寧軍節度使兼侍中張永德為左衛上將軍永德遣親吏市言茶興販規利闌出徼外買羊犒將卒為轉運使王嗣宗所糾故罷其節鎮而有是命虢州刺史劉宇卒宇范陽盧龍人受虜署易州刺史車駕北征宇開門迎王師歸朝纍受郡印至是來朝卒于京師年七十五宇伉健有勇力以弧矢鞍馬自任雖老猶矍鑠不衰往往以騎射為樂為政寬易郡民甚愛之甲子免京東轉運使工部郎中郭異坐前知越州用法失入故也詔併三司句院為一以工部貟外郎劉以詩戒之昜簡恐懼每入直不敢復飲酒或休假在私第賔客候之常醉矣以致其死上曰易簡果以酒敗可惜也雅善筆扎好談誚所著文房四譜及文集二十卷行于丗丙午處州言稻再熟命宰相及羣臣分于京城諸寺觀祠廟禱雪甲寅雨雪近臣稱賀乙卯以給事中溫仲舒為户部侍郎左諫議大夫李惟清為給事中丙辰以工部郎中直集賢院胡旦守本官知制誥右贊善大夫宋貽序上表乞終喪紀從之貽序故右僕射琪之次子琪卒上悉起諸子授以官廪給之至是貽序上言故不奪其志丁已命工部郎中知制誥胡旦序立于馮起之上故事知制誥先入者居上不繫于官次至是馮起任祠部郎中故命旦居其上非常例也戊午詔曰自今州縣官部內流民及亡失租調計之一者並書下考東上閣門使安忠卒忠洛陽人事上于藩邸形質魁岸書才記姓名上即位授供奉官纍遷至東上閣門使俄遷左龍武大將軍判右金吾街仗事忠泣訴於上以環衛之任在外朝不得侍左右願復舊職上笑曰大將軍三品顯官汝終不知朝廷表著因從其請出護洪吉七州屯兵至是卒年六十四是歲天下户四百五十七萬四千二百五十七太宗皇帝實録卷七十九書寫王壽昌𥘉對揩書王良弼再對霍良弼
