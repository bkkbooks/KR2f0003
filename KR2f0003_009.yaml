body:
  text: 太宗皇帝實録卷第三十四起雍熙二年九月盡十二月九月壬寅朔以主客郎中史館修撰張宏比部郎中知制誥知廣州徐休復並守本官充樞密直學士休復仍知廣州乙巳以西上閣門使王侁領蔚州刺史丙午制曰朕祗膺景命嗣守丕圖夕惕晨興十年於此風雨咸若禾麥屢登四鄙無虞五兵不試富壽之福普及生民顧以眇躬安能臻此蓋乾坤之眷祐致動植以昭蘇特開三面之網羅用答二儀之覆燾應兩京諸道州府軍監縣鎮繫囚等限德音到日已前除十惡官典犯贓及謀殺故殺劫殺人不赦其餘罪至死者減一等流罪以下並放江浙之間亢陽為殄雖行賑貸尚軫憂勞冝行蠲除用伸憫恤應有曽差使臣賑貸處人户缺太平興國九年夏秋稅賦并沿徴物色並特與除放庚戌重陽節賜近臣令飲宴於宰相李昉第御製七言二韻詩一首令中官就賜之是日上召親王節度觀察防禦團練使及內臣後苑習射張樂賜飲極歡而罷夜分楚王宫火遲明煙熖未止上以元佐素病心疾意火必元佐也令攝赴中書遣御史按問置巨校於前元佐恐懼對云數年已來心神迷亂因重陽被酒夜持簾幕卷蠟炬不令左右知覺遂起此火案具上遣入內都知王仁睿謂曰汝為親王冨貴極矣何凶悖如是國家典憲我不敢私父子之情從此斷矣元佐無詞以對陳王元佑以下洎宰相近臣號泣營救上涕泗謂曰朕每讀書見前代帝王子孫不率教訓者無不扼腕憤歎豈知我家自有此事朕為宗社之計斷不捨之遂下制曰楚王元佐童丱以來慈愛所厚洎其成長性忽變移訓導莫從往悖自恣親行殘忍之事潜形詛詈之言忽於宫中縱火為患違教廢禮所不能言宜廢為庶人送均州安置上謂宰相曰比者內外安寧方思自適而以元佐縱火實撓朕懷宋琪等對曰堯舜有丹朱商均此不足以上纍聖德元佐若無心疾必不至是惟陛下開適丁巳宰相文武百僚伏閣拜表以庶人元佐乞留京師詔不允表三上乃許之命置於京師使者監護不通外事元佐上長子也初名德崇後改今名出閣封衛王及長漸驕恣後病恍惚煩躁或經時絶朝請自是屢為殘忍不守法度左右微過必加手刃僕吏過庭輒彎弓射之上誨責之甚厲皆不悛是歲夏秋疾甚上深以為憂是月初以疾小愈上恱故為肆赦九日上宴諸王而元佐以病新間不預㑹至暮罷陳王等往謝之元佐謂曰汝等與至尊宴射吾不預焉是為君父所棄也因發憤中夜閉媵妾於室縱火上怒遂廢焉楚王府咨議趙齊王遹翊善戴玄以輔導無狀上表請罪上曰朕教訓猶不從豈汝等能贊導之乎皆釋不問令解職守本官戊午上以火故欲廣宫城詔殿前都指揮使劉延翰等經度之以地圖來上上曰居民甚多吾不欲徙之也令罷己未西南蕃王權南寧州事兼蕃落使龍漢璿使牂牁諸州酋長趙文嬌等率種落百餘人來獻方物名馬納僞蜀所給符印而聽朝命即授漢璿歸德將軍南寧州刺史刻印賜之以趙文嬌張漢遷等並為懷化司戈以殿中侍御史張郢為西川轉運副使崇儀使知府州折御卿兼領成州刺史乙丑以濮州刺史安守忠知夏州戊辰召近臣習射於後苑上七發皆中的左驍衛上將軍致仕張美卒美字玄圭清河人也少精書計隸三司為吏周祖初有天下丗宗為鎮寧軍節度使美時掌郡中財榖丗宗每有求取美必曲為供備周祖聞之怒將加譴責而重傷子意故徙為濮州馬步軍都虞候丗宗嗣位徴為樞密都承㫖未幾權判三司丗宗征淮南留美兼大內都部署一日於禁中假寢忽覺心動因周行宫城謹飭諸司俄頃內醖署火起既有備即撲滅之尋拜左領衛大將軍充三司使歷宣徽南北院領三司如故專掌邦計條奏利害時論以為精敏故屢行征討財用不乏然丗宗嘗以澶淵有所求假頗不以公忠待之美亦內自懷愧恭帝立李筠鎮上黨美度筠必叛潜於懷孟多積芻粟國初筠果叛太祖親討之師徒十餘萬出太行糧運素備未幾平之美有力焉以功授同州刺史定國軍節度使時關中官出緡錢以市材木歲至數千萬先是長吏每出錢給民十取其一謂之率分錢多至數百萬少亦不下百萬美至所部吏白其事美曰官市木長吏何故規其利獨不取後他郡民有訴長吏受率分錢者皆命責償焉乾德中改滄州刺史橫海軍節度使上即位來朝改左驍衛上將軍未幾以本官致仕臺是卒輟視朝一日己巳泰寧軍節度使孫承祐卒承祐字祐之餘杭倡家子也錢俶之在浙東以承祐姊為妃承祐因得處親要之地纍遷至浙江東道營田副使改鎮東鎮海兩軍節度副使知威勝軍節度事太祖征江南命俶統所部兵攻常潤承祐以禆將從謀畫居多江南平詔改中吳軍為平江軍以承祐為蘇州刺史平江軍節度使上即位俶舉國歸明以承祐為兖州刺史泰寧軍節度使知大名府踰年移知滑州至是卒年五十詔輟視朝兩日贈太子太師承祐嘗夢人以蓍草一本增其一而授之既寤以語人或謂曰大演之數五十其用四十有九今增其一君年止於是乎及是果驗承祐性奢侈每一食殺生命數十方下筯所居之室皆焚龍腦日費數兩嘗從車駕北征承祐以橐駝負巨斛貯水載魚以隨之至幽州南村落間日已旰西京留守石守信與其子駙馬都尉保吉洎近臣數十人尚未食適遇承祐承祐即命設幄於野旋令鱠魚窮極水陸人咸異之閏九月壬申朔以􅉑州刺史孫繼業為右衛將軍致仕以老病故也甲戌以虞部郎中知制誥韓丕知􅉑州丕有文行朝右稱為長者然誥命應用傷於稽緩宰相宋琪性褊急常加督責丕不能平故上章求外任焉丙子以感德軍節度使崔翰知滑州辛巳以崇儀使郭令圖領平州刺史癸未司天言太白入南斗甲申駕幸天駟監上親選名馬賜宰相參知政事樞密三司使翰林學士節度使因幸含芳園張樂習射丙戌詔曰饒州多荒田其地肥美宜令募民耕種母出五年租庚寅崇儀副使王贊決杖降為供奉官坐監綾錦院挾私誣奏錦工請加刑上召錦工詰問之工因言贊隂事贊具伏抵罪上謂宰相曰朕躬親庶政猶或如是若游宴自適下情何以上通乎乙未詔曰嶺嶠之外封域且殊蓋久隔於華風乃染成於汙俗朕嘗覽傳記備知其土風飲食男女之儀婚姻喪葬之制不循教義有虧禮法昔漢之任延理九真郡遂變遐陋之地而成禮讓之俗是知時無古今人無逺近問化之如何耳豈有弗率者乎應雍容桂廣諸州婚嫁喪葬衣服制度并殺人以祭鬼疾病不求醫藥及增置妻孥等事並委本屬長吏多方化導漸以治之無宜峻法以致煩擾初上覽雍管記知其俗陋故下是詔丙申以丹州刺史禹萬成為右領軍衛將軍己亥坊州獻一角獸左右皆曰麟也上謂宰相曰時和歲豐兆民安泰此為上瑞鳥獸草木夫何足云不必宣示中外冬十月辛丑朔上親録御史臺開封府繫囚及罷謂宰相曰朕日録囚徒殊不覺勞心但坐少時耳若中外臣僚皆留心政務天下安有不治者古人宰一邑治一郡或致飛蝗避境猛虎渡江況人君能惠養黎庶伸理冤滯豈不感召和氣乎宋琪等對曰陛下勤勞致治蒼生之幸也丙午以天竺僧天息災為譯經三藏明覺大師施護為傳法大師法天為傳教大師並授朝散大夫試鴻臚少卿仍月給俸祿初天息災等既至詔令與禮部郎中張洎同譯西天𣑽夾而潤色之至是成六十卷以獻詔附於經藏㑹乾明節天息災等上言昔唐三藏號大廣智不空試鴻臚卿封肅國公臣等微薄無以發明教法然遇盛明之時竊慕前代之美上覽之故有是命丁未乾明節羣臣上壽己酉汴河押運使臣決杖配隸商州禁錮斷主糧胥吏腕徇於河側三日而後斬初上或聞汴河漕運軍人至京頗有寒餓乃令中官訪求果得百餘人有飢凍之色詰其故乃主糧吏奪其口食而自取之上大怒故加其罪給軍人衣服而慰撫焉癸丑宴中書門下文武常參官翰林樞密直學士節度觀察防禦團練使刺史諸軍校百夫長巳上諸州進奉使外國蕃客於大明殿甲寅黎州卭部川蠻王子阿有等百七十二人以方物良馬來貢乙卯下元節京城張燈賜近臣於樞密使王顯第宴飲夜分上遣中使以御製詩一首賜之丙辰以鹽鐵判官祠部貟外郎張鴻漸為河北轉運使改左右天廏院為左右騏驥院丁巳命右諫議大夫雷德驤同知京朝官考課上謂宰相曰朕前日閲班籍欲擇一人為河北轉運使而臣僚既衆不能盡識亦不知其履行自今令德驤具臣僚歷任功過之跡引對取㫖既德漸識羣臣可以擇才委任且使有官政者樂於召對負瑕纍者恥於顧問懲惡勸善於是在焉以膳部貟外郎鞠礪為嶺南轉運使命宫苑使李繼隆護髙陽關屯兵六宅使符昭壽左神武將軍劉知信護鎮州屯兵引進副使董思願護定州屯兵辛酉月掩御女星十一月壬申日南至上不視朝羣臣詣閣拜表稱賀以御製詩二首賜宰相宋琪等丙子右領軍衛將軍翟美請還姓李氏從之丁丑詔曰先是郊祀乾明節及國家大慶州郡多遣幕職州縣官入貢自今宜罷之戊寅以光祿卿髙保寅知同州庚辰以左諫議大夫知開封府辛仲甫為御史中丞以中書舍人王祐知開封府翰林學士賈黃中知吏部選事壬午詔曰順時搜狩禮有舊章非取樂於畋游將薦誠於宗廟久隳前制闕熟甚焉今者暫狩近郊爰遵時令其以所獲禽獸付所司薦饗宗廟永以為式初上獵于西郊射中走兔五因謂宰相曰搜狩之事著于典禮古者以所獲之禽薦饗宗廟而其禮久廢今可復之遂下是詔癸未以司門貟外郎陳諤為工部郎中致仕以老病故也甲申以祠部貟外郎蘇易簡復知制誥詔瓊州送故流人盧多遜家屬于容州安置以元年十一月丁卯赦書故也戊子以時雪未降命羣臣分禱京師祠廟是日雨雪上恱製詩二首賜宰相等令屬和辛卯詔曰三年之制謂之通喪蓋聖人之垂教貫百代而不易向者臣僚居喪多從抑奪蓋切於為理急於用人求便一時誠非久制方敦孝治以厚時風宜從欒棘之心俾守苴麻之禮自今京官幕職州縣官有丁父母憂者並放離任常參官奏取進止壬辰以左補闕直史館范杲本官知制誥十二月庚子朔日有食之辛丑詔曰國家郡縣至多官吏斯衆拘於選調頗為滯淹應今年十二月終罷秩幕職州縣官等並特放選犯贓殿選者不在此例壬寅潭州獻白雀癸卯南康軍上言降雪三尺大江凍合其上可勝重載丁未以大寒詔罷京城雜役尚方減日課遣中使賜邊郡戍卒𥜗袴悉絮以綿丙辰制曰王者欽若大猷允釐庶政必藉台輔以張化源上所以燮和隂陽下所以康濟黎獻惟公是務與衆共之其或時望有虧物情未允進退之際公議在焉門下侍郎兼刑部尚書同平章事宋琪早以時才常依藩邸荐更歲月久效官常洎朕纘承載懷求舊攀附鱗翼騰躍風雲擢於㑹府之中處以公台之任而識非逺大望闕具瞻曽無端愼之稱但有詼諧之誚朝章政興無所發明百度彞倫如何式叙豈可以承倚毗之重當憂責之任哉宜以秋卿俾還相印退之以禮不謂無恩勉務欽承自求安逸可刑部尚書同日制曰樞機重地密勿近司倚注所先無加於此苟輿情之未洽在公議以難安宣徽南院使樞密副使柴禹錫早自中㳙升于近侍載承求舊之寵驟居宥密之任而不能盡瘁于事傾輸乃誠苟且因循孤豫委遇退居散地猶示優恩尚參翊衛之榮無忘欽承之意可左驍衛大將軍上謂宰相李昉等曰朕於大臣豈容易進退事不獲已方行此命禹錫為性憸巧昨朕欲廣宫城禹錫有别第在表幟中上言願易闤闠中官邸店朕聞之恍然不樂自此知朕薄其為人恐罷其職乃潜與宋琪相結為琪來請流人盧多遜第朕即賜之多遜犯罪籍沒琪為宰相復請居之不避惡名與鍾離意何相逺耶卿等觀之豈大臣之體乎丁巳以太常丞關韙直史館癸亥洪州上言奉新縣民胡仲堯三丗義居置書堂聚游學之士詔旌表門閭常稅外免其他役甲子詔曰瞻彼泰嶽奠于魯郊升中告成歷代之儀斯在泥金檢玉前聖之迹猶存所宜肅恭常加營護先有發掘前代石檢隳壞古之壇墠並令完修如故州縣常謹視之丙寅以殿中侍御史夏侯嶠為右補闕直史館膳部郎中知制誥髙冕卒冕字子莊河中人左拾遺知制誥錫兄之子也周顯德中以布衣詣闕上書送禮部考試有司以甲科處之㑹丗宗將北征復召冕於中書試平燕論丗宗方經略北鄙欲夸大其事以詫戎虜詔并上其藁即以冕為左諫議大夫宰相范質固執以為不可授右補闕賜銀鞍勒馬器幣甚厚將加大用㑹丗宗晏駕國初纍遷至都官貟外郎嘗保舉符􅞡􅞡坐事敗冕責授太子左贊善大夫上即位遷職方貟外郎出為兩浙轉運使未幾遷鄯部郎中知制誥踰年出知益州冕性純質奉詔條尤謹蜀民好遨樂冕拘以法民頗不便之至是卒年五十詔贈右諌議大夫以錢二十萬粟三百斛賜其家仍録其子垂休為光州固始縣主簿太宗皇帝實録卷第三十四書寫人馬頎初對吕興宗覆對劉孝廉
