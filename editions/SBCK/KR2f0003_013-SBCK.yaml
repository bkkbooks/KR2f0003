body:
  text: 太宗皇帝實録卷第四十三起雍熈五年正月盡端拱元年二月雍熈五年春正月已未朔上不受朝以將有事於耕耤也羣臣詣閤拜表稱賀庚申御製喜雪五言二十韻詩賜宰相李昉等令屬和癸亥土犯建星甲子成都府言部内比歳不稔榖價翔貴請發公廪賑糶以濟貧民從之乙􅐫以監察御史宋鎬爲右拾遺直史館進賀雪詩稱旨故也丙寅以大理評事王禹偁爲右拾遺羅處約爲著作郎並直史館戊辰澶州言黃河清二百里癸酉上宿齋於朝元殿甲戍次東郊是夜宿於齋室乙亥日未明三刻上親饗神農氏壇以后稷氏配焉次詣耕耤田位行三推之禮有司板奏禮畢上顧謂侍臣曰朕志在勸農恨不能終千􅅿豈止以三推爲限乎遂耕數十歩侍臣固請乃止回御丹鳯樓下制曰王者握圗御極膺駿命於上玄務穡勸農利烝民於率土朕嗣臨大寶十有三年毎師勤儉之風用洽雍熈之化民惟􅀖本雖無怠於輯寜食乃民天顧未隆於教道是用舉累朝之墜典耤千􅅿於近郊載陟青壇躬展事神之禮三推黛耜式隆敦本之風豈惟備郊廟之粢盛抑亦勵烝􅀺之播殖萬國駿奔而述職千官星拱以在庭望宫闕城社之尊睹聲明文物之盛豈予寡昧獨荷於鴻休思與華夷同均於大慶冝革紀年之號仍覃作解之恩可大赦天下改雍熈五年爲端拱元年自正月十七日昧爽巳前應天下罪人除犯十惡及官典犯正枉法贓至殺人者不赦外其餘罪無輕重咸赦除之内外馬歩軍諸將卒等第加賞給文武臣僚並與加恩諸貶降官未量移者與量移巳量移者與復資巳復資者與叙用除名免官人等所司具名以聞天下人户雍熈三年已前係欠夏秋稅物並與除放應軍民爲盜亡命山澤百日不來陳首復罪如初民有年七十巳上見爲家長􅂄年宿德爲郷里所宗者冝令本州具名以聞當賜爵一級舊制天子孟春􅁻亥饗先農於東郊親耕耤田自東晉南遷此禮廢墜唐貞觀中太宗始耤於千􅅿至元和五年憲宗以河朔師旅之後物力凋耗將行而復止自是歷五代二百餘祀不復舉行上以承平旣乆乃詔有司参酌典故行三推之禮所以示勸農而興墜典也丙子上賦東郊耤田五七言詩各一首賜侍臣丁丑詔改晉州洪崖廟爲棲眞觀從本州之請也庚辰詔郡國不得以司理參軍兼莅他職先是成都府言以司理參軍承府縣之闕故降詔以止之辛巳右屯衞上將軍伊審徴卒審徴太原人同光中父延瓌隨孟知祥入蜀知祥僣即僞位以女妻延瓌歷嘉眉二州刺史審徴以父歷任僞蜀州刺史通奏使同平章事武泰寧江兩軍節度使蜀平歸朝爲邠州刺史靜難軍節度使移鎭延安開寶末徴爲右屯衞上將軍至是卒年七十五先是審徴與王昭逺俱爲僞通奏使掌機務即樞密使之任也孟昶國事無大小一以咨之常自以康濟經略爲己任㑹王師入境審徴首奉降表詣軍前昭逺時統精卒數萬出城拒戰聞王師之至棄軍走匿東川城倉中後數日擒獲時人􅀏之壬午南康軍判官朱覃棄市覃淮西俚人也㓜寒賤始爲人厮役及長竊弄筆硯冒爲士流游科􅂣凡數年止以利口持人長短士君子頗患之洎䇿名從政其志益橫與大理評事王悅素不協恱掌建昌縣酒榷告覃部内爲姦贓鞫得實故抵於法殿中侍御史龔頴編歷代年紀爲二圗來上優詔襃之癸未上幸玉津園習射張樂賜從官宴飲乙酉詔曰典獄之官理資於欽恤經國之道政尚於寛仁庶洽時雍用期􅆿措如聞酷吏頗恣兇威慮致陷於平人必有傷於和氣冝行禁止以示哀矜應天下􅆿獄罪人内有合行訊問者只得一依律令其䑕彈箏非理殘忍之􅀋並禁之先是諸處獄吏搒掠罪人以繩接􅅞其手系於足指用挺叩其繩則痛入骨髓謂之䑕彈箏上聞頗悼其酷故下詔禁之二月辛卯詔輟視朝以皇舅靜江軍節度使杜審進夫人張氏卒故也癸巳以殿中侍御史柴成務爲户部貟外郎直史館甲午宴中書門下文武常參官翰林學士節度觀察防禦團練使刺史諸軍校百夫長巳上諸州進奉使外國蕃客於大明殿乙未詔曰補闕拾遺位居諫省榮踐清華之列是爲獻納之臣朝廷之得失須論刑政之煩苛必舉睠兹職業􅀉任非輕上則輔佐大臣次則公卿庶尹歷朝選任何莫由斯苟或但務因循止思愼黙忠言讜議寂寥無聞殊乖申諷之規􅂚副建官之意冝更舊號特立新名庶明立制之文咸勵匪躬之節其左右補闕冝改爲左右司諫左右拾遺冝改爲左右正言上欲令諫官修其職業故改其官號特降是詔以申明之己亥詔免瀛州部民租調三年傜役五年以其再遭犬戎蹂躪故也庚子制曰端揆崇資文昌右相蓋非賢而不授諒出綍以惟公告示具僚舉兹明命中書侍郎兼工部尚書同中書門下平章事李昉巖廊舊德文學名儒踐臺閣之通班素髙問望處鈞衡之大任乆展謨猷謙和秉君子之風純懿擅􅁻人之美今者輟從三事緫彼六卿董齊喉舌之官載光北斗領袖搢紳之列首冠南宫用資鎮俗之清規式表尊賢之茂典禮異適遵於表著睠懐別示於股肱佩服渥恩優游名器恭踐厥位往惟欽哉可尚書右僕射同日制曰尊賢養老上古格言念舊録勲前王令典而況再登廊廟三秉節旄始終不易於純誠岀入咸膺於大用爰疇茂德用降徽章山南東道節度襄州管内觀察處置等使檢校太師兼侍中許國公趙普大昴儲祥維嵩挺秀翊天飛之景運名冠王公藴台輔之嘉謨功書簡􅁽早從黃閤荐擁髙牙隆中盡偃於仁風峴首賡歌於善政加以心惟許國道在安民封章屢納於忠言致理率陳於正道佑予涼德繄乃宗臣朕所以卜在㑹朝委之論道彞倫未叙將俟於緝熈庶政缺然佇期於寅亮是以輟從藩輔復踐巖廊加帝保之崇資冠鸞臺之舊列咨上公而詢庶政彌切􅀝毗昌洪業以永丕圗更資光輔可守太保兼侍中昭文館大學士又制曰天道無私日月星辰助其照皇王不宰股肱輔弼代其功所以端拱仰成垂衣致理建千年之景運追三代之令猷其有業茂經綸才推謹厚參大政而載罹寒暑秉純誠而無替初終冝推爰立之恩式副至公之選朝散大夫給事中參知政事上柱國賜紫金魚袋吕蒙正四氣均和五行鍾秀藴濟時之明略輔之以温恭挺命代之宏材守之以淵黙凡膺歷試畢振芳猷公忠推社稷之臣凝重見廟堂之器睠兹大體乆鬰具瞻爰資作礪之功用正秉鈞之任崇階馭貴列爵増封兼司太史之書載踐地官之秩爾冝周旋庶政佐佑眇躬緩兹宵旰之憂翊我隆平之運同厎於道豈不美歟可光禄大夫中書侍郎兼户部尚書同中書門下平章事監修國史又以開封尹陳王元僖進封許王韓王真宗舊名進封襄王冀王元份進封越王益王元傑加食邑一千户武勝軍節度使許王錢俶進封鄧王樞密使王顯加檢校太傅給事中參知政事辛仲甫加户部侍郎樞密副使左諫議大夫趙昌言加工部侍郎以樞密副使左諫議大夫王􅃆爲户部侍郎參知政事以御史中丞張宏爲工部侍郎充樞密副使甲辰詔陞建州爲建寧軍節度以武寧軍節度使曹彬加檢校太尉安逺軍節度使錢惟濬進封譙國公彰國軍節度使駙馬都尉王承衍改貝州刺史永清軍節度使威塞軍節度使駙馬都尉石保􅁻改滄州刺史橫海軍節度使殿前都虞􅃸張訓領歸義軍節度使傅潜領昭化軍節度使並充殿前副都指揮使侍衞馬軍都虞􅃸李繼隆領保順軍節度使充侍衞馬軍都指揮使侍衞歩軍都虞􅃸戴興領振武軍節度使充侍衞歩軍都指揮使愼州觀察使駙馬都尉魏咸信爲相州刺史彰德軍節度使以左衞上將軍張永德爲密州刺史安化軍節度使乙巳以内客省使楊守一爲宣徽北院使簽署樞密院事丙午詔郡國民有艱食處聽發公廪賑濟之丁未以􅆿部尚書宋琪爲吏部尚書禮部侍郎李至爲􅆿部侍郎翰林學士中書舎人宋白爲禮部侍郎司封郎中知制誥賈黃中爲中書舎人祠部貟外郎知制誥蘇易簡爲本曹郎中知制誥並依前翰林學士以右補闕知制誥李沆爲職方貟外郎王化基爲駕部貟外郎宋湜爲庫部貟外郎起居舎人知制誥田錫爲兵部貟外郎知制誥户部貟外郎知制誥胡旦爲司封貟外郎並依前知制誥以左神武大將軍順州刺史王繼昇領本州團練使餘文武官進秩有差以乙亥赦書加恩故也戊申以右諫議大夫郭䞇雷德驤並爲工部侍郎以度支使張選爲鹽鐵使户部使魏㔻爲度支使度支副使李惟清爲右諫議大夫户部使以刑部貟外郎陳象輿董儼屯田貟外郎雷有終並爲本曹郎中分充鹽鐵度支户部副使己酉以職方郎中韓丕兵部郎中楊徽之並爲左諫議大夫司勲郎中羅延吉爲右諫議大夫以屯田貟外郎楊礪爲庫部貟外郎充襄王府記室參軍庚戍以皇子元偓爲左衞上將軍元偁爲右衞上將軍以皇姪孫惟吉爲左驍衞大將軍惟正爲右驍衞大將軍惟叙爲左武衞將軍惟和爲右武衞將軍惟憲爲左屯衞將軍惟能爲右屯衞將軍壬子興化軍言甘露降工部侍郎同知京朝官考課雷德驤上表求致政先是德驤與趙普不協普再入相制下之日德驤方立朝手不覺墜笏遂拜章求退避普之讎也因請於便殿見上具陳所以上勉諭乆之謂曰第去朕終當保全卿勿以爲慮乃懇乞罷知京朝官考課以奉朝請從之仍賜白金三千兩以慰其心癸丑以右散􅀐常侍徐鉉爲左散􅀐常侍以皇城使薊州刺史王延德領本州團練使乙卯右千牛衞上將軍李崇矩卒崇矩字守則上黨人也㓜􅀌貧長而謹厚爲郷里所稱晉天福之亂漢祖起自并汾師次上黨史洪肈時爲先鋒軍帥聞崇矩之名召署親吏漢祖踐阼以洪肈爲侍衞親軍都指揮使徼廵闕下洪肈性殘忍好殺軍民橫罹其毒者不可勝計至於屠李崧之家皆洪肈蘇逢吉之偁也時人冤之左右懼其兇威亦稍稍遁去惟崇矩事之益謹迨洪肈被誅卒免其禍周祖初有天下素與洪肈厚善訪求親舊將恤其􅀌得崇矩而悉以委之崇矩嘗主洪肈之家籍由是盡獲史氏之財産以付洪肈弟福周祖聞而嘉之乃命􅀠於丗宗帳下丗宗嗣位擢爲供奉官是年河東劉崇入㓂從征敗崇於髙平以功轉供備庫副使俄遷作坊使恭帝嗣位以崇矩判四方館事太祖受禪李筠叛上黨率并㓂鼔行而南太祖患之命崇矩爲行營護軍率兵戍河陽以禦其衝與石守信髙懷德羅彦瓌同破筠衆於碾子谷乃表請太祖親征澤潞平以功授右監門衞大將軍充三司使累遷至樞密使時趙普爲相崇矩在宥密皆數年分秉大柄因以女妻普之子承宗厚相交結太祖聞之頗怒㑹門下客鄭伸上書發其隂事開寶五年出爲鎭國軍節度使六年追入朝授左衞大將軍上即位出爲嶺南道都廵檢使未㡬遣使齎詔就移爲瓊崖儋萬四州都廵檢使所部兵士憚於從行有逗撓之色崇矩乃盡以車服器用金帛凡數百萬分給之衆遂感恱樂爲其用累年海上無恙受代歸闕遷右千牛衞上將軍尋被病請長告至是卒年六十五輟視朝一日詔贈太尉謚曰元靖崇矩性純厚寡言而志敦信義好黃白之術尤重佛法以始事洪肇迨乎通貴見洪肈之子孫必厚禮而優濟之或聞有學黃白之道者必自逺邀之至以師禮待之雖知其詐而猶以爲神仙之士卒無恨悔在官凡得俸入除朝夕伏臘費用外多輸於僧室故身死之日家無厚積焉太宗皇帝實録卷第四十三書冩人趙弼初對王丗昌再對訖劉孝廉
