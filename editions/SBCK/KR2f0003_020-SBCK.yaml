body:
  text: 太宗皇帝實録卷第八十起至道三年正月盡山陵至道三年春正月丙寅朔上不受朝羣臣詣閤門拜表稱賀丁邜癸酉並輟視朝以孝章皇后啓櫕并􅀤引故也羣臣詣閤􅆢慰丙子以户部侍郎温中舒禮部侍郎王化基並守本官参知政事給事中李惟清同知樞密院事以給事中参知政事張洎為刑部侍郎己邜上元節京城張燈上幸乹元門楼宴從官夜分而罷戊子孝章皇后神主還京宰相率百官拜迎於順天門外己丑刑部侍郎張洎卒洎滁陽人少有俊才慱通墳典李景日舉進士及第解􅄄上元尉遷校書􅀰景長子燕王冀卒有司謚武宣洎獻議駮正詞理精當擢拜監察衘史自以論事稱㫖遂率意弹撃不避􅁠貴大臣游簡言等共嫉之㑹景避地豫章留其子煜居守即共薦洎掌煜記室不得從未幾景䘚於豫章煜襲位擢為工部貟外􅀰試知制誥滿歲為禮部負外􅀰知制誥累遷中書舎人清輝殿學士参預機密恩寵第一洎故字師黯煜令字偕仁常以字呼之清輝殿在後苑中煜爱之不令旦夕離左右故授以内殿之職中外之務一以咨之每兄弟宴飲宫中作妓樂洎獨得預宫城東北隅賜以大第為冩書萬餘卷别創書堂煜自科著之常至其第召見妻子慰撫賜予甚厚洎尤好建議每所規畫煜未即行必稱疾不起煜以手扎開釋之始復視事及王師圍城踰年城危甚洎每勸煜勿降廣言符命指引􅀇象無變金湯之固未易取也旦夕當引退願勿􅁨又言一旦有不虞當先死社稷既而城陷洎携妻子及金玉重寳自便門入止宫中與摳密使陳喬同升閣􅀅俱死既至喬自經􅂔絶洎乃下見煜曰臣與喬同掌機務今日􅀦亡當俱死念主入朝誰辯明主所以不死爾􅀅有以報也歸朝太祖召見責之曰汝教煜不降使至今日因出帛書示之乃王師圍城煜遣洎草徴上江救兵蠟丸中詔書也洎頓首請罪曰臣之所為也犬各吠非其主此其一爾他尚多今得死臣之分也詞色不變太祖􅀄欲殺之及是喜拜太子中允上即位以文雅選直舎人院未幾使高麗復命改户部貟外􅀰出知相貝二州頗簡慢部内不治轉運使田錫言其狀徴還洎求見廷辯上以其儒生不復責以吏事詔不問以本官知譯經院改兵部貟外郎禮部户部二郎中選爲太僕少卿拜右諫議大夫判大理寺俄充史館修撰判集賢院事上令以儒行篇刻扵版賜近臣及新及第貢舉人洎上表􅁛述敷引前代以媚上上以其該慱命丞相奨諭数月擢拜中書舎人充翰林學士洎性便佞能伺候人主意愽涉經史多知典故每上有所著述及賜近臣詩什洎必上表廣徴引以􅀅順其美與蘓易簡同在翰林数月尤不恊及易簡秉政洎旦夕攻之既而昜簡罷以洎為給事中参知政事與冦凖同列先是凖知吏部選事洎掌考功為吏部官屬凖年少新進􅂔鋭思欲老儒附已以自大洎夙夜坐曹視事每冠􅅁􅀱凖于省門揖而退不交一談凖益重之因召與語洎捷給善持論多為凖規畫凖心伏遂兄事之極口誇洎扵上漸欲進用又知其在江表日多讒毁良善李煜殺中書舎人潘佑洎嘗預謀心疑之待詔尹熈古吴郢皆江東人洎常善待之上一夕召熈古等侍書禁中因問以佑得罪故熈古言煜忿佑諫説太直爾非洎也自是洗然遂擢用盖凖推挽之也旣同秉大政凖亦忌之洎􅆢事凖愈謹政事一决於凖洎無所参預專修時政記甘言䛕詞以自媚於上㑹議􅂕州事不稱㫖恐懼欲自固􅁠􅃂上已嫉凖專恣恩􅃂衰替洎慮一旦同罷免因奏事大言㓂凖退後多誹謗上凖但色變不敢自辯上由是大􅁖凖旬日罷未幾洎􅀍病家居滿百日力疾請對方拜踣於上前明日表解職􅄖詔不允後月餘改刑部侍􅀰罷知政事捧詔嗚咽疾遂亟後十餘日卒年六十四上聞之軫悼特贈本曹尚書賻禭賵贈加等以其二子皆為六品正貟官洎風儀灑落文彩清麗兼通禅寂虗無之理終日清談亹亹可聼尤險詖好攻人之短舊事李煜及煜歸朝甚貧洎猶丐索之煜以銀頮面器與洎洎怒不得金者時潘慎修掌煜記室洎疑慎修教煜素與慎修善自是亦稍踈之煜子仲㝢雅好蒲慱飲宴洎因切諌之仲㝢謝過後数月人有言仲㝢蒲慱如故洎遂與之絶及仲㝢死郢州歸葬京師洎亦不赴吊與張佖議事不恊遂為讎隙始父事佖既而不拜尤善事黄門宦官在翰林日引唐故事奏内供􅆢官藍敏貞為翰林學士使内侍裴愈副之上覧奏謂曰此唐室弊政疑貳大臣䖏處以中人監之朕方恢復古道安肯踵此覆轍卿言過也洎慙而退洎自江東歸朝廷故舊無登其門者性鄙恡雖親戚無所及常與故散􅀐常侍徐鉉厚善心重之因議事小不恊遂絶然手冩鉉文章訪求其筆札藏於篋笥甚於珍玩此其異也庚寅以都官􅀰中沈􅁇宗為淮南轉運使工部􅀰中知制誥胡旦兼史館修撰辛夘以侍衛親軍馬步軍都虞􅀱傅潜為延州路兵馬都部署殿前都虞􅀱王昭逺為􅂕州路兵馬都部署西京作坊使石普為関右河西巡撿户部使張鑑調􅀤陕西諸州軍糧工部􅀰中知制誥張秉祠部􅀰中知制誥馮起翰林侍讀起居舎人吕文仲推節催督之二月丙申朔以許州司馬盧文翰為工部貟外􅀰同句當陜西轉運事丁酉孝章皇后祔别廟羣臣皆詣閤奉慰庚子􅂕州行營言敗李􅁇遷萬餘衆斬首二千級獲鞍馬鎧甲数千計􅁇遷單􅀐遁走羣臣􅁛賀辛丑上不豫止扵便殿决事甲辰詔曰朕獲主萬􅀖于兹二紀囹圄之際專務於盡心肖翹之㣲常􅁨其失所矧畿甸之冨庶而輦轂之浩穣方春陽和之時品物鬯茂禁繋猶衆狴犴未空雖多辟之所招在好生而斯切議獄緩死冝順於天常宥過眚災聿遵於時令自至道三年二月九日已前應京畿繫囚死罪並降從流流已下並放戊午詔文武百官並於崇政殿起居自皇太子親王及諸軍校分爲七班先是上不豫不御前殿猶孜孜視政事延見羣臣無有厭怠至是以文武班列衆多乆坐罷倦而有是詔壬戌大食賔同朧國各遣使朝貢以右諌議大夫雷有終爲給事中知并州是月以上不豫皇太子諸王及文武羣臣宦内諸司使諸軍􅀅校各於佛寺齋居㑹祈福三月乙丑朔永興軍節度使田重進卒重進范陽人形質竒偉有武力周顯徳中應幕爲卒太祖時統禁軍以重進􅀠麾下從征淮南有􅀾功又從太祖北征㑹陳撟軍變重進以翊戴功遷御馬軍使累遷控鶴指揮使領瀼州刺史上即位擢為天武左廂都指揮使領瀼州圑練使改侍衛歩軍都虞􅀱豊州􅀚察使從攻太原部攻城南面㑹劉􅁇元降録其功依前領豊州刺史充天徳軍節度使侍衛歩軍都指揮使未幾河大决滑州房村􅀤卒数萬人命重進護其役既而河塞改邠州刺史静難軍節度使領軍職如故王師北征以重進為飛狐路兵馬都部署大破虜擒其􅀅大鵬翼監軍馬贇副􅀅何萬通并契丹渤海三千餘人斬首数千級獲鞍馬鎧甲数萬追北四十餘里下飛狐􅂕丘数城乗勝取蔚州會曹彬不利重進以所部護送蔚州官吏士庶凱旋以功改涇州刺史彰化軍節度使充侍衛親軍馬歩軍都虞􅀱出為定州兵馬都部署端拱􅀄改真定尹成徳軍節度使移京兆尹永興軍度使至是卒年六十九輟視朝両日贈侍中重進扑愿不知書上在藩邸時日憐其忠勇嘗令給以酒灸重進不肯受使者云晋王以賜汝汝安敢拒重進曰我但知有陛下不知晋主是何人也卒不受上知而嘉其質直無他腸故終始委遇又以長夀縣主適其子守信以􅃂之丙寅以慎州􅀚察使桑賛知貝州考功貟外􅀰張素為荆湖南路轉運使丁􅆗以工部侍􅀰張雍知京兆府占城國遣使朝貢庚午以懷州圑練副使宋太􅀄為工部􅀰中知梓州癸酉環慶路行营言護送輜重已入􅂕州丁亥出麥豆穂数十以示近臣上曰今歳多稼豊茂数倍常年引手而言其苗􅂈􅂰桑拓甚盛􅅙績必有大所獲喜動顔色壬辰不視朝癸已追班於萬歳殿宣制曰朕聞兩曜麗天不能逃虧􅉴之数四時成歳無以逾代謝之期知􅑡運之有終乃達人之大觀朕以凉徳君臨萬􅀖二紀于兹庶政咸乂爰從春首􅁨劳遘災雖藥石之載加奈沉綿而愈劇以至大漸弗寤弗興皇太子克茂温文夙彰孝爱自䖏前星之位彌光主鬯之賢嗣守丕圖必符昌運冝于柩前即皇帝位尔其任賢去邪克遵于徃誥布徳施恵深念于蒸民更頼中外藎臣文武多士一心恊佐共致雍熈諸軍賞給並取嗣君䖏分表紀以日易月山陵制度務􅀙儉約應在外臣僚不得擅離治所只于本䖏舉哀於􅃧有生必死品物之大端送徃事居前哲之明訓克搆鴻業吾無恨焉是日上崩於萬歳殿太子即皇帝位甲午小殮丁酉百官成服遂大殮翰林學士承㫖吏部侍􅀰宋白上議曰臣聞明一合道曰皇徳象天地曰帝聦明文思行也尭舜禹湯謚也王者膺圖受暦應天順人美盛徳而試諸難騰英聲而節一惠生有尊號終受大名垂諸簡編如掲日月伏惟大行皇帝允恭克讓豁逹神武千年誕聖彤雲紫􅂔之祥五行鍾秀日角龍顔之表純孝因心奉宣祖而尊嚴父雍睦悌長翊太祖以肇興王始者姫室下衰梁王在位謳謌獄訟去周歸宋王于出征帝出言邁三􅂕改卜百姓與能陳撟有切諌之言京邑無敚􅔯之患市不易肆遂登皇極佐聖之功大也乃荒魯􅀖乃建元侯内緫熊羆肅清禁衛龍潜邸第晦九五之跡鳯徳尹京洽億兆之心洎奄有四海為天下君大寳曰位其命惟新改元太平符守文之代於鑠軍政叶下武之時應運之期至也蕞爾汾晋結援林胡逆節亂常両朝三紀勞人動衆堅不可拔帝赫斯怒定議親征矢石齊攻金湯不守折鐵易于摧枯渠魁倐已銜璧與民更始恵如春陽本封晋王終定厥土受天之命光也漳泉入覲混同文軌抗越獻地一統寰區無思不服無逺弗届占城于闐之封大食賔同之􅀦獻琛奉贄府無虗月白鸚紫鵲之異神麟丹鳯之􅂕嘉禾連理史不絶書中孚之信及也經緯天地克定禍亂政之大者必躬親之高䑓講武臨軒選士英儒贍聞之鴻慱骨騰􅁏飛之俊傑天下英雄落吾彀中外之峻級待以清華不十数年有登廊廟而定􅆠􅂣者知臣之精鍳也幽有􅄦神明有礼楽墜典聿修無文咸秩五展南郊之儀一議東封之礼耤田􅂆農御搂肆赦釋老之教崇􅆢為先名山大川靈蹤勝境仁祠仙宇經之營之致恭之誠廣也求賢審官化民成俗為政以徳惟刑恤哉置詳刑之曹下考課之令菅蒯不棄涇渭分流時無遺才吏皆守法興廢􅁇絶矜􅀌振寡視民如子使無盗乎水旱思艱食為􅁨幽遐念􅈼天無所増加使額勤恤人隐納隍之言逺也俯仰山谷詳定隐淪修史氏之職改班秩之稱著治化之書貞􅀚之風也紀他山之石開元之事也弧矢以威天下善射通神薬石以救齊人仙方填委樂正雅頌無相奪倫幸太學以談經召儒臣而侍讀卑宫室則㫁彫為樸減尊稱則法天崇道開理撿以登聞􅂛便殿而崇政立儲定社稷之本清心希大庭之妙治丗之規備也在宥天下二十有二年王澤深矣機務詳矣臣下之歸尊至矣􅀺甿之受賜多矣越書契以無倫盡帝王之能事還淳反古如指諸掌泥金檢玉方卜近期而􅂦成龍至聖駕上僊萬方縞素九域遏密下臣奉詔擬議徽烈丕􅀭耿光追惟古始巢燧之際載籍未備神黄已還声明有章若乃兼啇周之質文緫唐漢之雄盛乃聖乃神乃武乃文叙全功與全徳實映後而輝前也旁稽礼文恭按謚典應變無方不疾而速得不謂之神乎施為于民財成萬物得不謂之聖乎萬􅀖作憲帝徳廣運得不謂之文乎保犬定功奄有九域得不謂之武乎太法太􅀄前志謂太上立徳宗以宗徳禮經有宗祀配天惟千齡應運之君為百代不遷之主請上尊謚曰神功聖徳文武皇帝廟號太宗八月已未以大行皇帝謚􅉺告于􅀯郊庚申告于萬歳殿􅉺曰哀子嗣皇帝臣謹􅂯拜稽首言曰臣聞天地之大莫能形容神聖之功無所擬議然則圓方之象必取于彊名尭舜之􅁛盖從乎節惠伏惟大行皇帝承天立極執象臨人其生也感大電之精其出也應真人之運聲身為其律度道徳作其藩籬若日月之明無幽不燭如江海之量無大不容爰自暦在躬大横叶繇舊􅆠來復盡有江吴戎輅親征旋平汾晋皆出扵睿㫁遣以聖謀繋象不能􅄨其㣲􅄦神不能窺其奥是以緫宇宙于掌握得英雄于彀中宅諸夏以制四維坐明堂而覲羣后髽首貫胷之􅁼接武于藁街景星甘露之祥疊書于􅉺府在宥天下二十年當是時也􅂕臺偃伯象闕懸書甌脱彌嚴縣道率化物無疵癘歳有順成積粟腐于太倉豊財溢乎内帑材官劔客皆六郡之豪分閫登壇盡萬人之敵自歴代已來未有若斯之盛者也於是賜民酺飲展礼耤田􅀍衮冕於㤗壇躬俎豆於清廟幸成均而視學屢覩横經紀延閤以垂文嘗紆睿思若乃生知多藝天縱聦明洒草隸之華得琴碁之絶擅􅓡矢之妙洞􅀇釋之㣲皆作丗揩模出人意表豈力學之能及實振古之未聞大哉邈乎不可得而論矣然猶日慎一日雖休勿休温顔以盡下情虗已以延讜議一夫不獲納隍之慮每深萬􅀖有罪在予之責尤切至若省去徽號漢后之不言聖也杜絶田獵􅀇元之慮􅀤狂也屏藻井之飾夏禹之卑宫念黄沙之抂成湯之祝網也有一於此猶謂之聖况兼是数者乎方􅀅鳴鑾東夏檢玉介丘而天禍忽臨仙駕長徃羣臣咽絶願贖以身萬姓克窮如丧厥考頋惟寡昧䖍奉丕圖荒疚哀迷懼不克荷今因山俯畢同軌咸臻敢薦大名爰稽載籍詢慱士禮官之公議叶宰衡庶尹之輿情定謚于南郊得請於上帝謹遣攝太尉右傼射兼門下侍􅀰平章事臣吕端奉寳􅉺謹上尊謚曰神功聖徳文武皇帝廟號
