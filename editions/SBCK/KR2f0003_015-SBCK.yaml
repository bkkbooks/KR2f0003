body:
  text: 太宗皇帝實録卷第四十五起端拱元年七月盡九月秋七月乙酉朔以捧日左廂都指揮使范廷召爲齊州防禦使右廂都指揮使傅思讓爲鄭州防禦使天武左廂都指揮使髙瓊爲單州防禦使右廂都指揮使王超爲懷州防禦使龍衞右廂都指揮使孔貞爲潁州防禦使神衞右廂都指揮使徐興爲衞州防禦使馬歩軍都軍頭葛霸爲博州團練使彌進超爲磁州團練使王漢忠爲賔州團練使康保裔爲淄州團練使馬歩軍副都軍頭竇睴領播州刺史充許州馬歩軍都指揮使喬清領溪州刺史充陳州馬步軍都指揮使牛韜領諒州刺史充襄州馬歩軍都指揮使辛卯賜衢州烏巨山僧儀晏紫衣時年一百一十四歳上聞之徴至闕下舎於相國寺月餘放還山癸巳以殿前指揮使左班都虞􅃸麴斌領敘州刺史殿前指揮使右班都虞候郭密領冨州刺史貟僚左右六直都虞候王榮領懿州刺史並充馬歩軍都軍頭以馬歩軍副都軍頭呼延賛領冨州刺史散指揮都虞􅃸李璘領􅅄州刺史東西班都虞􅃸時遇領峯州刺史散貟都虞􅃸張璲領冨州刺史並充馬歩軍副都軍頭甲午以内殿直都虞􅃸楊逺領􅅄州刺史充殿前指揮使左班都虞􅃸以散祗􅃸都虞􅃸任斌領愛州刺史充殿前指揮使右班都虞􅃸以拱辰下十指揮都指揮使李希文領驩州刺史充捧日左第三軍都指揮使拱辰上十指揮都指揮使趙鄴領播州刺史充捧日右第二軍都指揮使龍衞左第一軍都虞􅃸張玘領巒州刺史充捧日右第三軍都虞􅃸散都頭都虞􅃸劉用領諒州刺史充馬軍副都軍頭捧日右第二軍都指揮使劉超領珮州刺史充捧日左第二軍都指揮使乙未以天武左第二軍都虞􅃸孫遇領勤州刺史充殿前虎翼左第一軍都指揮使天武右第二軍都虞􅃸潘超領􅅄州刺史充虎翼右第一軍都指揮使神衞左第三軍都虞􅃸王美領牢州刺史充殿前虎翼右第三軍都指揮使神衞右第一軍都虞􅃸戴贇領誠州刺史充殿前虎翼右第二軍都指揮使天武左第一軍都虞􅃸劉遇領潘州刺史充宣武上十都指揮使丙申以金槍直都虞􅃸安習領冨州刺史充拱辰上十都指揮使内貟僚直都虞􅃸張斌領巖州刺史充拱辰下十都指揮使天武右第一軍都虞􅃸張訓領溪州刺史充宣武下十都指揮使馬歩軍副都軍頭張鐸領錦州刺史充鄆州馬歩軍都指揮使神衞左第一軍都虞􅃸常德領溪州刺史充御龍弓箭直都虞􅃸戊戍有大星流入羽林光明燭地是秋大􅀬上以宰相趙普􅂄年詔許每日長春殿對罷便歸私第頥養􅃸涼赴中書視事普頓首謝丙午詔曰西川編戸繁庶民間食鹽不足自今關西階文青白鹽峽路井鹽永康崖鹽等勿復禁許商旅貿易入川以濟民食丁未衞尉卿崔仁冀卒仁冀字子遷餘杭人也少篤學有文采事呉越王錢俶累遷至元帥府推官隨俶入朝授淮南節度副使俶又薦仁冀稱才可用擢授衞尉卿判大理寺乆之出知宿州踰年移知撫州以疾求代歸闕途至南康軍卒年六十三己酉以蔡州刺史符昭愿知并州均州刺史盧漢贇知平塞軍辛亥以忠武軍節度使潘美知鎮州癸丑以龍衞右第二軍都虞􅃸張玘領巒州刺史充捧日右第三軍都指揮使八月乙卯朔司天言壽星見丙辰以亳州防禦使譚仁美知寜邊軍六宅使何承矩領潘州刺史丁巳以前龍衞都指揮使張思鈞領澄州刺史思鈞先陷幽薊累年今逃歸故有是命甲子以宣徽南院使郭守文充鎭州路都部署丙寅彰武軍節度使米信來朝辛未以河南府法曹參軍梁正辭棣州司法參軍吕易從齊州司法參軍李祐之宋州楚丘縣主簿喬蔚陳州宛丘縣尉羊道沖並授將作監丞分補中書諸房堂後吏先是宰相以堂吏缺欲選於百司以補之上不許因令吏部選正辭等充焉甲戍月掩建星戊寅武勝軍節度使鄧王錢俶薨俶字文德名上一字犯宣祖廟諱呉越武肅王鏐之孫文穆王瓘之第九子也母呉氏瓘卒其子佐立佐卒弟倧理國事倧即俶之兄也晉開運中俶出爲台州刺史下車數月有僧德詔謂俶曰此地非君爲藩之所冝速歸不然將不利矣俶從其言即求還國是年冬倧爲牙校胡思進所廢請俶揔國事漢乾祐初制授東南面兵馬都元帥鎭海鎭東等軍節度使開府儀同三司檢校太師兼中書令杭越等州都督呉越國王三年江南僞將查文徽宼福州俶發兵擒文徽獻捷于朝尋授尚書令周廣順初授諸道兵馬都元帥顯德元年授天下兵馬都元帥四年夏四月杭州火災府寺官舎悉爲煨燼將延及倉􅁃俶命酒祝之曰食爲民命􅀂盡焚之民命安仰火遂止國初授天下兵馬大元帥是年宣國軍節度使呉延福俶之舅也有異圖左右勸俶誅之俶曰吾以先夫人同氣之故安忍置之於法言訖因嗚咽流涕終全呉氏之族開寶八年朝廷舉兵平江表以俶爲昇州東南招撫制置使江南國主李煜貽書于俶其略曰今日無我明日豈有君一旦明天子易地酬勲王亦大梁一布衣耳俶覽書投之地曰以此誘人不亡何待因表其書來上太祖嘉其忠俶遂率前鋒抜常州制授守太師江南平九年二月與其子惟濬妻孫氏來朝太祖遣皇子興元尹德昭至睢陽迎勞洎至對見之禮皆從異等館于禮賢宅車駕臨􅄑尋賜劒履上殿詔不書名封孫氏爲呉越國王妃是年三月詔遣歸國留其子惟濬扈從赴洛陽郊祀上嗣位太平興國二年四月來朝因籍其府庫地圖以獻徙封淮海國王以其子惟濬爲淮南節度使惟治爲鎮國軍節度使其諸子弟姪將佐各分領節制牧守五年夏俶以足疾賜告上親臨撫問八年三上表讓元帥從之雍熈元年改封漢南國王四年春上以俶抱病俾遂頥養授武勝軍節度使改封南陽國王俶拜章固辭國王之號因改封許王端拱元年春徙封鄧王㑹上遣使以生辰器弊就賜之俶方與使者宴飲罷殆暮有大流星墮于正寢前光燭一庭是夕暴薨年六十俶以天成四年八月二十四日生至是年八月二十四日卒人皆異之上聞訃震悼輟視朝七日追封秦國王謚曰忠懿命中使監䕶喪事葬洛陽俶任太師尚書令兼中書令四十年爲元帥三十五年窮極冨貴福履之盛近代無比頗知書能草􅀠性謙謹未嘗忤物然崇信釋氏在錢塘日造寺數百歸朝又以其愛子爲僧甞乆病家居有黃門趙海􅀍酒中夜直造俶第求見俶因出藥一九與之云此藥上所賜願王爲海即餌之俶家人皆號泣勸俶勿餌恐藥有毒且疑上遣海賜之也俶曰主上待我厚使者賜藥必良藥也又何疑哉因大嚼以巵酒下之海去以其事聞上怒捕海繫獄決杖流海島識者許其忠己卯詔曰三司吏自今除歳給衣糧外每月前行特支料錢五千後行三千食廚料前行二千飯料後行千五百自前行巳上每年並令吏部流外銓較考至五考無曠闕許參選前行注中縣簿尉句押官注望縣簿尉官滿勒歸司如未願出官者亦聽孔目吏依雍熈四年五月己丑詔書從事右千牛衞上將軍呉處􅁉卒處􅁉字恭美許田人也少爲本郡吏漢祖鎭許昌一見器之署爲右職及移鎮太原又以處􅁉從漢祖即位授引進使轉内客省使隱帝立遷宣徽北院使時李守貞叛河中命周祖爲統率討之以處􅁉爲行營都監旣班師出爲鄭州防禦使周有天下慕容彦超叛於兖州周祖親討之處􅁉爲御營使彦超平移授汝州防禦使丗宗嗣位入爲右衞大將軍遷右金吾衞大將軍國初判街仗事上即位轉右千牛衞上將軍判金吾如故至是卒年八十八贈太尉處􅁉性頗麤率言多輕肆接物之禮殆缺如也先是同列王彦超致政巳乆處􅁉常自云處􅁉縱僵仆於玉陛前斷不學王彦超七十便致仕人傳以爲􅀏每朝㑹及後苑賜宴上憐其壽考多面加撫諭焉庚辰永清軍節度使駙馬都尉王承衍橫海軍節度使駙馬都尉石保吉彰德軍節度使駙馬都尉魏咸信各赴鎮以鄯州觀察使駙馬都尉呉元扆知孟州以右司諫直史館王仲華爲淮南轉運副使監蔡御史程文度爲河北西路轉運副使車駕􅄑太學命博士李覺講周易泰卦賜雜綵五十叚移幸玉津園習射上中的者五張樂賜從官飲辛巳上謂宰相曰朕昨日聽􅀃泰卦而文理深奥足以爲君臣鑒誡朕與卿等遵守之趙普等頓首謝以右衞上將軍判右金吾街仗宋渥判左金吾街仗事左千牛衛上將軍曹翰判右金吾街仗事廣州上言清逺縣公署中有合懽􅀣一株髙百餘尺今年三月十日有鳯捷集其上鳯髙六尺下有衆禽隨從樹下生芝草三莖畫圖來獻樞密直學士􅆿部郎中李繼凝卒繼凝故宣徽使處耘兄作坊使處疇之子也漢乾祐初天德軍節度使郭勲奏爲豐州永豐縣令周顯德中改國子律學博士上即位遷四門博士出知房州改太常丞知唐州六年拜監察御史未幾充開封府判官改殿中侍御史踰年轉􅆿部貟外郎充兩浙轉運使尋知杭州召歸闕改􅆿部郎中充樞密直學士至是卒年五十一葬事官給繼凝無文采性頗廉謹所至皆以勤幹稱屢爲宰相趙普推薦上於便殿召繼凝與語諭以將大用之意繼凝心喜旣歸忽中風􅅭是夕卒九月乙酉朔以冀州防禦使田紹斌爲解州防禦使以侍衞馬軍都指揮使李繼隆爲定州兵馬都部署宣徽北院使簽署樞密院事楊守一卒守一故上晉邸㳙人即位自供奉官遷翰林副使初名守素至是賜名守一與趙鎔柴禹錫相里勲等告秦王廷美隂謀不道等事擢爲東上閤門使判四方館事内客省使並兼樞密都承旨遷宣徽北院使同知樞密院事至是卒贈忠武軍節度使葬事官給丙申以起居郎夏侯嶠爲襄王府翊善庚子以懷州防禦使王超領誠州刺史澤州團練使王昭逺領勤州防禦使並充殿前都虞􅃸左千牛衞大將軍鄭彦華卒彦華福州長樂人也少有膂力本道節度使李達以􅀠帳下補勇勝軍都指揮使與留從効陳洪進董思安張漢思戍臨汀一日馳獵彦華獨射殺乳虎於寜化山中從効等皆服由是知名江南遣大將王崇文等率師七萬攻圍福州崇文卒李興登城詬罵李逹逹不勝其憤募生得興者彦華請行夜縋出城外壕中伏岸傍興嫚罵如初彦華操長鈎鈎而拉之皆墜水中城上引綆與興俱縋而入萬衆鼔譟達得興而甘心焉㑹崇文食盡引軍退彦華益以拳勇聞於郡中歳餘劒州刺史陳誨治水軍數萬攻圍逹會積雨江漲誨􅆓流七百里一夕至城下彦華將兵屯􅃸官自度力屈以所部降誨誨與語大竒之留署軍小校時江南李景以淮右用兵不利遣禮部尚書潘承祐使福建募驍果以備濠泗承祐以林仁肈及陳誨子德成曁彦華應詔後皆至節鎮彦華率兵與周師相持淮上大小百餘戰身􅀍五十餘創累遷至節度使同平章事王師征金陵旣自採石渡江李煜遣彦華督水軍萬人又遣別將杜真率歩軍萬人逆戰誡之曰水陸兩軍相爲表裏則師克濟矣旣行真乃率兵先往彦華擁兵不救真於是敗散自是城中喪氣閉壘不議戰矣江南平授左千牛衞將軍上親征河東以彦華爲京城左廂廵檢從曹彬北征以彦華督糧運累遷至左屯衞將軍改左千牛衞大將軍至是卒年七十三丁束吏部侍郎兼袐書監李至上言著作局撰告饗宗廟及諸祠祭祝文稱尊號唐室已來惟開元禮有之稽古者以爲非禮且尊號起於近代請舉舊典饗宗廟稱嗣皇帝臣某諸祠祭稱皇帝斯爲得禮從之主客郎中和峴卒和峴字晦仁周右僕射凝之子也以門䕃七歳爲左千牛備身十六爲著作郎國初授太常博士從祀南郊峴賛導乗輿進退閑雅太祖謂近侍曰誰氏之子何相禮之明辨乎左右即以峴門閥對尋拜􅆿部貟外郎兼判太常寺先是王朴竇儼考正雅樂有所未備者峴繼而成之遷司勲貟外郎判吏部南曹出爲夔晉二州通判上即位遷主客郎中知兖州改京東轉運使峴性苛刻鄙吝好殖財貨復輕侮人嘗以官船載私貨敗易規利爲彰信軍節度使劉遇所發坐削籍配􅀠汝州禁錮未㡬起爲太常丞分司西京踰年復授主客郎中判太常寺兼禮院事至是卒年五十六太宗皇帝實録卷第四十五書寫人張伸初對王丗昌覆對訖劉孝廉
