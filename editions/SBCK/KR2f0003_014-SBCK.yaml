front:
  text: 太宗皇帝實録卷第四十四起端拱元年三月盡六月三月戊午朔以左監門衞將軍侍其稹爲本衞大將軍庚申以户部郎中喬維岳爲兩浙轉運使馬歩軍都軍頭田斌爲冀州防禦使壬戍左神武軍大將軍順州團練使王繼昇卒繼昇冀州阜城人與子昭逺同事上於藩邸性質朴謹愿上頗信任之即位補供奉官累遷軍器庫使㑹陳洪進獻地泉州賊十餘萬據游洋洞叛命繼昇討平之歸遷左神武將軍領順州刺史知發運使事號爲稱職遷本衞大將軍領團練使至是卒年六十四上頗嗟悼以舊恩詔贈洋州觀察使令中貴人護葬事癸亥許州言行軍司馬李惲卒惲字孟深開封陽武人也少力學爲文漢乾祐中舉進士及第惲妻父任嵐州合河令惲與其妻省之㑹劉崇拒命僞署州從事擢知制誥翰林學士累至司空平章事惲在僞􅀖頗盡忠所事母任氏在郷里不知存亡居常戚戚不樂但以弈棊飲酒爲務政事多廢劉繼元頗以爲言方與僧弈棊繼元命近侍直抵惲前取博局焚之惲怡然徐詣繼元謝繼元又切責之來日別造新局弈棊如故歸朝爲殿中監始知母亡上表求追服母喪詔不許出知廣州改司農卿連知許孟二州以足疾不任朝謁上章求解官出爲忠武軍司馬至是卒年七十三惲有器度善談名理故相王􅄎薛居正李昉皆與之善重其爲人􅄎與昉皆惲同門生也甲子詔曰朕嗣守丕基君臨萬國每旁求於俊乂思茂育於􅀺元然則官脩其方而罕聞舉職政失於上而莫之肯言置五諫以何施列七臣而焉用是以明發不寐耿歎良深冝申誡勵之文用警搢紳之士應兩省諫官等自今後各思砥礪共守箴規政有不便者咸得上言事或乖當者悉須陳請儻能中時利病廣朕聦明必當􅅄乃公忠優加爵賞或心非鯁直志在回邪殊無藥石之言但藴脂韋之行如斯巧僞必寘嚴刑至於御史臺郎寺卿宫尹儼簮裳於著位荷榮寵於公朝是冝振紀律於憲臺肅羽儀於㑹府服勤卿寺陳力春坊共傾許國之心副我官人之意咨爾有位咸聽朕言先是臣僚上章言事者率多虚誕蓋僥求􅄑進之心􅎊以成風人莫之舉而諫官廢職未嘗聞箴規謇諤之言上勵精求理思致太平乃責任諫官使極言得失至於有位之士欲令各稱其職故降是詔以申警之己巳以右正言宋沆爲京西轉運副使以樞密直學士比部郎中徐休復爲左諫議大夫依前樞密直學士甲戍以袐書監錢昱爲工部侍郎詔曰朝廷設爵位以待賢能明􅆿法以馭羣下茍回邪之自露在典憲以冝行樞密副使工部侍郎趙昌言早以微才擢居重任訐謨之效未見於盡忠險詖之蹤頗聞於樹黨交結非􅀋玷辱清朝比合分首從之元情正􅆿書之顯戮特寛窮究以示包荒俾出佐於藩垣仍不奪於章綬噫予之待士豈忘於至公爾之戴君頗乖於誠節冝思自咎勿謂無恩可責授崇信軍節度行軍司馬仍不得簽署公事同日詔曰爵禄所以育賢能􅆿罰所以正綱紀顧爾回邪之輩玷予明備之朝爰舉憲章是爲公議鹽鐵副使户部郎中陳象輿等自膺選任累踐清華戴君旣乏於盡忠結黨乃通於非􅀋險詖無已蹤跡自彰冝並寘於嚴誅用顯懲於多士特寛窮究以示恩容俾佐郡城頗屈􅆿典爾冝自省法不虚行象輿可責授復州團練副使度支副使􅆿部郎中董儼可責授海州團練副使司封貟外郎知制誥胡旦可責授坊州團練副使右正言直史館梁顥可責授􅉑州司户參軍坐昌言之黨也象輿素與昌言善董儼胡旦皆昌言同年生顥又常在昌言幕下四人皆與昌言厚善日夕多㑹於昌言之第故京師有陳三更董半夜之言先是有傭筆人翟潁者姦險誕妄素與胡旦親狎旦知可使乃作大言怪誕之辭使潁上之初爲潁改名馬周以爲唐馬周復出也其言多排毀持政自薦可爲天子大臣力舉十數人皆公輔之器令昌言内爲之助人多識其辭氣知旦之爲也㑹京尹陳王使親吏儀替廉知其事白上捕馬周繫獄時張去華爲府判官親窮治之具􅃺聞上怒杖馬周脊黥面流海島禁錮終身昌言等並加貶黜先是蘇州人徐半千亦詣闕上書言事上召見與語頗竒之因賜名巖􅅱擢爲陳州户曹椽巖叟請告歸郷里迎妻子因恐喝州郡恣爲不法事本路轉運使以聞㑹馬周之敗上怒亦令杖巖叟流海島乙亥詔曰鄭州團練使侯莫陳利用身本賤微性惟險詖結黨潜誣於良善在官但恣於踰違惡跡滿盈醜聲騰沸尚尸榮於列郡實有玷於清朝冝屏姦邪用行黜削可除名配商州禁錮利用西蜀人始賣藥於都市多變幻之術誑惑閭里時樞密承旨陳從信得之以爲方士遂聞於上即日召見驟加恩遇遂歷職外内累至單州刺史鄭州團練使前後賜與寵澤莫二恃以左道得幸於上無復畏憚所爲不法至於居處服玩皆僣乗輿宫殿之名他亦稱是依附者頗獲薦用士君子畏其黨而不復敢言㑹趙普再入中書廉得其狀乃力於上前盡發其事因遣近臣就按咸得姦􅃺故貶竄焉普復上言以爲利用罪重責輕未塞天下之望存之何益上不獲巳尋賜死於商州旣而悔之遽遣使馳傳以免其死使者至新安廐置馬踣墜傷趾追不能及利用巳磔於市聞者快之丁􅐫火山軍言河西蕃部直蕩族内附己卯翰林學士禮都侍郎知貢舉宋白等言凖敕放進士并諸科舉人程宿等一百二十九人癸未上幸玉津園習射賜從官宴飲乙酉黔州言蕃部首領龍漢璿乞開道以通中國朝貢從之丙戌少府監言本監配役人前太常丞郭冕等九人以㑹赦上請上曰此輩秪可免其居作而終不可復齒朝行蓋以冕等皆贓吏也夏四月丁亥朔建􅀺陽縣爲通利軍以右神武將軍王賔知軍事以右司諫宋泌左正言牛冕並直史館己􅐫制加髙麗國王王治靜海軍節度使􅀺􅁊並檢校太尉國子司業孔維上言請禁原􅅙以益廐馬上覽奏嘉稱令付史館辛卯詔曰先是江南兩浙荆湖州郡所差京朝官幕職州縣官等咸不得家族行如聞中外物情甚鬱今海内寜一願攜家者聽之癸巳詔曰朕祗命上􅀇居尊人上惟思禁暴豈欲加兵至如幽薊之民皆吾赤子毎聞交􅃲䀌然傷懐近者巳許邊疆互相貿易自今􅆓邊戍兵不得輒恣侵掠務令安靜稱朕意焉先是國家累行弔伐千里饋糧民力疲乏至是上頗有厭兵之意故降是詔甲午以工部侍郎錢昱知壽州以前軍器庫使趙延俊爲右班殿直㑹赦自嶺外放還故有是命庚子以國子司業孔維爲祭酒乙巳宴近臣於長奏殿餞感德軍節度使李繼捧之鎮也丙午以監察御史髙象先爲廣南西路轉運使乙酉賜京城耆老九十八人帛各五匹庚戍命考功貟外郎知雜事吕端起居舎人吕祐之使髙麗户部郎中魏庠虞部貟外郎李度使交州壬子賜光禄寺丞知開封府兵曹事蘇恊五品服翰林學士易簡之父也上方寵待易簡故有是命五月辛酉朔詔置袐閣於崇文院以吏部侍郎李至兼袐書監右司諫直史館宋泌兼直袐閣右賛善大夫史館檢討杜鎬充校理按六典袐書省中外三閣掌典圗書古今文字皆在禁中兩漢或徙金馬門外歷代不常厥處唐季亂離中原多故儒雅之風幾將墜地故百王之書蕩然散失蘭臺延閣空存名號上崇尚儒術屢下明詔購求羣書四方文籍往往而出未數年間巳充創於書府矣至是乃於史館建袐閣仍選三館書萬餘卷以實其中故以至主之庚午以東上閤門使安忠護髙陽關屯兵辛未詔賜感德軍節度使李繼捧姓趙氏名保忠上以李繼遷頻擾邊陲欲委保忠邊事故以五色花牋一幅御書姓名以賜之壬申制曰王者鑒丹青之像念公侯必復之徴聞鼔鼙之音重將帥專征之􅀉矧夏臺之奥壤控朔漠之雄邊甘棠之遺愛尚多飛將之英風未泯冝推丗及之典載光節制之權感德軍節度使耀州管内觀察處置等使光禄大夫檢校太傅兼御史大夫天水郡開國公趙保忠神授韜鈐丗傳忠孝頃者抗章象魏來獻提封願宿衞於京師尋載移於旄節屢遷近鎮益見勤王是用特舉新恩俾臨舊地再委邊陲之任慰其夷落之心爾其善繼家聲務綏戎索勉􅀣勲業副我􅀝毗可特授依前檢校太傅行夏州刺史兼御史大夫充定難軍節度夏銀綏宥靜等州觀察處置押蕃落等使戊寅賜定難軍節度使趙保忠金銀器一萬兩英州言江水漲五丈壞民田及官寺數百區庚辰以朔州觀察使左驍衞大將軍趙希賛爲秦州刺史先是王師征幽薊也希賛以城降因授本州觀察使既而棄城來歸上貸其罪故有是命辛巳以殿中丞温仲舒爲右正言直史館壬午定難軍節度使趙保忠辭之鎭賜襲衣玉帶鞍馬錦綵三千匹銀器三千兩別賜錦􅂁銀帶各五百散馬百匹閏五月丙戍朔命許王元僖餞保忠於瓊林􅁐己􅐫以襄州衙内都虞􅃸趙承煦爲六宅使承煦宰相普之子也庚寅以左諫議大夫韓丕知孟州辛卯以洺州防禦使劉福爲髙陽關兵馬部署棣州防禦使楊賛爲貝州兵馬都部署甲午以崇儀使周瑩爲西上閤門使乙未以金部貟外郎王澣爲荆湖轉運副使以前青州録事參軍麻希萝爲工部貟外郎致仕希夢北海人也梁龍德二年擢明經第累居宰字之任素有吏幹凡所踐歷皆有能名以老退居臨淄有美田數百頃積貲鉅萬年九十五齒髪不衰上聞其眉壽召至闕下對於便殿面賜金紫因有是命放歸別墅踰年而卒希萝居郷里常兼并不法毎持州郡吏之長短橫恣營丘人皆畏之丙申賜諸道髙年一百二十七人爵爲公士以正月乙亥詔書從事也按秦爵二十級一曰公士二曰上造三曰簮裊四曰不更五曰大夫六曰官大夫七曰公大夫八曰公乗九曰五大夫十曰左庶長十一曰右庶長十二曰左更十三曰中更十四曰右更十五曰少上造十六曰大上造十七曰駟車庶長十八曰大庶長十九曰關内侯二十曰徹侯凡民爵庶人吏卒得加至大夫第五爵也至漢惠帝詔令民有罪得買爵三十級以免死罪一級直二千凡爲六萬歷代不行至是上始以賜耆年者丁酉交州節度使􅀺􅁊遣使朝貢戊戍以殿中丞㓂凖爲右正言直史館庚子信州言玉山縣民俞携八丗同居詔旌表門閭常稅外免其他役壬寅上御崇政殿試禮部貢院不合格進士諸科舉人得馬國祥等七百人令樞密院給牒以試中爲目謂樞密副使張宏曰朕自即位已來親選貢士大則爲棟梁小則爲榱桷今封疆萬里人無棄材所以不倦孜孜庶臻理本卿與吕蒙正等曩者頗爲大臣所沮非朕獨斷則不及此矣宏頓首謝癸卯定國軍節度使崔翰自髙陽關來朝甲辰宣徽南院使郭守文自常山來朝丙午以水部貟外郎任惟則爲福建轉運使戊申侍衞親軍馬歩軍都虞候彰化軍節度使田重進自易定來朝癸􅐫以左諫議大夫陳恕知澶州六月丙辰朔右領軍衛大將軍欽州刺史陳廷山伏法磔尸於市三日其黨翟賛等四人並腰斬廷山上黨人也少與父崇叛歸太原劉崇累僞署廷山至佐聖指揮使開寶中領所部兵百餘人來降太祖擢爲龍衞都虞候未幾領儒州刺史遷本軍都指揮使出爲濟州光州二刺史上即位雍熈三年從曹彬北征失律責授復州團練副使踰年擢授右監門衞將軍領欽州刺史改右領軍衞大將軍出護冀州戍兵時尚食使石熈古知州事誣奏廷山縱部下卒劉福等放火焚民家朝廷不問狀即就斬福等移廷山知平戎軍自是廷山日夕憂疑心懷怨望因與親吏翟賛等謀爲帛書致蠟九中使部曲田勍齎入虜中召于越令入㓂廷山内爲之應㑹虜復以帛書遺廷山約其入宼之日虜諜者即以帛書詣霸州告之霸州遣戰櫂都監侯延濟捕廷山送闕下詔御史按得實故戮焉丁巳以左諫議大夫劉蟠同知京朝官考課靜江軍節度使杜審進卒審進眞定人昭憲皇太后同母弟也性純質年踰五十不仕太祖受禪徴至闕下授左神武大將軍尋改右羽林大將軍乹德初領賀州刺史知陜州尋授保義軍節度觀察留後五年遷陜州大都督府長史充保義軍節度使太祖幸西洛郊祀審進自鎭來侍祠封國公上嗣位來朝加檢校太尉太平興國五年北征留審進巡警輦轂六年歸鎭九年徴爲右衞上將軍未幾領桂州刺史靜江軍節度使至是卒於京師之私第年七十九上聞車駕親幸哀慟乆之賻贈加等詔親王公主就第哭之輟視朝三日贈中書令謚曰恭惠審進重厚寡言有公侯之體鎭陜郊二十餘年然無尤異之政而勸農敦本民頗便之己未上爲審進素服發哀於便殿羣臣詣崇政殿奉慰丙寅忠武軍節度使潘美自三交來朝丁丑以殿中丞夏侯嘉貞爲右正言直史館兼直袐閣嘉貞有文學嘗任官岳陽爲洞庭賦右散􅀐常侍徐鉉見之曰木玄虚之流也其詞彩又過之上知其名召試禁中稱旨故有是命復以潭州爲武安軍節度先是建隆中湖南平降爲防禦使至是以眞宗兼領始命復之是日上御政殿試進士諸科舉人得葉齊等一百二十九人並放及第上以郡縣闕官甚多先是禮部放牓上慮有司遺才故命右正言王丗則等於武成王廟召諸道進士諸科重試得合格者數百人至是上親試焉甲午詔曰王者設官分職求材任能必􅀂責其廉隅所冝豐其廪禄今州縣之吏最爲親民俸禄至微甚無謂也先是除西川廣南外諸道州府幕職州縣官俸錢三分中二分給以他物自今以緍錢給其半餘以他物充太宗皇帝實録卷第四十四
