body:
  text: 太宗皇帝實録卷第二十九起太平興國九年三月盡四月三月壬子朔宴中書門下翰林學士文武常參官節度􅀚察防禦團練使刺史諸軍校百夫長已上外􅀦蕃客於大明殿上謂宰相曰天下無事良辰宴飲無辭盡醉飲畢以虗爵示羣臣宰相言飲酒過度恐有失儀之責上召權御史中丞滕中正􅀏而謂曰今日宴㑹蓋以君臣相遇為楽朕賜酒欲其􅂬洽苟小有失儀卿可勿舉劾也旣罷因召渤海都指揮使大鸞河慰撫乆之謂殿前都指揮使劉延翰曰鸞河渤海豪􅀅投身歸我朕甚嘉之夷戎之俗以射獵馳逐為楽待秋凉當與馬数十匹令出游獵以遂其性仍賜酒及錢十萬鸞河渤海之酋帥也上征并汾首率小校李勲等十六人部族三百􅀐來降上憐其忠順故有是賜是日以河决􅀅塞命翰林學士宋白乗傳詣白馬津以一太牢沈祠加璧甲寅詔曰蓋聞􅆿者不可復屬死者不可復生故三聴行誅聖人之所至慎一成不變君子之所盡心朕勤恤兆民哀矜庶獄每至三伏炎烝之際隆冬寒沍之時未甞不念彼圎扉憫兹徽纆而猾胥姦吏弄法舞文或苛虐以立威㦯稽留而不决撓憲令之綱紀傷天地之和平而欲百姓阜安四時順序其可得乎應天下繋囚宜令逐䖏州府軍監每十日一具所犯事由收禁月日聞奏仍委􅆿部糾舉乙卯日本􅀦僧奝然與其徒五六人自其􅀦至進銅器十餘事并本􅀦職貟古今年代紀各一卷奝然衣緑自云俗姓藤原氏父為真連真連者其國之五品官也奝然善書扎與中􅀦無異而不通華言問其土風但書以對云􅀦有五經及釋氏經教並得自中國有白居易集七十卷五榖果實四時寒暑大抵􅁼中國多米而少麥交易用錢其文曰乹文大寳無槖駞有水牛驢羊及犀象産絲􅅙織絹薄緻可爱楽有中國及高麗二部􅀦東鄰海島夷人所居身面皆有毛其東則大海無際東粤則産黄金西别島生白銀為國貢賦􅀦王以王為姓年號天地元管六十八州土地廣而人民少壽百餘歳者徃徃有之其􅀦王傳襲今六十四丗矣文武僚吏亦皆丗官上聞之歎曰此島夷耳而丗嗣長乆臣下亦丗官此皆古道中􅀦近自唐季海内分裂梁唐至周丗数甚促大臣子孫鮮能􅁇襲父祖之業朕雖徳不及徃聖然孜孜求理恐庶獄有枉橈未甞敢自暇自􅇣以畋游聲伎為楽兾上􅀇降鍳亦以為子孫計使皇家運祚永乆而臣僚丗襲禄位卿可各冝盡心以輔朕之為治無使逺夷獨享斯􅂟因賜奝然紫衣館扵太平興􅀦寺丙辰選祕書丞􅀭延􅂟等十餘人分為諸州知州上因謂宰相曰刺史之任最為親民非其人則下受其弊昔後漢秦彭為潁川郡守教化大行百姓懐惠乃有鳯凰麒麟嘉禾甘露之瑞􅁕為善政故也以一太守善為政猶􅀂此况君天下者乎何謂太平之不可致和􅂔之不可招也丁已駕幸相􅀦寺回習射於後園上中的者五召近臣飲宴上甚恱因謂宰相曰夏州蕃部並己寕謐向之勁悍難制者皆委身歸順凡得酋豪三百七十餘人約三五萬帳族得十年已來戎人所掠人畜凡二萬五千口朕間者所遣􅀅帥皆丁寕誡諭如蕃部中有狡􅁖為害者必以威武臨之順伏易制者必綏緝慰勞之是以戎人畏威而感惠昨亦不勞饋運秖令齎茶於蕃部中貿易供給亦無所闕又謂李􅁇捧曰爾在夏州能制蕃部乎對曰諸族狡惡不可制臣但覊縻而已若非天威所加豈能制御者乎命􅀦子礼記愽士孔維判監事已未滑州言河决已塞羣臣稱賀先是河决於韓村数州之地皆罹其災上患之集丁夫十餘萬治之自秋逾冬功既旱而復决上以方春播種不欲重煩民力於是􅀤卒五萬人以侍衛步軍都指揮使田重進緫督其役供奉官劉吉副之吉河東人有膽勇不畏彊禦明習河堤利害自賛請行且言河决未塞願夷族上壮之命吉領其役吉親􅀒土與役徒晨夜兼作至是而塞吉之功居多即以吉為西京作坊副使賜予甚厚上製平河歌賜宰臣宋琪等因謂曰昔漢武有瓠子之歌今朕聊志一時之事壬戌以左羽林統軍周保權知并州以右屯衛上􅀅軍孟􅀇珏為宋曹兖鄆都廵檢乙丑召宰相近臣賞花於後園上曰春􅂔暄和萬物暢茂四方無事朕以天下之楽為楽宜令侍從詞臣各賦詩上習射於水心殿宰相宋琪等各以應制詩進上吟味乆之翰林學士承㫖扈䝉有㣲臣自媿頭如雪也向鈞天侍玉皇之句上􅀏謂曰卿善因事陳情也䝉頓首謝辛未詔曰昨以河堤偶决近甸罹哭言念編民載深軫慮應開封府管内諸縣無出今年租賦壬申駕幸含芳園習射上中的者四宋琪奏曰陛下控􅁌􅀤矢一如十五年前在晋邸時上曰朕比徃時筋力雖未覺衰然少時好馬上馳射今不復為矣因謂琪曰囿游之地三数年不一至此且非数出宴游也時劉􅁇元孟􅀇珏錢惟濬李􅁇捧亦侍坐宋琪奏曰􅁇元以下各江南塞北之人甞各據土疆累丗不賔今並束身歸命入侍旒扆非神功聖徳冠絶千古豈有如此之盛乎宋琪李昉吕䝉正李至各賦詩進上皆和而賜之上又製晩春游含芳園五言十韻詩一首賜宋琪等癸酉麟州言閝門使田仁朗敗戎人斬首三百級獲駞馬生口器甲千計乙亥以連州刺史任知杲本官致仕上章告老故也丙子甘露降太一宫祠庭栢􅀣先是都城東南建五福太一祠既成致饗於神祠官悉集未明前数刻而降已卯召宰相近臣宴於後苑上賦詩一章賜侍臣俾之屬和夏四月壬午光禄卿湯恱卒恱字徳川其先陳人後家於江東之青陽父文圭乹寕五年進士登第以丗方亂􅀅南歸梁祖時節制夷門爱其才欲辟扵幕府文圭不欲就遁去至㑹稽錢鏐欲縻之亦不願止去詣宣州田頵頵執甥姓之禮待之文圭但從容談􅀏無所預頵敗獲免至淮南楊渥以為掌書記恱㓜頴悟九歳而􅀌善屬文仕吴為祕書省校書􅀰時張廷翰宋齊丘皆掌吴政以恱俊敏共推薦之授祕書􅀰直門下遷水部貟外􅀰改本曹􅀰中並知制誥李昇建􅀦授中書舎人時書命填委恱援筆立成詞理典贍未幾擢為翰林學士李景􅁇立加學士承㫖遷礼兵部侍􅀰改中書侍􅀰簽署省事罷職拜户部尚書依前充學士承㫖周丗宗舉兵至淮上李景以機務方繁命恱知樞密院事顯徳五年淮南平景遣入貢先是丗宗駐蹕扵􅀭州孝先寺見恱所撰碑歎賞乆之及至待之禮甚􅄖異太祖受禅景擢遷洪州以子煜守金陵留恱佐之煜嗣位拜右僕射充樞密使加同平章事節制潤州不楽在鎮改授太子太傅監修􅀦史旋守司空判尚書省再秉政江南平歸朝改授太子少詹事上即位以恱素有才名召直學士院踰年改光禄卿至是卒年七十三輟視朝一日恱本姓犯翼祖廟諱而名崇義後改姓又改名有詞人從江南來因謁恱從容評及江南文士謂恱曰二徐及公詩皆善帷崇義差不及耳聞者傳以為􅀏癸未以涪陵王子徳恭為􅄘州刺史徳隆為瀼州刺史女壻韓崇義為静難軍節度行軍司馬右衛率府副率叚守榮决杖仍削籍為民坐華州監倉㮣量為姦故也甲申命宰相及羣官分禱京城祠廟祈雨是夕雨􅁕以東上閤門副使王侁為西上閤門使戊子宰相宋琪率文武百官及諸軍􅀅校蕃夷酋長僧道耆老二萬六千三百五十人詣東上閤門再拜稽首上言曰臣等聞皇王大功莫大扵混一中夏古今盛礼莫盛扵登封介丘其􅂉鯨海鷄林已聞于效貢金泥玉檢尚闕於告成則何以􅁇三五之鴻猷副億兆之䖍望臣琪等誠惶誠懼頓首頓首伏惟應運統天睿文英武大聖至明廣孝皇帝陛下紹勛華之正統施造化之􅀇功亘地罄天㒺不率俾望雲就日無所不賔爰自唐室衰㣲四方雲􅅰東吴西蜀􅀲䚯豆分民無邊歸亂靡有定梁唐祚短不暇經營晋漢綱頽莫能恢復陛下膺圖出震執契嚮明四海於是㑹同二儀以之交泰歴代之典章畢舉生民之耳目惟新極千古以牢籠掩八􅃶而覆肓離肩反踵之俗襲冠􅅁者以百数白環碧砮之貢充蠻邸者以千計鑿空萬里攘地千都豈止廣長榆而通大夏􅂕貺交集珍符揔至豈獨歌赤鴈而頌白麟暢􅀇化扵胥庭均至和扵㝢縣歴選列辟盛徳大業未有如此之盛者也是以三事大夫洎于黄髪之􅅱咸願延頸企踵以􅀚大禮于升中是冝訪制云亭追蹤八九以荅􅀇貺以徇羣心􅀂却之而不頋抑之而弗䖏則何以塞神祇之望慰夷夏之心哉伏請申命有司草定儀注擇吉日登泰山昭厥成功以光盛礼臣等不勝大願詔荅曰朕嘗乙夜􅀚書鍳前王之事迹多矣若乃至聖同尭大功超舜厎績􅁼於伯禹敷佑比扵成湯然後可以髙蹈介丘遐登日􅀚告成功於上帝祈景福于下民歴萬代以流光冠百王而擅美者也其或功虧治定徳謝欽明道未洽扵􅀺甿信未孚扵㝢縣安可告成天地展禮云亭朕自纉丕圖若涉淵水方思日慎以答天休止期粗洽扵小康焉敢輙言于大禮卿等忠扵事主善則􅁛君誠雖可嘉事則未暇省覧数四愧畏良深所請冝不允辛卯羣臣再上表曰臣琪等今月八日拜章丹陛􅄋懇明庭叙華夷億兆之心述天地神祇之意乞展告成之禮聿修帝􅁼之儀庶耀􅀇功式昭盛徳遽頒明詔未􅁢丹誠中外顒顒萬知所䖏伏惟應運統天睿文英武大聖至明廣孝皇帝陛下道侔覆載明並照臨追三五以同符體隂陽之不測而自紹開寳運光啓鴻圖親駕戎車自秉武節􅂕旗所指并汾摧破竹之威文誥所施東南無􅀒海之固此陛下武功震耀之力也視朝之暇靡倦􅀚書聴政之餘常聞論道酌百王之步驟盡得英華考夏商之質文皆窮奥妙淳化由是丕変􅀇功以之孔昭此陛下文徳化成之功也若乃萬機在念常切宵衣一物疚懐未嘗高枕故得􅆿清訟息俗阜民和草木效祥盡入朱􅃶之奏羽毛薦瑞皆登清廟之歌臣等歴􅀚自古受命封禅之君交三神之􅂬接千歳之統未有如陛下之盛也况道超軒昊功冠古今而尚闕登封之儀猶稽肆覲之禮臣等有所未諭也伏願拾謙讓之小節思光大之逺圖特詔禮官申明大典遂萬􅀦侍祠之願諧百􅂕望幸之心俾耀寰區以光簡􅉺詔答曰朕恹纉丕圖誕膺駿命屬九服清宴四時順成祥瑞荐臻哭沴不作斯盖天地之垂祐宗廟之降􅂕至扵庶政允􅁵􅂜倫攸叙則輔弼之力戎夷畏服􅆠場厎寕則􅀅帥之效在于凉徳何能致是而文武百辟華夷衆心􅁇􅄋懇以同辞願升中而展禮雖歸功于上足見忠誠而涉道未深殊増媿畏􅂯煩啓廸徒切嘉稱所請冝不允癸已内外文武羣臣三上表曰臣琪等言近者以昇平斯乆告謝猶稽􅂯陳率土之心乞展泥金之礼臣誠既竭乃春未回彌増深薄之􅁨寕逭􅂯三之凟臣琪等誠懇誠廹頓首頓首伏惟應運統天睿文英武大聖至明廣孝皇帝陛下􅂟演丹陵道光赤水勵清明而御俗躬􅀇黙以化人武暢九垓則華夷偃革恩覃萬彚則翔泳懐仁頳莖􅀇甲之祥昭宣緗史文􅃏碧砮之貢洋溢槀街去冬鄒魯遺氓班白舊老掎裳連􅃑萬衆一心咸陳盛徳之容願覩升中之􅂟而皇帝陛下未回宸想猶執謙尊况今上瑞仍臻休徴沓至欽崇􅀇館則湛露垂甘堙塞洪河則榮光順道漢武之窮兵逺代遽紀三山丗祖之乗運中興仍修八陛功㣲大定業謝時雍豈若皇帝陛下今日之盛也又安可乆違􅀇貺高謝鴻名鬰宗社之耿光略皇王之丕訓伏覬采倪寛之徃議詢梁松之舊言俾掌故奏儀司歴練日儼搢紳以戒路肃羽衛于周廬日􅀚儲精俟俟蒼璧之禮天孫冩望迎黄屋之來金泥玉檢以盡誠六舞五声而節歩大備闕典咸秩無文驅彼黎元躋于仁夀垂統成化億萬斯年豈不盛哉豈不偉哉臣等本以㣲生親承大化儻獲侍和鑾而登降事宋琪為封禅大禮使翰林學士承㫖扈䝉為礼儀使翰林學士宋白為鹵簿使賈黄中為儀仗使辛丑以駕部貟外􅀰劉蟠監察御史索湘為泰山路轉運使太府卿馬􅄘卒􅄘太原人仕劉􅁇元至右僕射致仕歸朝為􅀅作監稍遷太府卿分司西京至是卒年八十餘詔輟視朝一日􅄘善服食為壽康彊無疾好持論性鄙恡無他可稱述焉癸卯以儀鸞副使康仁寳等部署丁匠七千五百人修宫壇扵㤗山甲辰布衣趙垂􅂟詣匭上書言皇家當越五代而上承唐統為金徳若以梁上􅁇唐傳後唐至國朝亦合為金徳矧自禅代已來符瑞狎至羽毛之􅁼色白者不可勝紀皆金徳之應也望改正朔易車旗服色以承天統事下尚書省集百官定議右散􅀐常侍徐􅉗等奏議曰五運相承國家大本著于前載具有明文頃以唐末丧亂朱梁􅆲代荘宗以早編屬籍􅁇立丗功親雪􅀦讎天下稱􅂟即以梁比于泚羿王莽之徒不可以為正統也荘宗中興唐祚重新土徳自後数姓相傳晋以金漢以水周以木天造皇宋運膺火徳况􅀦􅀄便祀火帝為感生帝于今二十五年矣而又圎丘展禮已經六􅀕自是日盛一日年榖豊登干戈偃戢必若聖統未合天心焉有太平得如今日此皆上􅀇降祐清廟垂休致成恢一統之運也豈可輒因獻議便從改易恐違眷命深所未安又云梁至周不合迭居五運欲我朝上􅁇唐統冝為金徳且後唐以下奄宅中區合該正統今便廢絶禮實無謂且五代運遷皆親承授質文相次間不容髪豈可越数姓之上􅁇百年之運此不可之甚也按唐書天寳九載崔昌獻議自魏晋至周隋皆不得為正統欲唐逺􅁇漢統立周漢子孫為王者後備三恪之禮當時朝議是非相半集賢學士衛􅊶挟同李林甫遂行其事至十二載林甫卒後復以魏周隋之後依舊為三恪崔昌衛包並皆逺貶此又前載之甚明也况今􅀦家封禅有日冝從定制上荅􅀇休伏乞聖宋永為火徳從之丙午以坊州刺史馮鐸凙州刺史齊超分巡黄河堤堰戊申以侍御史張昉本官知雜事從憲䑓之舉也太宗皇帝實録卷第二十九書冩人楊思恭􅀄對班紹宗覆對霍良弼
