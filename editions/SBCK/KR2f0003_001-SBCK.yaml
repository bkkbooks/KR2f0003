body:
  text: 又攻潤州吴人夜􅀼出焚外柵􅀅帥皆欲馳救承禮曰古人有言撃東南而備西北者此之謂也命士皆擐甲蓐食堅壁不動他壘不設備者悉驚􅅰獨承禮所部整肅吴人不敢窺旣平丹陽遂率兵抵建業江南平太祖録其功特授威武軍節度福州管内􅀚察䖏置等使上即位錢俶盡獻浙右之地以承禮為密州刺史安化軍節度使至是卒年六十七詔輟視朝兩日贈太子太保葬事官給辛未制曰中書舎人参知政事郭贄簮筆持槖獲侍於􅀄潜曵組鳴珂乆塵扵清切頃参台席實代天工而啓沃蔑聞尸素斯極飲酒過量自貽沉湎之譏􅀤言無稽益彰容易之態所宜左降尚屈典􅆿可責授祕書少監壬申以左衛上􅀅軍向拱領左金吾街仗事宥州刺史李􅁇瑗為右清道率府副率庚辰以左諌議大夫宋琪為􅆿部尚書依前参知政事文明殿學士工部尚書李昉守本官参知政事辛已詔開封府管内酸􅀥陽武封丘長垣等四縣民田為黄河水所害及開封浚儀中牟尉氏㐮邑雍丘等六縣民田為蔡河廣濟白溝河溢及水澇所損者並蠲其租鄜州言河水漲溢入城壊官寺民廬舎四百餘區河南府言黄河水漲五丈七尺壊河清縣豊饒務倉庫軍壘民廬舎千餘區荆門軍言長林縣山水暴漲壞民廬舎五十一區凡五十六人溺死陜州言河水漲㫁浮梁壬午免監察御史張巽仍削四任坐通判澶州日縱部下館驛吏擅費用官物而不舉也䕫州言江水漲七尺乾寧軍言御河水漲六尺襄州言漢水漲三丈二尺破虜軍言滹沲河水漲一丈四尺祁州言資河水漲溢入城壊軍壘民廬舎百餘區滄州言葫蘆河漲水八尺雄州言易水漲一丈三尺壊民廬舎癸未駕幸含芳園習射張楽賜􅀙官飲八月戊子朔以祠部郎中羅延吉兼侍御史知雜事辛卯司天言壽星見丙地海門採珠場貢真珠二百二十八斤壬辰制曰古先哲王恭黙思道一物失所在予之罪實深四時不和責躬之言尤切今歳天降霖雨自春徂秋水出平原河决近郡下民離於昬墊大田變扵汚萊蓋念尭舜之功格天不能逃隂陽之数禹湯之言罪已所以致􅀖國之興朕端居九重夕惕若厲㓗粢豊盛以懇禱卑宫菲食以隐􅁨至誠上通和􅂔來應氛霾清霽稼穡豊穰取萬箱而可期食四鬴而何逺宜伸肆眚之澤以荅乃眷之仁應両京諸道州府軍監縣鎮繋囚限徳音到日除十惡官吏犯正枉法贓及謀殺故殺劫殺人外其餘罪無輕重特與除放諸䖏亡命軍人及聚山林為羣盗者限詔到一月並許於所在陳首限滿不首復罪如初配流徒役人等並具元罪犯以聞别聽進止癸巳詔曰桂州管内先配民歳市沙糖及茶園乆荒吏歳徴其課先以官牛給與民歳取租牛死而吏猶督其直関市征常額外増錢百八十貫文並除之官牛二百三十頭賦與貧民丁酉山後兩林蠻王子牟昂等二百三十九人以名馬來貢以右􅀘闕直史館徐休復為職方貟外􅀰右賛善大夫蘓易簡為右拾遺並加知制誥詔曰朕選用羣材分領庶職雖九品之賤一命之㣲未甞專委扵有司必須召對於便殿親與之語以􅀚其能傥敷納之可􅀚必越次而命賞恩或由扵僥倖理未至於澄清自今應親臨選擢官吏並送中書更審勘履歴别聽進止辰州言溪錦叙冨等四州蠻求内附輸租稅詔令州長吏察其傜俗情偽并按視山川地形具圖來上戊戌以故永興軍節度使吴廷祚次子元扆為右衛􅀅軍駙馬都尉徐州言清河漲一丈七尺溢出堤塞城三門以禦之庚戌制曰宥密之務蓋緫扵萬機師長之任實参乎百揆職事斯設在勞􅇣而則殊名器所先固授受而惟允樞密使金紫光禄大夫户部尚書上柱國楽陵郡侯石熈載達識兼濟偉量旁通早在􅀄潜實預賔佐韋􅁌之誡動静有常金石之誠夷險如一自緫鈞軸屢進讜言方参帷幄之謀遽嬰寒暑之疾抗章引退􅄋懇彌堅宜推加等之恩即俟有瘳之喜勉思頥飬式副倚毗可尚書右僕射先是熈載以􅁕疾假滿抗表解職故有是命辛亥詔増周公謚法五十五字美謚七十一字為一百字平謚七字為二十字惡謚十七字為三十字仍令翰林學士承㫖扈䝉中書舎人王祐同詳定蒙等奏議曰上所増五十五字皆可用其沈約宋琛續廣謚請停廢詔從之詔曰史氏之職歴代所先政令之大小必書人君之言動皆録累朝多故舊典闕如䇿書所記言殊為漏落自今軍國謀議宰相與聞者宜令工部尚書参知政事李昉撰録每季終送史館樞密院公事亦令副使一人專知纂録送付史氏昉上言所修時政記每月先以奏御後付所司從之壬子詔曰先是祠部給僧尼牒並傳送諸䖏州長吏親給如聞吏為姦募人以緡錢市取齎以至外郡賣焉得善價即付與之自今所在宜奉行前詔違者重致其罪九月癸丑朔以􅏖苑使王賔領潭州刺史與儒州刺史許昌裔同知水路􅀤運軍器庫使順州刺史王􅁇昇駕部貟外􅀰劉蟠同知陸路􅀤運先是每歳運江淮米四五百萬斛以給京師率用官錢僦牽船役夫頗為勞􅅰至是每艘計其直給與舟人俾其自召募甚以為便而舟数百艘留河津月餘不得去上遣期門䘚偵之計吏自言有司除常載外别科買羊皮赤堊鉛錫蘓木等物守藏者不即受故也上怒奪三司使一月俸分命王賔等領水陸發運自是貢輸無􅆡矣以國子監主簿楊文舉為國子監丞史館徧修宿州言濉河水漲溢䆮民田六十里祕書監錢昱獻太平興國録一卷戊午詔曰近年已來河堤頻決壊廬舎害田畒数郡􅀍其害先是築遥堤以遏水􅀔民利其膏沃多種蓺居䖏於其中河漲即罹其患宜令殿中侍御史柴成務國子監丞趙孚供􅆢官萬彦恭殿直郭載分往河南北岸桉行遥堤有不完䖏發丁男治之民先占堤内種植者免其稅遷於善地焉御製晚秋五七言詩二首賜近臣甲子詔曰臨淮壽春浮梁先禁馬高五尺已上不得渡淮今江浙已平吏猶守舊法宜除之乙丑詔曰國家敦本厚生取什一之稅豊財足用聚九年之儲兵食所資盖不得已尚念力耕数耘之苦祁寒暑雨之勞供王租而旣勤獲地利而甚薄先是兩稅起徴特設三限限外又加一月州縣吏苟務苛虐㒺守章程施鞭朴以立威用掊克而為政不體勤恤之意自求課最之名昔之良吏善治民者有増租􅀙調減年就役之事豈若是乎自今宜令諸州長吏本判官録事参軍專察所屬縣令主簿政治善惡書扵吏部南曺曆子外以其􅃺聞當申黜陟用彰朕爱民之㫖焉先是上謂宰相曰朕視萬民如赤子念其耕稼之勤春秋賦租軍國用度所出恨未能去之此令三限外特加一月而官吏不體朝㫖自求課最恣行箠楚以求辦事此一事尤傷和􅂔宜下令申儆之故有是命丙寅詔曰荆湖江浙淮南諸州每􅀊上供錢帛遣部民之髙貲者護送至闕下非便自今直遣牙校勿復􅅰民先是上謂宰相曰諸州扵部内擇高貲户部送官物民家人質魯無御下之術篙工檝師皆頑猾不逞軰侵盗官物恣為不法民家多破産償之甚無謂也故有是詔授山後兩林蠻王弟牟昻懐化大􅀅軍首領王子牟盖磨忙卑塊並授歸徳􅀰􅀅副使牟計等一百二十人並授懐化司戈丁卯海州言州城内東山坡先廢佛牙寺真身塔相傳言隋末土人扵巖崖間聞誦經聲一日天大雨崖崩土人共見桑門坐於崖下逼而視之膚皃如生人但􅂔息已絶因立塔廟祠之顯徳中詔毁廢佛寺而桑門真身獨存開寳􅀄節度使張鐸親禱之有神光之異鐸欲遷扵城東天大雨雹不果遷而止州民列状願復築宫祠之詔􅀙其請仍賜號聖因院交州黎􅁊遣使貢方物已已以軍器庫使王􅁇昇為左神武􅀅軍依前領順州刺史洛苑使王賔為右神武􅀅軍依前領演州刺史庚午吐蕃戎人以名馬來貢召見其酋長於崇政殿因謂宰相曰蕃戎言語不通衣服異制朕常以禽獸畜之自唐已來頗為邉患以國家兵力聊舉偏師即可驅於数千里外但念其種族蕃熾各安其土儻盡驅之必恣殺戮所以置於度外存而勿論也各賜酋長束帛以慰撫之癸酉詔曰廣州􅀊貢藤每斤去皴麤外中用者才三兩大通冶歳輸鐡尚方鑄兵器鍜鍊外十纔得其四五自今嶺南貢藤取其堪用者大通冶輸鐡先鑄成器俾官工淬治之無使􅀒重致遠匱民力焉丙子占城獻馴象能拜伏詔飬扵寕陵縣丁丑以河决未塞命樞密直學士張齊賢乗傳詣白馬津以太牢沉祠加以璧太平軍言􅄓風拔木壊官寺民舎一千八百十七區海門採珠􅂣貢真珠一百二十斤冬十月甲申詔徴侍衛馬軍都指揮使定州兵馬部署未信赴闕以新譯經五卷示宰相因謂之曰浮屠氏之教有禆政治而梁武捨身為寺家奴布髪扵地令桑門踐之此真大惑朕甚不取也先是胡僧自西域齎貝多葉經至朕因令以華語譯之殆百餘卷雖小道亦有可􅀚卿等試之蓋存其教耳非溺於釋氏者也以西天竺中印土譯經三藏僧法護為明法大師戊子詔祀土徳扵黄帝壇珪幣牢具如大祠制禆祠官領之已丑乹明節羣臣上壽越州以王羲之􅀞像并其石硯來獻庚寅詔賜諸軍校百夫長已上建州茶有差并賜諸營卒翦草茶各一斤丁酉宴中書門下翰林學士樞密直學士文武常参官節度觀察防禦團練使刺史諸軍校百夫長已上諸州進奉使外國蕃客扵大明殿戊戌命西八作坊使張璿知房州詔皇長子衞王徳崇改名元佐第二子廣平郡王徳明改名元佑第三子徳昌真宗舊名改名第四子徳嚴改名元雋第五子徳和改名元傑皇姪孫文雍改名惟吉文治改名惟正文起改名惟忠文扆改名惟貞已酉制曰入緫國政實冠三司之崇出分閫寄聿當二老之任所以推恩禮扵輔弼伸􅀝注扵勲賢斯為大猷豈敢虗授開府儀同三司守司徒兼侍中昭文館大學士梁國公趙普挺鍾間氣冨禀謀明草昧之􅀄締􅌟之功克著巖廊之上啓沃之效居多朕疇咨老成参用舊徳􅂯授鹽梅之寄用師薬石之言彌縫之績既彰調燮之勤期著煩我耆艾職兹樞衡授以蕃宣均其勞􅇣用加掌武之秩以増衞社之雄大啓南陽夾輔王室可檢校太尉兼侍中行鄧州刺史武勝軍節度使是日制以皇長子衞王元佐進封楚王第二子廣平郡王元佑進封陳王第三子真宗舊名第四子元雋第五子元傑並授特進檢校太保同中書門下平章事上柱􅀦真宗舊名封韓王元雋封冀王元傑封益王以保静軍節度使劉遇為滑州刺史武成軍節度使太宗皇帝實録卷第二十六
