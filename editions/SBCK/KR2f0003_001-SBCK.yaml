front:
  text: 太宗皇帝實録卷第二十六起太平興國八年六月盡十月六月乙酉朔以給事中直學士院徐􅉗爲右散􅀐常侍以職方貟外􅀰髙繼申為兩浙諸州轉運使丙戌河南府言洛水漲五丈餘壊鞏縣官寺軍壘民廬舎殆盡左諌議大夫知開封府邊珝卒珝字待價華州下邽人父蔚仕至太常卿珝天福六年舉進士登第解􅄄授祕書省祕書郎直昭文舘遷右􅀘闕起居舎人改庫部職方貟外􅀰受詔知通州以牢盆賦於民大煑鹽於􅀰山歳得萬餘石國􅀄岀為洛陽令徴為倉部􅀰中隴蜀平命珝知三泉縣入為職方郎中􅀭州言民盗殺廣陵縣尉謝圖父捕繋民凡三百日獄未具州以聞命珝按之盡得其實民抵罪開寳中知揚州㑹征江表兼領淮南轉運使上即位遷吏部郎中嶺南轉運使徴為右諫議大夫領吏部選事移知開封府至是卒年六十三珝強力有吏材上方欲􅀝用及聞其死嗟嘆者数四賜其家絹百匹錢二十萬以營葬事丁亥以翰林學士中書舎人李穆知開封府膳部􅀰中知雜滕中正為右諫議大夫權御史中丞吏部􅀰中許仲宣為左諫議大夫依前嶺南轉運使兵部􅀰中劉保勲為右諌議大夫􅆿部􅀰中辛仲甫為右諌議大夫依舊知益州以庫部貟外郎楊徽之為􅆿部􅀰中大理正孔承恭為庫部貟外􅀰同考校京朝官殿最甲午河南府言榖水伊水洛水􅈆水暴漲溢出岸壊官寺軍壘寺觀祠廟民廬舎萬餘區溺死者以萬計丁酉詔曰自今京朝官知録事參軍及知縣事者見本郡長吏用賔主之禮宴集班位其常参官在判官之上未常参官在推官之上所乗馬並不得用繁纓違者所在以聞當行責罰已亥制曰漢以尚書平䖏奏議魏以中書参掌機密􅀖國之務率繋扵樞衡軍旅之謀多出扵帷幄授受之際厥惟難哉宣徽南院使兼樞密副使金紫光禄大夫檢校司徒上柱國瑯琊縣開國男王顯器量恹宏􅁭􅂕秀拔常事藩邸備極公忠累踐榮班遂膺顯用風雨如晦益勵匪躬之誠夙夜惟寅愈挺致君之志樞機之任獻替尤資冝正名稱用伸毗􅀝勉堅許􅀦之節式副知臣之明可檢校太保充樞密使進封本郡侯上召謂顯曰卿代非儒門少罹兵亂必寡學問今在朕左右典掌萬機固無暇􅀶覽羣書命左右取軍戒三篇賜顯曰讀此亦可免扵面牆矣又以宣徽北院使柴禹錫為宣徽南院使依前樞密副使右諌議大夫王明為給事中依前充鹽鐡使左衛􅀅軍陳從信為本衛大􅀅軍依前度支使潭􅆿言長沙縣民翟景鴻五世同居内無異㸑詔旌表門閭常稅外免其他役陜州言永定澗水漲溢出岸壊民廬舎軍壘千餘區丙午乾寧軍言御河水漲七尺五寸戊申新及第進士王世則以下十八人送中書門下䖏分餘並送流内銓命文明殿學士李昉樞密直學士張齊賢王􅃆中書舎人王祐同於吏部注擬上謂李昉等曰天下州縣闕官朕親選多士忘其飢渇召見臨問以􅀚其才豈望抜十得五但十得三四亦巖穴無遺􅇣朝廷多君子矣朕每見布衣搢紳間有端雅為衆所推舉者朕代其父母喜或召拜近臣必擇良日欲其保終吉也朕於士大夫無所􅀒矣昉等拜謝已酉兖州言泰山父老并瑕丘等七縣民陳延福等千四百九十三人自言詣闕請封禪遣􅀚察判官廖文鐸護送之辛亥賜樞密使王顯開封府道徳坊宅一區賜宰相文明翰林樞密直學士中書舎人節度􅀚察使建州所貢新茶秋七月甲寅朔工部侍􅀰致仕劉載卒載字徳輿范陽人唐節度使緫之五代孫也父昭任潁州下蔡令載後唐清泰中舉進士及第解􅄄授祕書省校書􅀰累遷左拾遺集賢殿學士改殿中侍御史周顯徳中歴倉部貟外􅀰知制誥擢拜右諫議大夫給事中國􅀄出知貝州代還奉使江表復命知鎮州坐與兵馬部署何􅁇筠不協為所構太祖惡之出為山南東道節度行軍司馬僅十年上即位徴赴闕復為給事中以老病乞骸改工部侍􅀰致仕仍賜一子出身至是卒年七十六載頗刻勵為學愽通史傳著弔戰國賦萬餘言行扵丗雅好釋氏佞佛甚謹晚年專以􅂼食誦經為事雅尚名節頗為流輩所稱戊午泰山父老辭歸故郡各賜束帛以遣之以新及第進士王丗則等一十八人並為大理評事知縣録事参軍又以第二等進士吴鉉為大理評事史館勘書􅉗餘杭人舉進士嘗重定切韻及上親試因捧以獻旣中第因令隷史館校定字書故有是命鉉所定切韻多以吴音作俗字数千増之鄙陋尤甚尋禮部試貢士為鉉韻所悮有司以聞詔盡索而毁之永不得行用丁卯制曰計功稱代則銘於旂常尚齒􅄖賢則賜以几杖我有舊老時惟宗臣願追赤松之逰盡納水衡之俸不舉殊典何荅元勲開府儀同三司檢校太師行右金吾衛上􅀅軍判街仗司事上柱􅀦邠國公王彦超早擁節旄亟更藩閫許國之誠夙厲臨戎之績素高為列辟之楷模實累朝之勞舊緹􅀐二百􅃂以執金之􅁠宸居九重聿成高枕之適遽形表䟽願避官榮爰推進秩之恩以遂懸車之請􅄖以􅅒給表予眷懐可太子太師致仕仍依舊給右金吾衛上􅀅軍俸料已已安化軍節度使沈承禮䘚承禮字正臣吴興人錢鏐辟置幕下攝䖏州刺史鏐卒子元瓘以其女妻之署以牙校及錢俶襲位加承禮知威武軍節度使王師征江南俶命承禮率所部助攻毗陵平之
