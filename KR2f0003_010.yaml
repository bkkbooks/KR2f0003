body:
  text: 太宗皇帝實録卷第三十五起雍熙三年正月盡二月雍熙三年春正月庚午朔上御乾元殿受朝賀禮畢御大明殿羣臣上壽辛未右武衛大將軍長寧侯德隆薨故涪陵王廷美第二子也太平興國九年以廷美卒出判沂州在任不省郡事但同通判專焉至是薨上為發哀於別殿輟視朝三日詔贈寧逺軍節度使追封臨沂郡公遣內臣監護喪事壬申上賜宰相李昉等元日十韻詩令屬和戊寅以皇姪德彞為右千牛衛大將軍判沂州封長寧侯德彞即德隆之弟也故繼其兄任焉庚辰夜漏未盡一刻北方有赤雲如城至明不散癸未上元節京城張燈上御乾元門樓召近臣宴飲夜分而罷乙酉以殿前指揮使右班都虞候播州刺史馮玉充殿前指揮使左右班都虞候領涿州團練使以馬步軍都軍頭蘇州刺史王杲充日騎右廂都指揮使領寰州團練使以馬步軍都軍頭薊州刺史李延贇充龍衛右廂都指揮使領營州團練使以馬步軍都軍頭春州刺史馬貞充神衛右廂都指揮使領薊州團練使丙戍以左補闕李巨源為司門貟外郎兼侍御史知雜事丁亥天平軍節度使曹彬來朝召之也己丑左衛上將軍向拱卒拱字星民河內人也始名訓避周恭帝諱改焉少負氣以倜儻聞漢祖在太原欲往事之拱雖貧狀貌雄偉途中羣盜意其冨家之子隨之將劫其財拱知之至石會關乃殺其所乘驢大置酒食會里民豪傑者告其故里民曰無苦乃率衆送至太原漢祖不之用客於周祖門下及漢有天下周祖領節制署拱為右職周祖即位授宫苑使改皇城使從征慕容彥超於兖州授客省使知陜州詔還京轉內客省使知延州未幾遷左神武大將軍充宣徽南院使丗宗即位河東劉崇乘國喪舉兵南攻丗宗親率六軍禦之授滑州刺史義成軍節度使河東行營前軍兵馬都監師旋改陳州刺史鎮安軍節度使先是秦鳯帥以其地叛入蜀丗宗舉兵取之擇將未得其人宰相王溥曰是行無以易拱乃授西南行營兵馬都監率兵討平之丗宗征淮南自陳州召至京兼判開封府事詔赴行在復為宣徽南院酒極所欲府中事墮廢不能治盜白日劫人於市中拱不能捕太祖聞之怒以左金吾衛上將軍焦繼勳代之辭日太祖喻之曰西洛久不治故命卿治之無復效向拱也以忠武軍馬步軍都指揮使髙瓊充馬步軍都軍頭領薊州刺史以彰信軍馬步軍都指揮使李贇充馬步軍都軍頭領營州刺史唐州馬步軍都指揮使范廷召充馬步軍都軍頭領平州刺史􅉑州馬步軍都指揮使愼鐸汝州馬步軍都指揮使皇甫繼明商州馬步軍都指揮使韓彥卿並充馬步軍副都軍頭庚寅上將北征以天平軍節度使曹彬充幽州道行營前軍馬步水陸都部署河陽節度使崔彥進副之以內客省使郭守文充都監以日騎天武四廂都指揮使傅潛充幽州道行營前軍馬步軍都指揮使龍衛右廂都指揮使李延贇充前軍馬軍都指揮使神衛右廂都指揮使馬貞充前軍步軍都指揮使濵州刺史盧漢贇充左廂排陳使萊州刺史楊重進為右廂排陳使馬步軍都軍頭范廷召充前軍先鋒都指揮使田斌荆罕帥軍翼之以文思使薛繼昭為前軍先鋒都監宫苑使李繼隆帥軍翼之以光州刺史陳廷山隰州刺史史圭充押陳部署以右神武將軍劉知信六宅使符昭壽充都監以侍衛馬軍都指揮使彰化軍節度使米信充幽州西北道行營馬步軍都部署沙州觀察使杜彥圭副之以蔚州觀察使趙延浦衣庫使張紹勍引進副使董願充行營都監以亳州刺史蔡玉充排陳使馬步軍副都軍頭韓彥卿竇暉充先鋒都指揮使曹美帥師翼之侍衛步軍都指揮使靜難軍節度使田重進充定州路行營馬步軍都部署右武衛大將軍吳元輔西上閣門使袁繼忠為都監辛卯以著作佐郎樂史為著作郎直史館所著貢舉事二十卷登科記三十二卷解題二十卷唐登科文選五十卷唐孝悌録十五卷續卓異記三卷故有是命壬辰以馬步軍都軍頭髙瓊充樓櫓戰棹都指揮使崇儀副使張承儼安德𥙿分為左右廂都監丙申以鎮國軍節度使錢惟治知真定府六宅使曹璨知定州右諫議大夫劉保勳知幽州行府事丁酉詔幽州吏民曰朕祗膺景命光宅中區右蜀全吳盡在提封之內東漸西𬒳或歸覆育之中常令萬物以由庚每恥一夫之不獲眷此北燕之地本為中國之民晉漢已來戎夷竊據逮今不復垂五十年國家化𬒳華夷恩覃動植豈可使幽燕奧壤猶為𬒳髮之鄉冠帶遺民尚雜茹毛之俗爰興師律以正封疆拯溺救焚聿從於民望執訊獲醜即震於皇威凡爾衆多冝體兹意今遣行營都部署曹彬崔彥進等推鋒直進振旅長驅朕當續御戎車親臨寇境徑指西樓之地盡焚老上之庭灌爝火之微寧勞巨浸折春螽之股豈待隆車應大軍入界百姓倍加安撫不得誤有傷殺及發掘墳墓焚燒廬舍斬伐桑棗虜掠人畜犯者並當處斬應收復城邑文武官皆依舊任候平幽州日別加擢用若有識機知變因事建功以節度防禦團練刺史州降者即以本任授之仍加優賞軍鎮城邑亦如之其鄉縣戶民候平定日除二稅外無名科率並當除放凡在衆庶當體朕懷戊戌以給事中參知政事李至為禮部侍郎至素病目及參國政疾復作遂連表乞罷職養疾詔不許固請從之特賜月俸錢十萬二月癸卯賜髙麗國王王治詔曰朕誕膺丕構奄宅萬方草木蟲魚罔不蒙澤華夏蠻貊罔不率俾蠢兹北虜敢拒皇威倔強沙漠之中遷延歲月之命幽薊之地本𬒳皇風向以晉漢多虞戎醜因而盜據詩曰我疆我理南東其畒今國家照臨所及書軌大同豈使齊民陷兹胡虜今巳董齊師旅殄滅妖氛元戎啓行分道間出即期誅翦以慶混同惟王久慕華風素懷明略輸此忠勤之節撫兹禮義之邦而接此犬羊困於蠆毒舒泄積憤其在兹乎便可申戒師徒相為掎角叶比鄰國同力砥平奪其一鼓之雄戡此垂亡之虜良時不再王其圖之應虜獲生口牛羊財物器械並給本國將士遣監察御史韓國華齎詔諭之髙麗西與契丹接境常為虜所侵上知之故降是詔丙午以西上閣門使王侁右監門衛將軍侯莫陳利用並充并州駐泊都監是日宴近臣於長春殿餞幽州道部署曹彬等各賜戎服金帶銀鞍勒馬二匹丁未詔陳王元佑餞諸將于城北園詔曰天下貨財委於邦計事之可否責成有司向者或以公事奏取進止甚無謂也自今合行與否具以狀聞當降敕施行如有大事非本司能了者許本使面奏戊申以國子博士劉厚德為水部貟外郎賜緋厚德丗幽州人也契丹偽署涿州軍事判官知州事太平興國四年幽州之役厚德率官吏舉城降遂受朝命至是令往幽州招誘吏民故遷焉庚戍左拾遺張素等奏諸州多有屬縣繫囚動經旬月此後諸縣鎮或有禁繫不得過十日仍令本州長吏察訪從之壬子以忠武軍節度使潘美充雲應朔州行營都部署雲州觀察使楊業副之磁州團練使郭超充押陳都監丙辰寒食上製詩賜宰相李昉等庚申以右補闕董儼直史館辛酉劒州上言部民張虔父死廬於墓側生瑞草一本圖之以獻詔旌表門閭仍令本郡賜以粟帛乙丑上幸新騏驥院回召近臣宴於後苑上臨池釣魚令侍臣賦詩遂御水心殿習射久之飲從官酒盡醉而罷丙寅右監門衛大將軍陸萬友卒萬友蔚州靈丘人也少隸太原為禆將漢祖起義擢為護聖指揮使隱帝即位出為天雄軍馬步軍都指揮使周祖之起兵也萬友預謀及即位擢為散指揮都指揮使領獎州刺史丗宗嗣位遷龍捷左第三軍都指揮使轉控鶴右廂都指揮使領虔州團練使復改虎捷右廂都指揮使領閬州防禦使恭帝嗣位出為安州防禦使國初歷沂蘄汝三州防禦使開寶中討江南萬友請行會造舟于採石磯以濟師命萬友護焉江南平改和州防禦使上征太原克汾石兩州詔萬友兼知石州事移充鳯翔秦隴等州都巡檢使代歸知瀛州在郡二年為政粗率召歸改右監門衛大將軍充河隂兵馬都監連歲寢疾至是卒年七十三萬友始業圬墁既而貴逹猶不忘本以銀為圬墁器數十事以示子孫性凶暴以武勇自任所至無善政上以其勳舊故終始待遇仍詔以萬友次女為許王妃太宗皇帝實録卷第三十五書寫人張紳初對吕興宗覆對劉孝廉
