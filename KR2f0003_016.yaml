body:
  text: 太宗皇帝實録卷第七十六起至道二年正月盡二月至道二年正月壬寅朔上不視朝羣臣詣閣拜表稱賀戊申上齋宿于朝元殿已酉宿太廟庚戍親饗五室出次南郊齋宫禮儀使宋白上言臣今詳儀注朝饗大廟皇帝先詣罍洗奠瓉祀昊天上帝即未詣罍洗奠玉幣望詣罍洗後奠玉幣為允上遽召宰相問前代祀上帝未罍洗而先奠玉幣於禮可乎吕端等對曰王者親執玉帛以事上帝玉帛者接神之物也於禮尤冝蠲潔若未盥沃而先奠獻殊失恭虔之意宋白奏曰如允臣所陳止一次升壇上􅋏然改容而言曰朕親行郊祀蓋為蒼生祈福若變禮為允固當依卿所奏如合遵舊典雖百次登降亦不以為勞也吕端等皆言斯所謂得禮之中也遂從宋白之議上以文物仗衛之盛因詔有司畫南郊圖凡為三幅外幅列儀衛中幅車輅及導駕官人物皆令長寸餘警場青城别為圖以紀一時之盛辛亥合祭天地於圎丘回御乾元門下制曰我國家誕膺玄貺光啓鴻圖列聖在天鑒臨乎下土羣后在位翊戴于眇躬奄有多方殆兹二紀夙夜寅畏若涉淵谷小心祗惕罔敢遑寧而風雨弗迷蠻夷率服疆埸甫定無復金革之聲田疇屢登聿起京坻之詠流亡云集冨庶可期天瑞荐臻朝政粗治非三靈之眷命九廟之儲祥不榖不德安能致此是用講求典禮祗祀郊丘爰祈福於天宗因讓德于穹昊高煙上逹既展於精誠麗澤滂流冝覃於大慶可大赦天下自至道二年正月十日昧爽已前天下繫囚除故殺謀殺劫殺鬪殺官典犯正枉法贓至死并犯十惡外其餘罪無輕重咸赦除之內外諸軍將士並與兵級優賞文武前任見任官並與加恩文武常參官內諸司使副內殿崇班禁軍都指揮使已上藩鎮馬步軍都指揮行軍使諸道節度副使行軍司馬父母妻並與敘封亡父母即與追贈殿前指揮使及御龍直未有功臣者並與功臣應亡命卒及聚山林為羣盜者限詔到百日許于所在陳首限滿不首即論其罪貶降官未量移者與量移已量移者與復資已復資者與敘用除籍削任免所居官人等並令於刑部投牒三班使臣亦各於本院投牒引對取進止配流徒役人及先配充奴婢等並免為庶人內有曽任職官者件析以聞别聽敕旨文班常參官衣緋緑及二十周年者許以吏部投牒引對五嶽四瀆名山大川及厯代聖帝明王忠臣烈士有祠字在逐處並令精潔致祭近祠廟陵寢處並禁樵採如廟貌隳壞令所在量加修葺天下義夫節婦孝子順孫及高蹈山林不求聞逹者冝令所在搜訪以聞孤老惸獨不能自給者長吏倍加存恤自淳化五年已前諸道州府逋懸租調及官吏監管酒榷茶鹽市征所逋官錢無以償者並與除放貶降官殁於貶所者許令歸葬先削奪官爵並與追復叛逆緣坐者不在此限應官吏殁于王事者先已録其子弟內有妻息寡弱不能自逹者委所在長吏搜訪聞奏諸司職掌及郊廟行事官等並與加恩欠一選者吏部即與注擬欠兩選與減一選者乙卯陕西轉運使上言成州界金坑兩處先是州遣長吏掌之歲課不能充入舊貫望遣使按行更立新制詔曰捐金于山前聖之盛德所寶惟榖舊史之格言朕緬慕太古之風不貴難得之貨何必言利徒以剿民其成州金坑兩處並冝停廢丁已祕書丞高紳上言臣受詔往江南諸州首至宣州勘責部內共欠官物千二百四十八萬數望擇清幹勤事常參官一人專徴督之上召宰相等謂曰高紳言一郡之內逋負官物千餘萬蓋轉運使不稱職長吏非其人之所致也吕端等奏曰近亷得荆湖轉運使何士宗為政苛細河東轉運使王嗣宗蒞事粗率江南轉運使李若拙奉公弛慢上曰悉罷之更授以他任即以若拙知涇州嗣宗知耀州士宗知華州既而遣太常丞黃夢錫乘傳詣宣州挍計民所負官物皆李煜日吏掌郵驛及鹽鐵酒榷供軍稿秸等物以鐵錢計其數逮四十年州郡不為削去其籍夢錫凡撿勘合徴督者才三四萬數民貧皆無以償吏督責猶急夢錫盡條奏其事云乃髙紳廣增其數以誑惑人主之聽顗望恩澤也上覽奏徴夢錫赴闕紳亦不加罪焉以四方館使曺璨知靈州庚申太常寺言音律官田琮以上新增九絃琴五絃阮均配十二律旋相為宫隔八相生並已叶律冠于雅樂以旋宫相生之法畫為圖以獻上覽之喜詔本寺即與琮遷職以賞之辛酉宣政使王繼恩徴赴闕對于便殿慰勞久之丁卯禮部侍郎兼祕書監賈黃中卒黃中字媧民滄州南皮人唐相魏國公耽之四代孫父玭舉進士仕至兵部郎中開寶中坐舉官緣纍削籍上即位起為水部貟外郎卒官玭嚴毅善教子每士大夫家有子弟好學必持刺修謁孜孜誨誘之故舊親黨有未葬者皆有收瘞貧無以自給者悉字飬使至成人為畢婚嫁黃中幼聰悟其父教督甚嚴日誦書千言漢乾祐𥘉舉童子登科年始六歲自是能屬文每觸類必賦詠多傳誦人口其父常令𬞞食日俟業成即得食肉十六舉進士中第解褐校書郎集賢校理遷著作佐郎直史館國𥘉改左拾遺左輔闕判太常禮院黃中多識故實每詳㝎典禮損益得中號為稱職會嶺表平以黃中為採訪使亷直平恕逺人便之凡奏利害數十事皆稱旨江南平受詔知宣州歲飢民多起為盜賊黃中以已俸造糜粥以濟飢民全活者以千數設法招誘盜悉解去上即位拜禮部貟外郎知升州金陵歸復之始人心俶優黃中以簡易為政不任苛察部內甚治未幾召歸闕執政有薦黃中文學高第令召試丞相府稱旨擢為駕部貟外郎知制誥遷司封郎中知制誥充翰林學士未幾真拜中書舍人學士如故俄兼史館修撰同知京朝官考課銓量平允逺近稱之兩受詔知貢舉多柬拔寒雋號為無私又掌吏部選事除擬官吏數千負品藻精當上益知其材拜給事中參知政事召見其母王氏命坐與語曰教子如是真所謂今之孟母矣因賦詩以美之賜豫甚厚故與吕端厚善重其為人端出領襄陽黃中力薦于上因留為摳密直學士擢參知政事黃中之引薦皆此類頗小心畏慎廟堂政事多稽留不決時論以此少之未幾以本官罷出知澧州事上誡之曰夫小心翼翼君臣皆當如是若乃太過即深失大臣之體黃中頓首謝上因謂侍臣曰朕常念其母有賢德年七十餘未覺衰老每與之語甚明敏黃中終日憂畏如此必先其母老矣至所部視事數月疾作俄而瘳受代赴闕黃中先豐碩氣貌雄壯自是頓羸瘵鬱若枯臘上憐之拜禮部侍郎兼袐書監以黃中素嗜文籍而祕府無事優之也才數日疾復作上亟命太醫診視勞問旁午至是卒年五十六而其母尚無恙卒如上言上聞之悼惜贈禮部尚書賵賻加等以其素貧别賜錢三十萬給葬事起三子皆授官既葬其母求見上謝又賜白金三百兩謂之曰勿以諸孫為念朕常記之矣先是黃中之卒上悼惜之甚念翰林無良醫因遍令索京城善醫者得百餘人悉令試以方脈又詔諸道州府令訪能醫者乘疾置闕下俾近臣各得薦所知以隸太醫署其恩遇如此黃中端謹能守家法多知臺閣故事頗接引後進當丗知名之士多由門下出清白恭恪中心常若憂畏未嘗暫釋然善談論亹亹不絶令人聽之忘倦在翰林日上多召見訪以時政得失黃中但言臣職當書詔思不出位至于外事臣何由知上益重之以為謹厚及知政事專務循默無所發明不為時論所許有文集三十卷行於丗戊辰升眉州為防禦使陵州為團練使詔廢諸州司理判官只令參軍專鞫獄訟從著作佐郎虞綽之請也以都官貟外郎梁鼎為江南轉運副使太常丞王挺為荆湖轉運副使以江南轉運副使宗搏為轉運使庚午以翰林學士承旨宋白兼祕書監內侍裴愈自江東還凡購得古書六十餘卷名畫四十五軸古琴九王羲之貝靈該懷素等墨迹共八本詔藏於祕閣辛未詔曰先是祕書郎不給月俸自今冝與著作佐郎同又詔京官先以三十月為滿即罷給俸料自今冝續之並著于甲令二月壬申朔癸酉司空致仕李昉薨昉字明逺真㝎人父超仕至都官郎中集賢殿學士昉自襁褓叔父沼飬為已子沼亦仕至右贊善大夫昉以門子輔齋郎選授太子校書乾祐𥘉舉進士及第解褐袐書郎宰相馮道引昉與吕端同直昭文館遷右拾遺集賢殿修撰周顯德中宰相李榖帥師征淮南表昉為記室丗宗每覽軍中奏記愛其詞理明白多稱善問誰為之左右以昉名對軍還擢為主客貟外郎知制誥充集賢殿直學士會丗宗親征淮南駐蹕壽春城下即行在所拜屯田郎中知制誥充翰林學士在內署頗稱謹密國𥘉真拜中書舍人學士如故俄罷職改給事中會湖外𥘉平受詔祀南嶽因命知衡州未踰年受代歸闕翰林學士承旨陶榖適掌選誣奏昉嘗薦親黨求為東畿令太祖怒召吏部尚書張昭面質其事昭老儒氣直于上前投冠于地抗聲論列云榖罔上太祖終疑之昉亦不自辨出為彰武軍行軍司馬在延州六年以吟嘯柸酒自適徴還復拜中書舍人未幾入直翰林先是盧多遜已先任學士因重陽宴近臣于講武殿太祖見昉在多遜下問其所以宰相對曰昉以本官直學士院非即真即日真拜學士令在多遜之上俄知貢舉會貢士徐士亷訴昉取拾非當太祖召問多遜奏云頗有遺落因命覆試有覆退者坐是左遷太常少卿不踰年復拜中書舍人翰林學士會宰相趙普為盧多遜所構數以其短聞于太祖太祖惑之因訪于昉昉對曰臣書詔之外思不出位趙普行事臣何由而知太祖默然既而普出鎮盧多遜知政事昉獨當制命自江南平洎車駕雩祀西洛書詔填委昉略無凝滯時論稱之上即位拜户部侍郎學士如故受詔與扈蒙李穆郭贄宋白同修太祖實録數年而成從征太原車駕次常山常山即昉之故里有居第園林焉賜羊酒俾為宴樂自丞相卿大夫藩侯悉預會又召班白故老置酒盡歡如是者七日公卿皆賦詩以美其事刋于石師還拜工部尚書充翰林學士承旨改文明殿學士俄以本官參知政事會趙普出鎮與宋琪同拜平章事加監修國史昉建議復時政記故事時政記月終送史館昉先以進御而後付有司時政記進御自昉始也雍熙𥘉郊祀進位中書侍郎平章事如故先是上面授昉與琪為左右傼射昉率琪懇讓得旨止加中書侍郎而已端拱𥘉藉田禮畢布衣翟馬周訟昉任宰相屬戎虜入寇不憂邊事但賦詩飲宴并奏女樂等數事上惡之召翰林學賈黃中草制以昉為右僕射罷知政事令詔書切責賈黃中言僕射中臺師長舊日宰相之任今日工部尚書拜斯為美遷非黜責之義當以文昌務簡均勞逸為詞上然之淳化二年復以本官兼中書侍郎平章事監修國史未幾以嫡孫死拜章求免優詔不許遣張齊賢等就弟諭旨昉復起視事後數月罷先是上召翰林學士張洎草制罷昉為左僕射洎固沮之上不得已止令本官罷張洎因草制書切責昉弼諧無狀昉惶恐就位明年上表求解官凡兩上詔以司空致仕上頗優待之每逰宴必首召昉引至御拓之側上勞問安否又詔大朝會令綴丞相班歲時賜豫一與丞相等二年以三公陪祀南郊得疾將亟召其孫昭迪口占遺表教戒諸子以忠謹無令門户衰替至是薨年七十二上聞之嗟悼輟視朝兩日贈司徒有司諡文貞昉寬厚多恕士大夫稱其長者兩在相位循諱自守無赫赫稱為文章慕白居易標格簡徑易曉為人溫和無城府不念舊惡小心畏謹在相位日不敢有所請託給事中張佖耿介士也昉𥘉甚薄之而雅厚善張洎及昉之罷政事也洎草制深攻昉之短而佖朔望常詣昉第謁見人或謂佖李公待君素不厚佖曰我掌廷尉日朝廷公卿多所請求李公未嘗以私事于我我由此重之故也昉先蓄妓樂所居有園亭城外又有别墅每良辰美景多召親友飲宴娛樂自翟馬周上書後昉甚恐懼因不復逰宴矣昉素病心悸每數歲一發必彌年不瘳常語諸子曰我典誥命三十年勞役思慮而致是疾汝曹當戒之素與盧多遜善待之不疑多遜知政事多譛昉于上人有言于昉者昉曰盧與我厚不當爾後盧敗昉知政事上言及盧事昉頗為揮解之上因言盧多遜居常毁卿不直一錢昉始信上由此益重昉常目為善人丙子宴中書門下翰林學士文武常參官節度觀察防禦團練使刺史諸軍校百夫長已上諸州進奉使外國蕃客于含光殿丁丑寧州團練使侯延廣卒延廣西河平遙人祖益仕至太子太師先是晉末益自鳯翔召赴闕王景崇據城叛盡殺益親屬百餘口延廣時在襁褓乳母劉氏以己子代延廣死劉氏丐扶抱延廣至京師以還益後延廣甫十數歲父仁矩任德州刺史輔牙校會虜數十騎突入州城居民驚擾延廣引親信數騎馳出牙門引弓亂射殺其酋長一人斬首數級悉擒其餘黨仁矩聞之喜曰他日興吾門者必汝也護軍李漢超以其事聞太祖嘉歎詔以錦𫀆銀帶以賜之仁矩死起家授供奉官預修永昌陵督石作功畢賜豫加等會西北戎人擾亂求可使徼巡者左右言延廣將家子習邊事無出其右延廣時𬒳病強起之拜崇儀副使充同鄜坊延丹河西巡撿遣太醫隨延廣之治所視其疾疾亦尋愈叛卒劉渥嘯聚亡命數百人寇耀州冨平縣謀入京兆其勢甚盛所過州郡皆城守渥必殺居民奪其財物縱火而去關右騷然延廣率輕兵數百自間道追之會渥于冨平西十五里衆已千餘人相持久之渥素憚延廣傳言我草間求活視死如鴻毛爾公侯家丗冨貴奈何不思保守而與亡卒爭一旦之命于鋒鏑之下乎延廣怒因急擊之挺身與渥鬪于大樹下斷其右臂因亡走乘勝大破其衆渥創甚止谷中後數日為追兵所獲渥素號驍勇無敵至是為延廣所殺羣盜喪氣餘黨稍稍自歸關右以定上嘉之擢拜崇儀使領奬州刺史知靈州會趙保忠隂結繼遷上遣大將李繼隆率兵問罪以延廣護其軍既而夏臺平保忠就縛受詔知延州兼管內巡撿先是延廣知靈州日戎人悅服部下嚴整李繼遷素避之護軍康贊元害其功誣奏延廣得虜情恐後倔強難制遽徴還以慕容德豐代之部內甚不治至是繼遷寇靈武即拜延廣寧州圑練使知靈州戎人塞道糧餽使命皆不通延廣獨引數十騎之鎮戎人素服其威名皆却略引避既至視事日𬒳病亟謂中貴曰人李知信曰延廣自度必不起家丗受國恩今日得死所矣但恨未立尺寸功以報陛下爾言訖而卒年五十上聞之傷悼賵贈甚厚以其子為六品正貟官戊寅以越王元份為抗州大都督府兼領會稽吳王元傑為揚州大都督府兼領壽春先是二王皆領大都督府長史張洎任翰林學士曰適草吳王制嘗抗疏論列至是洎知政事因郊祀覃慶遂改正焉已卯以左衛上將軍徐國公元偓領洪州都督鎮南軍節度使右衛上將軍涇國公元稱領鄂州都督武清軍節度使先是上謂宰相等曰元偓等可與一徼外藩鎮若內郡國則本郡遣吏來賀蓋為勞擾爾吕端等曰奏故事皇子不合領徼外藩鎮但可下詔本道不得遣人上京可也從之而有是命以河隂縣依舊隸孟州庚辰制曰國家讓德于天聿舉吉蠲之典注意于相冝推蕃庶之恩銀青光祿大夫行尚書户部侍郎同中書門下平章事上柱國東平郡侯吕端嶽瀆粹靈陽秋正氣自參大政式副具瞻接物之誠薎聞於澄撓致君之節曷有於緇磷朕倚之為股肱人望之若霖雨頃以郊祀上帝祈福天宗琮犖具陳梯航畢至汝佐佑薄質翊宣大猷威儀三千率周禮以無爽玉帛萬國奉禹會而益恭文物聲明震疊華裔將順其美時乃之功是冝踐黃闥之崇正夏卿之任併增階秩式示寵光勉罄嘉謨永輔台德可光祿大夫行門下侍郎兼兵部尚書依前同中書門下平章事餘如故給事中參知政事寇凖張洎並加金紫光祿大夫進封郡侯以御史中丞李昌齡為給事中參知政事以皇姪孫左羽林大將軍惟吉領閬州觀察使故魏王德昭之長子也辛已以左諫議大夫許􅋮為御史中丞右僕射吕蒙正為左僕射吏部尚書宋琪為右僕射禮部尚書張齊賢為刑部尚書吏部侍郎張宏為尚書右丞工部侍郎王化基為禮部侍郎餘文武官進位有差以壬子制書加恩故也以水部貟外郎祕閣校理吳淑兼掌起居舍人事戊子以京東轉運使李中庸為劔南轉運使先是轉運使劉錫擅舉牒與元巡檢水丘隆同知利州隆不敢受牒以聞上怒錫專逹故命中庸代之也以兵部貟外郎郭異為京東轉運使工部侍郎錢昱為郢州團練使昱秦國王俶兄之子歸朝領白州刺史上表自陳嘗習文藝求改職除祕書監遷工部侍郎連知宋宿泗等州無善政至是郊祀中外官進秩上謂宰相曰昱貴家子無撿操不冝任丞郎故有是命壬辰內侍裴愈上言先受詔與越州山隂縣令許待旦會稽縣令李易直等同尋訪縣界得晉右將軍王羲之蘭亭舊迹其流抷褉飲處尚在僧子謙狀欲建佛廟殿閣以藏所賜御扎望賜名額從之號天章寺又言茅山道觀凡九處有水田三百頃並免租稅令金壇句容兩縣籍入之歲量供給外餘蓄藏以備修葺及三元齋醮從之戊戍詔先是造明光細綱甲以給卒者無裏冝以紬裏之俾擐者不磨傷肌體焉太宗皇帝實録卷第七十六書寫人杜友諒𥘉對揩書王良弼覆對劉孝
