body:
  text: 太宗皇帝實録卷第八十起至道三年正月盡山陵至道三年春正月丙寅朔上不受朝羣臣詣閣門拜表稱賀丁邜癸酉並輟視朝以孝章皇后啓櫕并發引故也羣臣詣閣奉慰丙子以户部侍郎溫中舒禮部侍郎王化基並守本官參知政事給事中李惟清同知樞密院事以給事中參知政事張洎為刑部侍郎己邜上元節京城張燈上幸乾元門樓宴從官夜分而罷戊子孝章皇后神主還京宰相率百官拜迎於順天門外己丑刑部侍郎張洎卒洎滁陽人少有俊才慱通墳典李景日舉進士及第解褐上元尉遷校書郎景長子燕王冀卒有司諡武宣洎獻議駮正詞理精當擢拜監察銜史自以論事稱旨遂率意彈擊不避權貴大臣遊簡言等共嫉之會景避地豫章留其子煜居守即共薦洎掌煜記室不得從未幾景卒於豫章煜襲位擢為工部貟外郎試知制誥滿歲為禮部負外郎知制誥纍遷中書舍人清輝殿學士參預機密恩寵第一洎故字師黯煜令字偕仁常以字呼之清輝殿在後苑中煜愛之不令旦夕離左右故授以內殿之職中外之務一以咨之每兄弟宴飲宫中作妓樂洎獨得預宫城東北隅賜以大第為寫書萬餘卷别創書堂煜自科著之常至其第召見妻子慰撫賜豫甚厚洎尤好建議每所規畫煜未即行必稱疾不起煜以手扎開釋之始復視事及王師圍城踰年城危甚洎每勸煜勿降廣言符命指引玄象無變金湯之固未易取也旦夕當引退願勿憂又言一旦有不虞當先死社稷既而城陷洎携妻子及金玉重寶自便門入止宫中與摳密使陳喬同升閣將俱死既至喬自經氣絶洎乃下見煜曰臣與喬同掌機務今日國亡當俱死念主入朝誰辨明主所以不死爾將有以報也歸朝太祖召見責之曰汝教煜不降使至今日因出帛書示之乃王師圍城煜遣洎草徴上江救兵蠟丸中詔書也洎頓首請罪曰臣之所為也犬各吠非其主此其一爾他尚多今得死臣之分也詞色不變太祖𥘉欲殺之及是喜拜太子中允上即位以文雅選直舍人院未幾使高麗復命改户部貟外郎出知相貝二州頗簡慢部內不治轉運使田錫言其狀徴還洎求見廷辨上以其儒生不復責以吏事詔不問以本官知譯經院改兵部貟外郎禮部户部二郎中選為太僕少卿拜右諫議大夫判大理寺俄充史館修撰判集賢院事上令以儒行篇刻于版賜近臣及新及第貢舉人洎上表稱述敷引前代以媚上上以其該慱命丞相奬諭數月擢拜中書舍人充翰林學士洎性便佞能伺候人主意博涉經史多知典故每上有所著述及賜近臣詩什洎必上表廣徴引以將順其美與蘇易簡同在翰林數月尤不協及易簡秉政洎旦夕攻之既而昜簡罷以洎為給事中參知政事與冦凖同列先是凖知吏部選事洎掌考功為吏部官屬凖年少新進氣鋭思欲老儒附已以自大洎夙夜坐曹視事每冠帶候凖于省門揖而退不交一談凖益重之因召與語洎捷給善持論多為凖規畫凖心伏遂兄事之極口誇洎于上漸欲進用又知其在江表日多讒毁良善李煜殺中書舍人潘佑洎嘗預謀心疑之待詔尹熙古吳郢皆江東人洎常善待之上一夕召熙古等侍書禁中因問以佑得罪故熙古言煜忿佑諫説太直爾非洎也自是洗然遂擢用蓋凖推挽之也既同秉大政凖亦忌之洎奉事凖愈謹政事一決於凖洎無所參預專修時政記甘言諛詞以自媚於上會議靈州事不稱旨恐懼欲自固權寵上已嫉凖專恣恩寵衰替洎慮一旦同罷免因奏事大言寇凖退後多誹謗上凖但色變不敢自辨上由是大惡凖旬日罷未幾洎𬒳病家居滿百日力疾請對方拜踣於上前明日表解職優詔不允後月餘改刑部侍郎罷知政事捧詔嗚咽疾遂亟後十餘日卒年六十四上聞之軫悼特贈本曹尚書賻禭賵贈加等以其二子皆為六品正貟官洎風儀灑落文彩清麗兼通禪寂虗無之理終日清談亹亹可聼尤險詖好攻人之短舊事李煜及煜歸朝甚貧洎猶丐索之煜以銀頮面器與洎洎怒不得金者時潘慎修掌煜記室洎疑慎修教煜素與慎修善自是亦稍踈之煜子仲宇雅好蒲慱飲宴洎因切諌之仲宇謝過後數月人有言仲宇蒲慱如故洎遂與之絶及仲宇死郢州歸葬京師洎亦不赴吊與張佖議事不協遂為讎隙始父事佖既而不拜尤善事黃門宦官在翰林日引唐故事奏內供奉官藍敏貞為翰林學士使內侍裴愈副之上覽奏謂曰此唐室弊政疑二大臣處處以中人監之朕方恢復古道安肯踵此覆轍卿言過也洎慙而退洎自江東歸朝廷故舊無登其門者性鄙吝雖親戚無所及常與故散騎常侍徐鉉厚善心重之因議事小不協遂絶然手寫鉉文章訪求其筆札藏於篋笥甚於珍玩此其異也庚寅以都官郎中沈繼宗為淮南轉運使工部郎中知制誥胡旦兼史館修撰辛卯以侍衛親軍馬步軍都虞候傅潛為延州路兵馬都部署殿前都虞候王昭逺為靈州路兵馬都部署西京作坊使石普為關右河西巡撿户部使張鑑調發陕西諸州軍糧工部郎中知制誥張秉祠部郎中知制誥馮起翰林侍讀起居舍人吕文仲推節催督之二月丙申朔以許州司馬盧文翰為工部貟外郎同句當陜西轉運事丁酉孝章皇后祔别廟羣臣皆詣閣奉慰庚子靈州行營言敗李繼遷萬餘衆斬首二千級獲鞍馬鎧甲數千計繼遷單騎遁走羣臣稱賀辛丑上不豫止于便殿決事甲辰詔曰朕獲主萬邦于兹二紀囹圄之際專務於盡心肖翹之微常憂其失所矧畿甸之冨庶而輦轂之浩穰方春陽和之時品物鬯茂禁繫猶衆狴犴未空雖多辟之所招在好生而斯切議獄緩死冝順於天常宥過眚災聿遵於時令自至道三年二月九日已前應京畿繫囚死罪並降從流流已下並放戊午詔文武百官並於崇政殿起居自皇太子親王及諸軍校分為七班先是上不豫不御前殿猶孜孜視政事延見羣臣無有厭怠至是以文武班列衆多久坐罷倦而有是詔壬戌大食賔同朧國各遣使朝貢以右諌議大夫雷有終為給事中知并州是月以上不豫皇太子諸王及文武羣臣宦內諸司使諸軍將校各於佛寺齋居會祈福三月乙丑朔永興軍節度使田重進卒重進范陽人形質竒偉有武力周顯德中應幕為卒太祖時統禁軍以重進隸麾下從征淮南有戰功又從太祖北征會陳嬌軍變重進以翊戴功遷御馬軍使纍遷控鶴指揮使領瀼州刺史上即位擢為天武左廂都指揮使領瀼州圑練使改侍衛步軍都虞候豐州觀察使從攻太原部攻城南面會劉繼元降録其功依前領豐州刺史充天德軍節度使侍衛步軍都指揮使未幾河大決滑州房村發卒數萬人命重進護其役既而河塞改邠州刺史靜難軍節度使領軍職如故王師北征以重進為飛狐路兵馬都部署大破虜擒其將大鵬翼監軍馬贇副將何萬通并契丹渤海三千餘人斬首數千級獲鞍馬鎧甲數萬追北四十餘里下飛狐靈丘數城乘勝取蔚州會曹彬不利重進以所部護送蔚州官吏士庶凱旋以功改涇州刺史彰化軍節度使充侍衛親軍馬步軍都虞候出為定州兵馬都部署端拱𥘉改真定尹成德軍節度使移京兆尹永興軍度使至是卒年六十九輟視朝兩日贈侍中重進撲願不知書上在藩邸時日憐其忠勇嘗令給以酒灸重進不肯受使者云晉王以賜汝汝安敢拒重進曰我但知有陛下不知晉主是何人也卒不受上知而嘉其質直無他腸故終始委遇又以長夀縣主適其子守信以寵之丙寅以慎州觀察使桑贊知貝州考功貟外郎張素為荆湖南路轉運使丁卯以工部侍郎張雍知京兆府占城國遣使朝貢庚午以懷州圑練副使宋太𥘉為工部郎中知梓州癸酉環慶路行營言護送輜重已入靈州丁亥出麥豆穗數十以示近臣上曰今歲多稼豐茂數倍常年引手而言其苗過膝桑拓甚盛蠶績必有大所獲喜動顔色壬辰不視朝癸已追班於萬歲殿宣制曰朕聞兩曜麗天不能逃虧􅉴之數四時成歲無以逾代謝之期知冥運之有終乃達人之大觀朕以涼德君臨萬邦二紀于兹庶政咸乂爰從春首憂勞遘災雖藥石之載加奈沉綿而愈劇以至大漸弗寤弗興皇太子克茂溫文夙彰孝愛自處前星之位彌光主鬯之賢嗣守丕圖必符昌運冝于柩前即皇帝位爾其任賢去邪克遵于往誥布德施惠深念于蒸民更賴中外藎臣文武多士一心協佐共致雍熙諸軍賞給並取嗣君處分表紀以日易月山陵制度務從儉約應在外臣僚不得擅離治所只于本處舉哀於戲有生必死品物之大端送往事居前哲之明訓克搆鴻業吾無恨焉是日上崩於萬歲殿太子即皇帝位甲午小殮丁酉百官成服遂大殮翰林學士承旨吏部侍郎宋白上議曰臣聞明一合道曰皇德象天地曰帝聰明文思行也堯舜禹湯諡也王者膺圖受曆應天順人美盛德而試諸難騰英聲而節一惠生有尊號終受大名垂諸簡編如揭日月伏惟大行皇帝允恭克讓豁逹神武千年誕聖彤雲紫氣之祥五行鍾秀日角龍顔之表純孝因心奉宣祖而尊嚴父雍睦悌長翊太祖以肇興王始者姫室下衰梁王在位謳歌獄訟去周歸宋王于出征帝出言邁三靈改卜百姓與能陳嬌有切諌之言京邑無敓􅔯之患市不易肆遂登皇極佐聖之功大也乃荒魯邦乃建元侯內總熊羆肅清禁衛龍潛邸第晦九五之迹鳯德尹京洽億兆之心洎奄有四海為天下君大寶曰位其命惟新改元太平符守文之代於鑠軍政叶下武之時應運之期至也蕞爾汾晉結援林胡逆節亂常兩朝三紀勞人動衆堅不可拔帝赫斯怒定議親征矢石齊攻金湯不守折鐵易于摧枯渠魁倐已銜璧與民更始惠如春陽本封晉王終定厥土受天之命光也漳泉入覲混同文軌抗越獻地一統寰區無思不服無逺弗屆占城于闐之封大食賔同之國獻琛奉贄府無虗月白鸚紫鵲之異神麟丹鳯之靈嘉禾連理史不絶書中孚之信及也經緯天地克定禍亂政之大者必躬親之高臺講武臨軒選士英儒贍聞之鴻慱骨騰肉飛之俊傑天下英雄落吾彀中外之峻級待以清華不十數年有登廊廟而定疆埸者知臣之精鑒也幽有鬼神明有禮樂墜典聿修無文咸秩五展南郊之儀一議東封之禮藉田勸農御摟肆赦釋老之教崇奉為先名山大川靈蹤勝境仁祠仙宇經之營之致恭之誠廣也求賢審官化民成俗為政以德惟刑恤哉置詳刑之曹下考課之令菅蒯不棄涇渭分流時無遺才吏皆守法興廢繼絶矜孤振寡視民如子使無盜乎水旱思艱食為憂幽遐念籲天無所增加使額勤恤人隱納隍之言逺也俯仰山谷詳定隱淪修史氏之職改班秩之稱著治化之書貞觀之風也紀他山之石開元之事也弧矢以威天下善射通神藥石以救齊人仙方填委樂正雅頌無相奪倫幸太學以談經召儒臣而侍讀卑宫室則斷雕為朴減尊稱則法天崇道開理撿以登聞升便殿而崇政立儲定社稷之本清心希大庭之妙治丗之規備也在宥天下二十有二年王澤深矣機務詳矣臣下之歸尊至矣黎氓之受賜多矣越書契以無倫盡帝王之能事還淳反古如指諸掌泥金檢玉方卜近期而鼎成龍至聖駕上仙萬方縞素九域遏密下臣奉詔擬議徽烈丕揚耿光追惟古始巢燧之際載籍未備神黃已還聲明有章若乃兼啇周之質文總唐漢之雄盛乃聖乃神乃武乃文敘全功與全德實映後而輝前也旁稽禮文恭按諡典應變無方不疾而速得不謂之神乎施為于民財成萬物得不謂之聖乎萬邦作憲帝德廣運得不謂之文乎保犬定功奄有九域得不謂之武乎太法太𥘉前志謂太上立德宗以宗德禮經有宗祀配天惟千齡應運之君為百代不遷之主請上尊諡曰神功聖德文武皇帝廟號太宗八月已未以大行皇帝諡册告于南郊庚申告于萬歲殿册曰哀子嗣皇帝臣謹再拜稽首言曰臣聞天地之大莫能形容神聖之功無所擬議然則圓方之象必取于強名堯舜之稱蓋從乎節惠伏惟大行皇帝承天立極執象臨人其生也感大電之精其出也應真人之運聲身為其律度道德作其藩籬若日月之明無幽不燭如江海之量無大不容爰自曆在躬大橫叶繇舊疆來復盡有江吳戎輅親征旋平汾晉皆出于睿斷遣以聖謀繫象不能賾其微鬼神不能窺其奧是以總宇宙于掌握得英雄于彀中宅諸夏以制四維坐明堂而覲羣后髽首貫胸之類接武于藁街景星甘露之祥疊書于册府在宥天下二十年當是時也靈臺偃伯象闕懸書甌脫彌嚴縣道率化物無疵癘歲有順成積粟腐于太倉豐財溢乎內帑材官劔客皆六郡之豪分閫登壇盡萬人之敵自歷代已來未有若斯之盛者也於是賜民酺飲展禮藉田𬒳衮冕於泰壇躬俎豆於清廟幸成均而視學屢覩橫經紀延閣以垂文嘗紆睿思若乃生知多藝天縱聰明灑草隸之華得琴碁之絶擅􅓡矢之妙洞玄釋之微皆作丗揩模出人意表豈力學之能及實振古之未聞大哉邈乎不可得而論矣然猶日慎一日雖休勿休溫顔以盡下情虗已以延讜議一夫不獲納隍之慮每深萬邦有罪在豫之責尤切至若省去徽號漢后之不言聖也杜絶田獵玄元之慮發狂也屏藻井之飾夏禹之卑宫念黃沙之抂成湯之祝網也有一於此猶謂之聖况兼是數者乎方將鳴鑾東夏檢玉介丘而天禍忽臨仙駕長往羣臣咽絶願贖以身萬姓克窮如喪厥考顧惟寡昧虔奉丕圖荒疚哀迷懼不克荷今因山俯畢同軌咸臻敢薦大名爰稽載籍詢慱士禮官之公議叶宰衡庶尹之輿情定諡于南郊得請於上帝謹遣攝太尉右傼射兼門下侍郎平章事臣吕端奉寶册謹上尊諡曰神功聖德文武皇帝廟號
