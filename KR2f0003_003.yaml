body:
  text: 太宗皇帝實録卷第二十八起太平興國九年正月盡二月太平興國九年春正月壬子朔上不受朝羣臣詣閣拜表稱賀丙辰命户部推官監察御史索湘元玘按行河決所壞民田丁已駕幸景龍門外水磑上臨水而坐命近臣觀之因謂近臣曰此水出於山源凊澄甘潔近河之地水味皆甘豈河澗所及乎宋琪等對曰亦猶人性善惡染習使然也上曰卿言是也回習射於後園上中的者五張樂賜從官飲戊午右僕射石熙載薨熙載字凝績洛陽人也周顯德中以進士登第在布衣時磊落有度量人皆重之家貧事後母以孝聞治家嚴謹閨門肅然國𥘉上為殿前都虞候領泰寧軍節度辟為掌書記及上領開封尹表為推官歷右拾遺遷左輔闕出為崇義軍掌書記及上即位召歸復為左輔闕出知潭州徴還擢為兵部貟外郎充樞密直學士旋簽署樞密院事車駕征河東從至鎮州拜給事中充樞密副使還京遷刑部侍郎副使如故未幾授户部尚書樞密使以足疾步履蹇澀多請告上幸其第臨問太醫診視久之未愈乃抗表求解所職優詔許之拜右僕射至是薨年五十七上聞之亟幸其第臨喪涕泗詔輟視朝兩日贈侍中官給葬事上悲嘆者纍日顧謂侍臣曰熙載事君之心可謂純正無他矣方將委用而遽至此豈命乎熙載有文學性忠實遇事盡言是非好惡無所顧避人有善必推薦之時論稱其長者己未以元帥府掌書記黃夷簡為淮海國王府判官元帥府支使慎知禮為淮海國王府掌書記元帥府别駕裴祚為淮海國王府支使以錢俶解元帥之任故也庚申國子博士鹿峭以母老拜章求解官就飬從之以國子博士韓寶為峽路轉運副使徐州豐縣主簿李蒙正縣封張思問並削籍為民部下犯贓故也蒙正配隸商州禁錮壬戌詔曰國家勤求古道啓迪化源國典朝章咸從振舉遺編墜簡蓋在詢求致理之先無以加此宜令三館所有書籍以開元四部書目比校據見闕者特行搜訪仍具録所少書告示中外若臣僚之家有三館闕書許詣館進納及三百卷已上者與一子出身不及三百卷者據卷帙優給金帛如不願納官者借本繕寫寫畢卻以付之先是上謂侍臣曰夫教化之本治亂之源若非書籍何以取法今三館貯書數雖不少若觀開元書目即遺逸尚多宜在廣行求訪乃下是詔以右衛大將軍李從謙知隨州癸亥命右神武將軍胡公霸督理汴河堤甲子有司言有以竊盜計贓至死者特詔貸之因謂宰相曰朕常重惜人命如此類者往往貸其極刑但時于其中取其甚者以警衆多耳不欲小人知寬貸之意恐其犯法者衆乙丑上元節上御丹鳯樓觀燈見士庶闐咽謂宰相曰國家乘五代干戈之後朕孜孜求理惟望上天垂祐福此生民今天下阜安京師繁盛甚以為慰朕居常罕飲酒今夜與卿等同樂宜各盡醉於是每舉酒以虗爵示羣臣丙寅月有食之既丁卯房州上言涪陵縣公廷美卒上聞之震悼乃降詔曰涪陵縣公廷美朕之同氣也為姦臣所惑溺于邪説朕以宗社之故迫于公議房陵之謫不得不然永惟骨肉之親絶而不殊方欲削平前事復我舊恩忽爾淪謝有志不果痛悼之極其何可言冝追封為涪陵王輟視朝五日仍賜諡曰悼所司擇日册命廷美宣祖第四子也建隆元年出閣領嘉州防禦使遷興元尹山南西道節度使封天水郡侯進封郡公乾德二年加同平章事開寶六年加侍中京兆尹永興軍節度使上即位加中書令開封尹封齊王從平太原進封秦王開封尹如故七年出為河南尹西京留守坐與宰相盧多遜交通羣臣議請置于法上以至親不忍止令就第未幾黜為涪陵縣公遷房州安置因憂恚成疾至是卒上聞之嗚咽流涕悲不自勝謂宰相曰廷美自少剛愎及長而凶惡如此朕以同氣至親不忍置之于法俾居房陵兾其思過中心憫之未嘗暫忘方欲推恩與之復舊遽兹殞逝痛傷奈何後因從容言及廷美朕乳母陳國夫人耿氏所生耿氏後出嫁趙氏生供奉官趙延俊即廷美之同母弟也朕待延俊固無猜忌常令屬鞬侍左右而延俊以同母之故頗泄禁中事于延俊頃者方營西池而橋梁未備朕將欲泛舟於池中廷美與左右謀欲以此時竊發謀若不果即廷美詐稱疾於邸俟車駕臨幸即為他變有以是謀來告者當時若令有司窮究則廷美罪不容誅朕以天倫之愛不欲暴揚其醜及與多遜連謀即命居守西洛而廷美猶不悔過益怨望言不遜始命遷房陵以全宥之朕於廷美固無所負李昉對曰涪陵悖逆天下共聞而宫禁中事若非陛下委曲宣示臣等何由知之戊辰命左領軍衛將軍蘇誨等六人分往諸郡督修河之役辛未詔曰朕每恤蒸民務均輿賦或有哭沴即與蠲除蓋欲惠貧下之民豈復以多少為限自今諸州民訴水旱二十畒以下者皆令檢勘先是澶州上言民訴水旱二十畒以下請不在檢視之限上以貧民當恤之故有是詔壬申詔諸道州府去年官所貸粟並除之癸酉上為涪陵王廷美發哀于别殿羣臣詣崇政門奉慰左諌議大夫參知政事李穆卒穆字孟雍開封陽武人也與弟肅皆中進士第釋褐授郢州軍事推官遷汝州防禦判官未幾拜右拾遺殿中侍御史通判洋州移陜州詔以郡中租輸洛邑不即應命坐免官肅時為博州從事穆迎其母就肅居家貧簞瓢自樂兄弟怡怡如也自是優遊經史間殆無仕進意久之徴為太子中允逾年拜左拾遺知制誥書命典雅有元和之遺風穆與參知政事盧多遜同門生太祖嘗謂多遜曰穆士大夫之中仁善者詞學之外他無所預多遜曰穆雖若是然操行端直臨事不以生死易節所謂仁而有勇者也時太祖方圖取江南已部分諸將而未有發兵之端求所以使江南召李煜入朝者以為履不測之險難其人由是太祖謂多遜曰若如爾言無以易穆遂遣之穆至金陵諭以朝旨煜辭以疾且言上事大朝者以其望全濟之恩今若此有死而已穆曰朝與否惟國主自處之然大朝兵甲精鋭萬物繁冨恐不易當其鋒宜孰思之無使後悔及還具言其狀太祖以謂所諭要切而江南亦謂所言誠實後煜歸朝獲全宥者亦穆之力也上即位改左補闕知制誥如故尋充史館修撰判館事上征并汾還真拜中書舍人文學履行益為上所知盧多遜之得罪也以其情分𣢾冾責授司封貟外郎明年春盜捕之經時不獲上欲必得之令原其罪購賞果有告者乃軍人數輩結約夜踰壘垣而出盡獲而戮之因遍索軍中纍有罪犯凶惡無賴者得數百餘人不忍殺以鐡鉗鉗其頸羈于本軍至是並釋之仍各賜錢三千太宗皇帝實録卷第二十八書寫人張容𥘉對班紹宗覆對霍良弼
