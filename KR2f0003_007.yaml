body:
  text: 太宗皇帝實録卷第三十二起雍熙二年正月盡二月雍熈二年春正月丙午朔上不受朝羣臣詣閤拜表稱賀庚戌以右諌議大夫段思恭知壽州司農卿李惲知孟州甲寅詔曰國家書軌混同封域遼逺將共康於庶務必廣擇於羣材舉其所知厥有前典況今官常之列俊乂尤多雖藴長材或居下位守道者以躁進爲恥懷能者以自衒爲非式開薦善之門用廣得人之路冝令翰林學士兩省御史臺尚書省官保舉京官幕職縣官可陞朝者各一人丙辰以皇姪德恭爲左武衞大將軍判濟州封安定侯德隆爲右武衞大將軍判沂州封長寧侯皆故涪陵王廷美之子也初廷美徙房陵諸子皆從行至是並受封仍厚賜緡錢遣髙品衞紹欽送之治所又以起居舎人韓檢通判沂州右𥙷闕劉蒙叟通判濟州以皇姪在郡面諭旨令檢等專郡政焉己未上元節御乹元門樓觀燈夜漏初上密雪忽降上謂宰相曰可各賦觀燈夜瑞雪滿皇州詩以爲娯樂上賦詩示羣臣宰相宋琪等咸奉和辛酉分命左領衞大將軍郭重吉等十三人監治河隄癸亥以翰林學士司封郎中賈黃中右散騎常侍徐鉉屯田郎中知制誥趙昌言虞部郎中知制誥韓丕祠部貟外郎知制誥蘇易簡主客貟外郎知制誥宋準禮部郎中張洎左𥙷闕直史范杲著作郎直史館宋湜席貽慶等同知禮部貢舉以登州流人曹翰爲右千牛衞大將軍分司西京令便道之官遇赦故也乙丑詔賜安定侯德恭長寜侯德隆常俸外年支錢各三百萬以水部貟外郎閻象春秋博士袁逢吉毛詩博士解損袐書丞張雍著作郎杜新殿中丞趙化右賛善大夫呉淑著作佐郎杜鎬大理寺丞王炳國子監丞楊文舉等試禮部諸科貢舉人戊戍以袐書丞何績爲京東轉運副使己亥詔曰國家設俊造之科啓公平之路務要藝實以副勤求近年舉人動盈萬計姦僞之迹朋結相連或成於他人或傳以相授紛然雜亂無以辨明考覈旣難妄冒滋甚冝令知舉官專察之如有濫謬具以名聞甲戍制加髙麗國王王治檢校太傅光禄卿裴迎責授感德軍節度行軍司馬坐知相州日選僕隷伉健夜入更直與之卧起郡中有卒尤健壯迎召之諸僕由是不平因鬪競事發上令鞫之得實醜狀詔削籍配隷商州禁錮迎錢俶之姻也俶屢請於上乃改是命二月戊寅詔曰朝廷選用賢能分膺事任必資公共以副憂勤向者聮事同僚多不連署奏牘自今並須同署永定爲式庚辰遣内客省使郭守文領兵屯三交壬午以翰林侍書左拾遺王著翰林侍讀著作郎吕文仲使髙麗甲申權交州三使留後黎桓遣牙校張詔馮阮伯簮等以方物來貢壬辰詔左諫議大夫滕中正兵部郎中楊徽之屯田郎中孔承恭同試知貢舉官親屬凡九十八人乙未夏州上言都巡檢使汝州團練使曹光實殁於賊光實字顯忠雅州人也父疇唐末爲静南軍使控印峽以捍蠻蜑光實㓜武勇有膽氣輕財好施不事細行意豁如也疇卒僞蜀孟昶以光實爲永平軍管内捕盜游兵使太祖命王全斌平蜀蜀地羣盜蜂起有夷人張樂忠者常攻劫郡縣且憾光實殺其徒黨率衆數千人中夜掩至環光實所居鼔噪飛矢四面並進光實貟其母揮戈突圍以出賊衆辟易不敢輒近光實舉族三百餘口賊殺之無噍類又發疇墓壞其棺槨光實詣全斌具以事白時蜀中諸郡多未下乃圖雅州地形要害陳用兵攻取之勢請官軍先下之全斌壯之遂令光實率兵前導旣克其城果得樂忠而甘心焉全斌乃署光實爲義軍都指揮使而殘宼猶保沈黎光實以所部盡平之遂以光實知黎州兼黎雅二州都巡檢使安集來蠻獠懷之全斌遣入貢京師且陳郡境安靜不須義軍巡警請罷之太祖喜謂左右曰此蜀中之竒士也乃以爲黎州刺史踰年改唐州刺史時初平交廣羣盗未息以光實爲嶺南五十七州都巡檢旣至捕逐羣盗海隅寜靜上即位遷本州團練使車駕征河東以光實知威勝軍事河東平充汾遼石沁等州都巡檢使領汝州團練使王師北伐與潘美分道出鴈門光實爲前鋒遇賊斬首五千級優詔嘉獎李繼捧之入朝也以光實爲夏銀綏麟等州都巡檢使繼捧弟繼遷遁入蕃落爲宼邊民苦之光實乗間掩襲獲繼遷母妻及牛羊萬計斬首數千級繼遷僅以身免繼遷旣敗使人紿光實曰我數奔北勢窘不能自存矣公許我降乎因導致情𣢾願陳甥舅之禮之禮期其日於近城十許里約降光實武人勇而無謀心信之且欲專其功故不以語人至期繼遷設伏於隱蔽與數人近城迎光實領數百騎徑赴之繼遷前導北行將至其地忽舉手麾鞭而伏兵盡起光實遂𬒳害年五十五上聞之驚悼賵贈加等録其子克讓爲五品正貟官丙申詔曰應天下佛寺道宫自來累有詔書約束除舊有名籍者存之所在不得上請建置初有僧乞於近城之地積薪自焚上以其惑衆令配流逺惡處仍毀其所居院舎因謂宰相曰近日多奏請建置僧院有十餘間屋宇便求院額甚無謂也多是誑惑閭閻藏隱姦弊冝申明禁止之故有是詔免著作佐郎鄭用和仍削兩任坐密州監稅日受賕故也己亥占城國王施利陀盤呉日歡使婆羅門金歌麻來獻方物三佛齊國舶主金花亦以方物來獻庚子忠武軍節度使潘美來朝壬寅以彰德軍節度使李繼捧爲隨州刺史崇信軍節度使單州防禦使李克憲爲道州防禦使遣博州防禦使李克文歸本郡克文先朝集在京師故也癸卯以著作郎韋亶通判隨州殿中侍御史李式通判道州武元潁通判博州初李繼俸歸朝其弟繼遷遁入蕃部率戎人爲宼㑹有從塞上來者繼遷悉知朝廷事意繼捧等漏露之故其宗族悉置之于外令亶等爲通判專司郡政三月丁未以如京使石保興爲銀夏等州都廵檢使己酉以崇儀副使莫侯陳利用爲右監門衞將軍領應州刺史乙卯武成軍節度使劉遇卒遇浮陽人也周髙祖在鄴遇爲親信吏周有天下遷控鶴都軍頭顯德中改控鶴副指揮使國初遷御龍直指揮使建隆末領溪州刺史轉控鶴第三軍都指揮使又改眉州刺史乹德初授控鶴右廂都指揮使領瓊州團練使從征河東以功授虎捷右廂都指揮使鬱州防禦使乆之遷應州觀察使侍衞歩軍都虞候開寶七年征江南充昇州西南路行營歩軍兼戰棹右廂都指揮使㑹諸路兵生擒江南大將朱令贇呉人因是喪氣江南平以功領大同軍節度使上嗣位改曹州刺史彰信軍節度使從征幽州失律責授宿州觀察使六年入朝從幸魏郡授宿州刺史保靜軍節度使充幽州西路壕寨都部署護築保州威虜靜戎平塞長城等五城八年授滑州刺史武成軍節度使至是卒年六十六詔輟視朝一日贈侍中遇純謹善射上待之尤厚旣卒貶翰林醫官使劉翰爲和州團練副使翰素剛褊同列多𬒳讒􅌟及遇病上使候之言必瘳故𬒳黜焉丙辰詔曰應中外官私發故舊書題不得用官印記違者罪之丁巳以右諌議大夫劉保勲權御史中丞以日騎天武左右廂都指揮使師州防禦使張訓爲殿前都虞候領永州觀察使日騎右廂都指揮使嚴州團練使傅潜爲日騎天武左右廂都指揮使領雲州防禦使涼州觀察使判霸州趙延浦領蔚州觀察使判冀州内客省使檀州刺史郭守文領武州團練使左神武軍將軍營州刺史劉知信領檀州團練使宫苑使嬀州刺史李繼隆領環州團練使軍器庫使儒州刺史劉文𥙿領順州團練使八作使張濬領嬀州刺史文思使薛繼昭領儒州刺史戊午習射於後苑上七發皆中的張樂賜從官飲宦官何紹貞決杖配北班初紹貞護送宫人詣永昌陵還至中牟天未明見數人持兵行道傍紹貞疑其盗捕而笞掠之人不勝其苦皆自誣服縛送致京師上初聞甚驚旣而思之曰此人雖持兵且未見劫盗之狀假令爲劫豈紹貞能制而縛之乎因令送開封府鞫之及獄成果縣民詣嵩嶽祈禱以兵自防耳上大駭曰幾陷平民於法各賜茶荈束帛而遣之故紹貞及於罪己未上御崇政殿親試禮部合格貢舉人得梁顥等一百九十七人第爲三等諸科三百一十八人亦爲三等有經生王從善能并注通誦其書上乃取五經舉其端從善應聲誦之無有凝滯上甚嗟賞加賜九經及第其時或云下第進士中甚有可取者上未盡得之壬戌復試又得進士七十六人復爲三等以洪湛文詞可採特陞爲第三人餘皆附本等末癸卯復試下等諸科爲三等凡三百二人學究髙南金自陳曰臣家貧父頔年八十四嘗在大名府幕罷職乆矣今無存養者願賜一第以慰臣父之老上謂侍臣曰其父何人宋琪對曰前天雄軍掌書記髙頔也性廉介搢紳推之今以致政年老素行愈厲上曰吾早知其爲人惜其不能從政不欲彊起之可即授左𥙷闕致仕仍賜錢十萬擢南金髙第頔開封雍丘人清泰中舉進士儕輩紿之曰何不投裴僕射求知乎是時裴皥以左僕射致仕後進無復至其門者頔純朴信之遂以文爲䞇明年禮部侍郎馬裔孫知舉裔孫即皥之門生也皥以頔語之裔孫曰謹受命遂擢頔乙科後歷州縣周顯德中佐符彦卿幕府太祖時董禁兵上居近職親迎懿德皇后于大名府彦卿遣頔迎候接納尤伸誠𣢾上由是因南金而記憶之故有是命甲子詔御前下第人有十五舉巳上者及貢院第四等人凡八十四人並賜同本科及第丙寅殿直潘昭慶以禇遂良歐陽詢虞丗南墨迹三本來獻戊辰賜新及第進士等詩二章以泰寜軍節度使孫承祐知滑州屯田郎中知制誥趙昌言知大名府祠部貟外郎知制誥蘇易簡罷知制誥初上使易簡賈黃中等同知貢院各以子弟甥姪籍名求别試易簡妻兄進士崔範故職方貟外郎憲之子也憲死易簡以外服請告範服未闋易簡隱而不奏薦名在髙等又有王千里者故水部貟外郎孚之子也孚在蜀爲翰林學士易簡父協即孚之門生易簡以故薦千里上聞之甚怒範及千里並加罪仍令御史劾易簡于私第及罷制誥之任壬申宴中書門下文武常參官翰林學士節度防禦團練使刺史諸軍校百夫長巳上及諸州進奉使占城國三佛齊使諸國蕃客於大明殿癸酉賜新及第貢舉人宴於瓊林苑蘄州言江南歳歉民飢流移入所部津吏以未受詔多拒之望許渡江自占詔從其請太宗皇帝實録卷第三十二書寫人李竒初對吕興宗覆對霍良弼
