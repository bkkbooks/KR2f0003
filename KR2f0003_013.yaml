body:
  text: 太宗皇帝實録卷第四十三起雍熙五年正月盡端拱元年二月雍熙五年春正月已未朔上不受朝以將有事於耕藉也羣臣詣閣拜表稱賀庚申御製喜雪五言二十韻詩賜宰相李昉等令屬和癸亥土犯建星甲子成都府言部內比歲不稔榖價翔貴請發公廪賑糶以濟貧民從之乙丑以監察御史宋鎬為右拾遺直史館進賀雪詩稱旨故也丙寅以大理評事王禹稱為右拾遺羅處約為著作郎並直史館戊辰澶州言黃河清二百里癸酉上宿齋於朝元殿甲戍次東郊是夜宿於齋室乙亥日未明三刻上親饗神農氏壇以后稷氏配焉次詣耕藉田位行三推之禮有司板奏禮畢上顧謂侍臣曰朕志在勸農恨不能終千畝豈止以三推為限乎遂耕數十步侍臣固請乃止回御丹鳯樓下制曰王者握圗御極膺駿命於上玄務穡勸農利蒸民於率土朕嗣臨大寶十有三年每師勤儉之風用洽雍熙之化民惟邦本雖無怠於輯寧食乃民天顧未隆於教道是用舉纍朝之墜典藉千畝於近郊載陟青壇躬展事神之禮三推黛耜式隆敦本之風豈惟備郊廟之粢盛抑亦勵蒸黎之播殖萬國駿奔而述職千官星拱以在庭望宫闕城社之尊睹聲明文物之盛豈豫寡昧獨荷於鴻休思與華夷同均於大慶冝革紀年之號仍覃作解之恩可大赦天下改雍熙五年為端拱元年自正月十七日昧爽巳前應天下罪人除犯十惡及官典犯正枉法贓至殺人者不赦外其餘罪無輕重咸赦除之內外馬步軍諸將卒等第加賞給文武臣僚並與加恩諸貶降官未量移者與量移巳量移者與復資巳復資者與敘用除名免官人等所司具名以聞天下人户雍熙三年已前係欠夏秋稅物並與除放應軍民為盜亡命山澤百日不來陳首復罪如初民有年七十巳上見為家長耆年宿德為鄉里所宗者冝令本州具名以聞當賜爵一級舊制天子孟春吉亥饗先農於東郊親耕藉田自東晉南遷此禮廢墜唐貞觀中太宗始藉於千畝至元和五年憲宗以河朔師旅之後物力凋耗將行而復止自是歷五代二百餘祀不復舉行上以承平既久乃詔有司參酌典故行三推之禮所以示勸農而興墜典也丙子上賦東郊藉田五七言詩各一首賜侍臣丁丑詔改晉州洪崖廟為棲真觀從本州之請也庚辰詔郡國不得以司理參軍兼蒞他職先是成都府言以司理參軍承府縣之闕故降詔以止之辛巳右屯衛上將軍伊審徴卒審徴太原人同光中父延瓌隨孟知祥入蜀知祥僣即偽位以女妻延瓌歷嘉眉二州刺史審徴以父歷任偽蜀州刺史通奏使同平章事武泰寧江兩軍節度使蜀平歸朝為邠州刺史靜難軍節度使移鎮延安開寶末徴為右屯衛上將軍至是卒年七十五先是審徴與王昭逺俱為偽通奏使掌機務即樞密使之任也孟昶國事無大小一以咨之常自以康濟經略為己任會王師入境審徴首奉降表詣軍前昭逺時統精卒數萬出城拒戰聞王師之至棄軍走匿東川城倉中後數日擒獲時人笑之壬午南康軍判官朱覃棄市覃淮西俚人也幼寒賤始為人厮役及長竊弄筆硯冒為士流遊科埸凡數年止以利口持人長短士君子頗患之洎䇿名從政其志益橫與大理評事王悅素不協恱掌建昌縣酒榷告覃部內為姦贓鞫得實故抵於法殿中侍御史龔頴編歷代年紀為二圗來上優詔褒之癸未上幸玉津園習射張樂賜從官宴飲乙酉詔曰典獄之官理資於欽恤經國之道政尚於寬仁庶洽時雍用期刑措如聞酷吏頗恣凶威慮致陷於平人必有傷於和氣冝行禁止以示哀矜應天下刑獄罪人內有合行訊問者只得一依律令其鼠彈箏非理殘忍之類並禁之先是諸處獄吏搒掠罪人以繩接縛其手系於足指用挺叩其繩則痛入骨髓謂之鼠彈箏上聞頗悼其酷故下詔禁之二月辛卯詔輟視朝以皇舅靜江軍節度使杜審進夫人張氏卒故也癸巳以殿中侍御史柴成務為户部貟外郎直史館甲午宴中書門下文武常參官翰林學士節度觀察防禦團練使刺史諸軍校百夫長巳上諸州進奉使外國蕃客於大明殿乙未詔曰補闕拾遺位居諫省榮踐清華之列是為獻納之臣朝廷之得失須論刑政之煩苛必舉眷兹職業寄任非輕上則輔佐大臣次則公卿庶尹歷朝選任何莫由斯苟或但務因循止思愼默忠言讜議寂寥無聞殊乖申諷之規曷副建官之意冝更舊號特立新名庶明立制之文咸勵匪躬之節其左右補闕冝改為左右司諫左右拾遺冝改為左右正言上欲令諫官修其職業故改其官號特降是詔以申明之己亥詔免瀛州部民租調三年徭役五年以其再遭犬戎蹂躪故也庚子制曰端揆崇資文昌右相蓋非賢而不授諒出綍以惟公告示具僚舉兹明命中書侍郎兼工部尚書同中書門下平章事李昉巖廊舊德文學名儒踐臺閣之通班素髙問望處鈞衡之大任久展謨猷謙和秉君子之風純懿擅吉人之美今者輟從三事總彼六卿董齊喉舌之官載光北斗領袖搢紳之列首冠南宫用資鎮俗之清規式表尊賢之茂典禮異適遵於表著眷懷別示於股肱佩服渥恩優遊名器恭踐厥位往惟欽哉可尚書右僕射同日制曰尊賢養老上古格言念舊録勳前王令典而況再登廊廟三秉節旄始終不易於純誠出入咸膺於大用爰疇茂德用降徽章山南東道節度襄州管內觀察處置等使檢校太師兼侍中許國公趙普大昴儲祥維嵩挺秀翊天飛之景運名冠王公藴台輔之嘉謨功書簡册早從黃閣荐擁髙牙隆中盡偃於仁風峴首賡歌於善政加以心惟許國道在安民封章屢納於忠言致理率陳於正道佑豫涼德繄乃宗臣朕所以卜在會朝委之論道彞倫未敘將俟於緝熙庶政缺然佇期於寅亮是以輟從藩輔復踐巖廊加帝保之崇資冠鸞臺之舊列咨上公而詢庶政彌切倚毗昌洪業以永丕圗更資光輔可守太保兼侍中昭文館大學士又制曰天道無私日月星辰助其照皇王不宰股肱輔弼代其功所以端拱仰成垂衣致理建千年之景運追三代之令猷其有業茂經綸才推謹厚參大政而載罹寒暑秉純誠而無替初終冝推爰立之恩式副至公之選朝散大夫給事中參知政事上柱國賜紫金魚袋吕蒙正四氣均和五行鍾秀藴濟時之明略輔之以溫恭挺命代之宏材守之以淵默凡膺歷試畢振芳猷公忠推社稷之臣凝重見廟堂之器眷兹大體久鬱具瞻爰資作礪之功用正秉鈞之任崇階馭貴列爵增封兼司太史之書載踐地官之秩爾冝周旋庶政佐佑眇躬緩兹宵旰之憂翊我隆平之運同砥於道豈不美歟可光祿大夫中書侍郎兼户部尚書同中書門下平章事監修國史又以開封尹陳王元僖進封許王韓王真宗舊名進封襄王冀王元份進封越王益王元傑加食邑一千户武勝軍節度使許王錢俶進封鄧王樞密使王顯加檢校太傅給事中參知政事辛仲甫加户部侍郎樞密副使左諫議大夫趙昌言加工部侍郎以樞密副使左諫議大夫王沔為户部侍郎參知政事以御史中丞張宏為工部侍郎充樞密副使甲辰詔升建州為建寧軍節度以武寧軍節度使曹彬加檢校太尉安逺軍節度使錢惟濬進封譙國公彰國軍節度使駙馬都尉王承衍改貝州刺史永清軍節度使威塞軍節度使駙馬都尉石保吉改滄州刺史橫海軍節度使殿前都虞候張訓領歸義軍節度使傅潛領昭化軍節度使並充殿前副都指揮使侍衛馬軍都虞候李繼隆領保順軍節度使充侍衛馬軍都指揮使侍衛步軍都虞候戴興領振武軍節度使充侍衛步軍都指揮使愼州觀察使駙馬都尉魏咸信為相州刺史彰德軍節度使以左衛上將軍張永德為密州刺史安化軍節度使乙巳以內客省使楊守一為宣徽北院使簽署樞密院事丙午詔郡國民有艱食處聽發公廪賑濟之丁未以刑部尚書宋琪為吏部尚書禮部侍郎李至為刑部侍郎翰林學士中書舍人宋白為禮部侍郎司封郎中知制誥賈黃中為中書舍人祠部貟外郎知制誥蘇易簡為本曹郎中知制誥並依前翰林學士以右補闕知制誥李沆為職方貟外郎王化基為駕部貟外郎宋湜為庫部貟外郎起居舍人知制誥田錫為兵部貟外郎知制誥户部貟外郎知制誥胡旦為司封貟外郎並依前知制誥以左神武大將軍順州刺史王繼升領本州團練使餘文武官進秩有差以乙亥赦書加恩故也戊申以右諫議大夫郭贄雷德驤並為工部侍郎以度支使張選為鹽鐵使户部使魏丕為度支使度支副使李惟清為右諫議大夫户部使以刑部貟外郎陳象輿董儼屯田貟外郎雷有終並為本曹郎中分充鹽鐵度支户部副使己酉以職方郎中韓丕兵部郎中楊徽之並為左諫議大夫司勳郎中羅延吉為右諫議大夫以屯田貟外郎楊礪為庫部貟外郎充襄王府記室參軍庚戍以皇子元偓為左衛上將軍元稱為右衛上將軍以皇姪孫惟吉為左驍衛大將軍惟正為右驍衛大將軍惟敘為左武衛將軍惟和為右武衛將軍惟憲為左屯衛將軍惟能為右屯衛將軍壬子興化軍言甘露降工部侍郎同知京朝官考課雷德驤上表求致政先是德驤與趙普不協普再入相制下之日德驤方立朝手不覺墜笏遂拜章求退避普之讎也因請於便殿見上具陳所以上勉諭久之謂曰第去朕終當保全卿勿以為慮乃懇乞罷知京朝官考課以奉朝請從之仍賜白金三千兩以慰其心癸丑以右散騎常侍徐鉉為左散騎常侍以皇城使薊州刺史王延德領本州團練使乙卯右千牛衛上將軍李崇矩卒崇矩字守則上黨人也幼孤貧長而謹厚為鄉里所稱晉天福之亂漢祖起自并汾師次上黨史洪肇時為先鋒軍帥聞崇矩之名召署親吏漢祖踐阼以洪肇為侍衛親軍都指揮使徼巡闕下洪肇性殘忍好殺軍民橫罹其毒者不可勝計至於屠李嵩之家皆洪肇蘇逢吉之稱也時人冤之左右懼其凶威亦稍稍遁去惟崇矩事之益謹逮洪肇被誅卒免其禍周祖初有天下素與洪肇厚善訪求親舊將恤其孤得崇矩而悉以委之崇矩嘗主洪肇之家籍由是盡獲史氏之財産以付洪肇弟福周祖聞而嘉之乃命隸於丗宗帳下丗宗嗣位擢為供奉官是年河東劉崇入寇從征敗崇於髙平以功轉供備庫副使俄遷作坊使恭帝嗣位以崇矩判四方館事太祖受禪李筠叛上黨率并寇鼓行而南太祖患之命崇矩為行營護軍率兵戍河陽以禦其衝與石守信髙懷德羅彥瓌同破筠衆於碾子谷乃表請太祖親征澤潞平以功授右監門衛大將軍充三司使纍遷至樞密使時趙普為相崇矩在宥密皆數年分秉大柄因以女妻普之子承宗厚相交結太祖聞之頗怒會門下客鄭伸上書發其隂事開寶五年出為鎮國軍節度使六年追入朝授左衛大將軍上即位出為嶺南道都巡檢使未幾遣使齎詔就移為瓊崖儋萬四州都巡檢使所部兵士憚於從行有逗撓之色崇矩乃盡以車服器用金帛凡數百萬分給之衆遂感恱樂為其用纍年海上無恙受代歸闕遷右千牛衛上將軍尋被病請長告至是卒年六十五輟視朝一日詔贈太尉諡曰元靖崇矩性純厚寡言而志敦信義好黃白之術尤重佛法以始事洪肇逮乎通貴見洪肇之子孫必厚禮而優濟之或聞有學黃白之道者必自逺邀之至以師禮待之雖知其詐而猶以為神仙之士卒無恨悔在官凡得俸入除朝夕伏臘費用外多輸於僧室故身死之日家無厚積焉太宗皇帝實録卷第四十三書寫人趙弼初對王丗昌再對訖劉孝廉
