front:
  text: 太宗皇帝實録卷第四十一起雍熙四年五丹盡八月五月甲子定國軍節度使崔翰自高陽關來朝召之也乙丑以容州觀察使劉文𥙿充鎮州兵馬部署以侍御史鄭宣司門貟外郎劉墀户部貟外郎趙載並充如京使以殿中侍御史柳開為崇儀使左拾遺劉慶為西京作坊使先是上以五代戰爭巳來自節鎮至刺史皆用武臣多不曉政事人受其弊上欲兼用文士漸復舊制故先擢宣等為內職丙寅命使分往諸郡市民間馬補戰騎之闕第其價為三等壬申忠武軍節度使并州兵馬都部署潘美徴赴闕癸酉以右羽林軍大將軍石曦知霸州兼兵馬部署乙亥宴近臣於長春殿以田重進崔翰潘美來朝勞之也丙子以左拾遺曹諫為崇儀使諫知定逺軍㑹虜入寇兵少而城不固人心危懼欲降於虜諫斬數人乃定因率勵士卒虜不敢犯遂引去上聞之降詔敦諭賜五品服未幾召赴闕乃改授此命丁丑月有食之是日斬秦州長道縣酒務官李益益秦州冨人家僮數百人橫恣郡中所為多不法持吏長短郡守以下皆畏之民負益息錢者數百家郡為徴督急於租調觀察推官馮伉不為益徴息錢益怒之伉方按行市中益遣私奴數輩拽伉下馬毀辱之伉不能甘先是益多通貨於朝中權貴率為庇護故纍年不敗至是伉上章論其事章兩上皆為邸吏所匿不得逹後因市馬譯者附表訴益不法事譯因隨歲市馬入得見即上其表上覽之大怒詔本郡捕益詔書未至京師權貴巳先報益知益懼因亡命州以聞上愈怒詔州郡以物色捕之甚急數月獲於河中府冨人郝氏家械送御史府鞫之具得其狀抵罪籍沒其家財其子士衡先舉進士任光祿寺丞詔除其籍終身不齒益之伏法郡民皆快之以為除去災害醵錢飲酒以相慶庚辰改殿前司日騎為捧日驍猛為拱辰雄勇為神勇上鐵林為殿前司虎翼腰弩為神射侍衛步軍司鐵林為侍衛司虎翼辛巳右拾遺直史館孟知化削籍配隸商州坐知懷州日受賕為姦贓也壬午以光州刺史王明知并州潭州言衡山嶽廟忽有風雨廟吏聞殿上奏音樂明日見架上鼓置于地癸未彰國軍節度使駙馬都尉王承衍自天雄軍來朝徴之也丁亥詔曰俞扁之方人命所繫豈無至術冝在精求應諸道醫人藝術精練為衆所推者仰本處舉送令太醫署考校以聞庚寅上製平戎萬全陳圖出示近臣因召邊將田重進潘美崔翰等升殿親授其進退攻擊之方略重進等頓首謝辛卯以袐書丞王嗣宗為河北東路轉運副使太子中允髙象先為西路轉運副使六月壬辰朔以殿直都虞候李貴為龍衛左第四軍都指揮使領河州刺史以散貟都虞候李琪為龍衛右第四軍都指揮使領澄州刺史以散祗候都虞候趙業為拱辰上十指揮使領播州刺史以金槍都虞候李希文為拱辰下十指揮使領歡州刺史以散祗候都虞候麴斌為殿前都指揮使左班都虞候領叙州刺史以散都頭都虞候郭密為殿前都指揮使右班都虞候領冨州刺史以馬步軍副都軍頭權管拱辰上十指揮使皇甫繼明為捧日右第三軍都指揮使領羅州刺史以天武左第一軍都虞候張祚為殿前司虎翼左第三軍都指揮使領珍州刺史以天武右第一軍都虞候劉進為步軍司虎翼左第二軍都指揮使領蒙州刺史以天武左第二軍都虞候賈榮為步軍司虎翼右第二軍都指揮使領春州刺史以御龍直都虞候孫謙領勤州刺史以御龍骨䤪子直都虞候孟珂領潘州刺史以御龍弓箭直都虞候王瓊領辰州刺史以御龍弩直都虞候楊瓊領顯州刺史以御龍左第二軍都指揮使傅思讓為龍衛右廂都指揮使領獎州團練使以馬步軍都軍頭李斌為神衛右廂都指揮使領溪州團練使甲午以天武右第二軍都虞候李福為神勇上十都指揮使領潯州刺史以天武左第三軍都虞候孫進為神勇下十都指揮使領髙州刺史以天武右第三軍都虞候趙嗣為殿前司虎翼右第二軍都指揮使領錦州刺史以神衛第三軍都虞候王祚為宣武軍都指揮使領雷州刺史丙申以內弓箭庫使領媯州刺史王文寶為東上閣門使丁酉以右驍衛上將軍劉廷讓知雄州兼兵馬都部署以左衛上將軍知雄州張永德知定州戊戍以彰國軍節度使駙馬都尉王承衍充貝冀州兵馬都部署以宣徽北院使郭守文郢州團練使田欽祚並為北面排陳使以宫苑使河州刺史王繼恩充排陳都監庚子以定國軍節度使崔翰復為髙陽關兵馬都部署以彰德軍馬步軍都指揮使邢任為馬步軍副都軍頭領顯州刺史詔曰向者嶺南闕官多權以攝官處之而多非其人自今並令試問吏理稍有可取即選用之三年無違闕送赴京當與出身叙録郢州團練使田欽祚卒欽祚潁川人也父令方漢乾祐中任􅉑州團練使有伶人靖邊庭者令方之輿隸也邊庭妻有美色令方通之邊庭不勝其忿㑹河中李守貞永興趙思綰鳯翔王景崇等各據城叛自陜以西人情大擾邊庭夜率其徒十數輩害令方於公署因掠郡民西趣投思綰潼關護軍閉門拒之出兵捕逐其衆乃敗朝廷遂擢欽祚為殿直未幾改供奉官太祖之討蜀也欽祚嘗乘馹往來報機事蜀平遷西上閣門副使後以何繼筠敗戎虜屢有功遷閣門使判四方館事領賀州刺史開寶八年從曹彬平江南以功領汾州防禦使上即位遷引進使太平興國四年從征太原使督前鋒騎兵屯石嶺關以捍北虜欽祚性剛戾貪財復負氣凌物與衆不協衆皆惡其為人㑹為部下所訟鞫得實就降為睦州團練使未幾改房州逾年改柳州以逺郡炎瘴鬱鬱不樂以至成疾纍表陳乞願生還闕下言甚激切上憐之遷郢州團練使詔令入覲欽祚見上感泣不巳㑹將北伐以為行營排陳使素巳抱疾因不勝其喜而卒年六十欽祚之典石嶺軍也大將郭進屢有戰功為欽祚所凌轢進不能甘遂自絰死事甚曖昧時皆以為欽祚殺之左右無敢言者欽祚性隂狡率易不喜儒生好狎侮同列人皆鄙之辛丑以龍衛軍都指揮使康保裔充馬步軍都軍頭癸卯邢州進白烏甲辰詔諸道州郡置徴缺司從戶部判官袁廓推官崔維翰之請也以右千牛衛大將軍分司西京曹翰為左千牛衛上將軍丁未以崇儀副使薛繼昭為文思使慎州觀察使知澶州駙馬都尉魏咸信來朝召之也戊申賜修汴口卒人千錢以比部郎中樊若水為駕部郎中充河北東路轉運使威塞軍節度使知孟州駙馬都尉石保吉愛州團練使知鄆州駙馬都尉吳元扆右衛上將軍知霸州宋偓皆來朝召之也詔應庫藏有脫漏不附籍者自今皆以監主自盜論罪至死者奏取敕裁從侍御史張佖之請也凖律忘失簿書致有乖錯計所錯凖盜論罪止徒二年佖以管庫之吏冝峻其法乃降是詔已酉以蘄州防禦使談延美為亳州防禦使汝州刺史李延嗣為本州團練使庚戍以威塞軍節度使駙馬都尉石保吉知大名府以愛州團練使駙馬都尉吳元扆知孟州是日酉時西北方有大流星其聲如雷壬子以東上閣門使王文寶充北面排陳都監并州都部署潘美定州都部署田重進髙陽關都部署崔翰貝冀州都部署王承衍鎮州都部署劉文𥙿並辭赴治所是日宴近臣於長春殿餞潘美等赴北面行營也司天言熒惑自歲在丙戍十月庚戍順行翼四度在太微宫西華門上將北五寸餘入太微西垣行至端門左執法北約尺有五寸前留十一月至十二月丁巳退行軫𥘉度自是疾行至丁亥歲二月丙午退出太微宫西華門據歷驗疾八日而出留在靈臺東北至三月癸酉順行臣等度其行度比謂復入太微宫至五月下旬方出初順行便屈曲疾速漸向東南歸黃道宛如回避之象斯吉徴也請付史館從之甲寅命陳王元僖餞北面將帥於含芳園以鹽鐵推官太子中允張茂宗為六宅副使水部貟外郎劉湛為如京使丁巳入內都知洛苑副使王仁睿卒詔贈內侍省內常侍上在晉邸仁睿時年十餘歲服勤左右甚淳謹上即位典掌宫闈出納之命嘗與柴禹錫等發秦邸隂事至是卒特加贈典非常例也戊午鄜州獻馬前足如牛以知廣州左諫議大夫許仲宣知江陵府秋七月壬戍朔以侍衛馬軍都虞候李繼隆領武州觀察使侍衛步軍都虞候戴興領雲州觀察使癸亥以馬步軍副都軍頭王筠領巖州刺史充龍猛都指揮使以步軍都軍頭宋璘領叙州刺史充宣武下十都指揮使賜禮部侍郎李至月給本官全俸先是至以目疾罷知政事特給俸錢十萬至以端坐私室而享厚祿不自安遂置而不敢請上知之特給全俸優之也以雍州觀察使劉知信為并州兵馬副部署以亳州防禦使談延美為鎮州兵馬鈐轄以汝州團練使李延嗣護髙陽關屯兵乙丑捧日天武四廂都指揮使朔州防禦使王杲卒杲京兆人也有武力善騎射上在晉邸召致左右及即位擢為日騎指揮使從征河東率兵督梯衝急攻城上驚其太猛亟召令下纍遷至殿前指揮使左班都虞候領順州刺史馬步軍都軍頭領寰州團練使遷四廂都指揮使領朔州防禦使雍熙四年春胡虜南寇以杲為滄州行營副部署軍敗杲力戰僅以身免詔歸朝至是卒年五十九御製早秋詩二首立秋日暮雨詩一首賜近臣已巳以戶部貟外郎知雜事陳象輿兼知吏部選事壬申以神武都虞候王祚為宣武都指揮使領雷州刺史丙子中元節京城張燈御製五言十韻觀燈詩賜宰相等已卯以金州觀察使錢信判和州以右領軍衛大將軍李仲㝢為郢州刺史仲㝢故追封吳王煜之子也上憫其聚族京師故有是命庚辰詔置三班院以崇儀副使蔚進掌其事先是供奉官殿直殿前承旨悉隸宣徽院至是以其衆多或出使於外有訴以勞逸不均者因命別置院考校殿最引對便殿定其黜陟焉辛巳銀州獻白兔以如京使慕容德豐為西上閣門使領蔚州刺史丁亥以度支推官左拾遺孔憲為河東轉運副使以前濵州刺史髙保膺為右監門衛大將軍庚寅以蔡州刺史符昭願充邢州兵馬鈐轄詔曰比部郎中王龜從先負永興軍官錢二十八萬特除之以龜從知德州陷虜故也八月辛卯朔兵部郎中楊徽之進雍熙詞五言六韻凡十章上覽而嘉賞依韻和以賜之甲午以營州防禦使盧漢贇為右監門衛大將軍乙未以右補闕李鵬舉充荆湖轉運使詔曰薦賢舉善合徇至公行爵出祿固無虛授苟必得其才實亦何吝於寵恩近者諸處奏薦多是親黨既傷公道徒啓幸門用塞津蹊冝行條貫自今諸路轉運使副及州郡長吏並不得擅舉人充部下官如有闕貟處當以狀聞詔開封尹陳王元僖餞郭守文等於含芳園已亥鹽鐵使張平卒平北海臨胊人也嘗事單州刺史羅金山金山自單治滁遂補本州馬步軍都虞候上在晉邸知其才召致右右尋為涪陵公親吏後數年有譛平於涪陵者因罷遣之平歎曰吾雖蹇剝然以事勢觀之未必不為福上即位擢為右班殿直監市木於秦隴轉供奉官未幾涪陵敗人以為有先見四遷至客省使雍熙中授鹽鐵使初平市木於秦隴也嘗有贓姦至是知為陜西轉運使李奚所發遂憂恚成病而卒年六十三輟視朝一日贈右千牛衛大將軍庚子以􅉑州刺史劉宇為右監門衛大將軍以右監門衛大將軍欽州刺史陳廷山護冀州屯兵詔曰在京水運諸倉先是倉吏槩量為姦致外州吏逋官米二十六萬七千石並除之甲辰御製春夏秋冬松風雪月煙花詩共五十首賜宰相李昉等詔曰應除授廣南西川漳泉福建州縣官等訪聞久拘選調多是貧虛涉此長途將何以濟自今並令給劵宿於郵置御製中秋玩月詩二章歌一首賜宰相已酉合羅川回鶻第四族首領遣使朝貢水部貟外郎諸王府侍講邢昺進分門禮選二十一卷賜帛三十假銀器二事丁巳以殿中侍御史吕祐之為右補闕直史館太宗皇帝實録卷第四十一
