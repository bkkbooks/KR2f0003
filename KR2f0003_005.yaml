body:
  text: 太宗皇帝實録卷第三十起太平興國九年五月盡七月五月庚戌朔上御乹元殿受朝賀辛亥車駕出南薫門觀稼召從官列坐於田中令民刈麥咸賜以錢帛回幸玉津園觀魚張樂習射乆之宴飲極歡而罷壬子西州回鶻與波斯外道來朝貢西州婆羅門僧永丗自云本國名利得國王姓牙羅五得名阿喏你縳衣黄衣冠金冠以七寳飾之每出乗肩輿或乗象馬以音楽鑼鈸前導多㳺佛寺愽施貧乏妃摩訶你尾衣大䄂縷金紅衣歳一出多振施人有冤抑俟王及妃出即随之伸訴置宰相四貟國中庶務庫藏皆宰相裁制之五榖六畜果實與中國無異市易用銅錢其錢有文縵大如中國所用者但無穿耳東至大食國六月程又東至西州二月程又東至夏州三月程波斯外道阿里熛自云本國王號黒衣王子姓張名㬈里没似衣錦綵衣好乗馬㳺獵每出二月至三日即還委大臣九人同理國事男子以白㲲布爲衣婦人豪冨者衣錦綺貧下者止服綃布種陸田無稲秝土産絲蠶羊馬果實無錢貨以雜物相貿易東至婆羅門六月程又東至大食國六月程又東至夏州二月程癸丑以西京作坊使順州刺史李克文起復雲麾将軍麟州防禦使依舊知夏州事詔銀州宥州復隷夏州戊午詔曰國家欽恤刑章重惜人命豈容酷吏恣為深文掠治無辜致其殞絶損傷和氣莫甚於斯鳯翔司理参軍楊酀許州司理参軍張睿並掠囚至死已從私罪决遣訖今後犯者並以私罪罪之先是酀睿各無辜考掠人至死法寺定為公罪上怒故有是詔甲子以左神武大将軍吴元輔領平州刺史以監察御史宋璫為陕西轉運使乙丑詔曰司理参軍專於推鞫研覈情實尤在得人如聞諸道多闕此官盖吏部拘以資叙難為注擬自今應有闕䖏冝令本州扵見任前任簿尉判司内選擇明敏有官業者充秩滿當與陞奨其罷軟不任職者便可選官代之先是諸䖏多闕此官而吏部以資叙相妨難於注擬上以庶獄為重不可暫闕故委本部選擇焉庚午以東上閤門使田仁朗判四方館事辛未以左拾遺直史館宋凖守本官知制誥壬申歸州刺史高繼元卒繼元字若虗中書令南平王保融之第二子也保融承祖父業據有荊南事具五代史及保融卒弟保朂立保朂卒保融子繼冲立建隆四年朗州周保權以部内将衡州刺史張文表叛求救於朝太祖遣山南東道節度使慕容釗帥師援之假道於荊南繼冲不敢拒之師既入城繼冲乃舉其地内有屬而入覲焉繼元即繼冲弟也繼冲卒後授繼元歸州刺史上親征太原命繼元京師廵檢車駕還京以繼元為河隂兵馬都監至是卒年三十一丙子以判四方館事田仁朗自京至泰山督治道之役丁丑乹元文明二正殿哭是日既夕隂雲四合風雷暴作夜漏𥘉上澍雨如傾雷電震激火發自月華門抱関者不之覺延焼漸北煙焰上出上遣小黄門開関視火勢已盛亟命宿衛数百人毁回廊連屋比明役士皆至併力救之至辰已乃息已卯以栁州團練使田欽祚為郢州團練使知夏州著作佐郎杜凝除籍為民以其知道州日居喪聴楽為人所訴故也六月壬午以􅐭鐵判官虞部郎中樊若水為荊湖轉運使封故燕國長公主次女髙氏為延昌縣主乙酉麟州防禦使李克文來朝以唐僖宗賜其祖夏州節度使拓䟦思恭鐡劵朱書御扎上獻上因觀其詞㫖卑替謂宰相曰朕甞覧韓偓金鑾記見昭宗在鳯翔梁太祖引兵至城下號為迎駕其實脅君韓偓為翰林學士昭宗欲見之而為中官所隔潜匿伺便方遂一見可為歎息也宋琪對曰唐末亂離諸侯彊盛其勢固不能乆以雷徳驤石熈古魏庠朱昂李惟清祖吉雷有終陳白楊緘李琯崔邁吕備分為両浙峽路京西西川淮南荆湖江南廣南河北陕西轉運使丁亥詔曰朕以不明託扵兆人之上夙夜祗惕㒺敢怠荒頼九廟儲祥上玄垂祐萬務粗治于今九年而数日前雷之中烈火遽作既延哭扵正殿蓋示譴於眇躬祗畏震驚㒺敢寕䖏上天警戒必有由然豈非燭理之所未明賞罰之所未當物情尚多於壅塞政理未洽扵和平生靈未息於瘡痍獄訟未除扵枉橈賦調未得均一賢良多所淪滯有一于此足敗政經載深馭朽之誠思啓納言之路卿等列于有位咸切致君所冝各竭忠規共申讜議揚朝廷之闕失陳時務之否臧當悉乃心必期無隐朕将親覧用自儆焉已丑登聞院引對婦人李氏自陳云無児息身且病恐一旦溘死家業委棄欲未死有所屬上因謂宰相曰此婦人数日前朕已令開封府依所欲裁置之今復來告訴稱其父已𬒳繋矣此是小事何用禁繋京輦之下尚敢如此天下至廣冤枉可知朕恨不能徧閱天下獄訟親行决㫁每見大理寺㫁遣諸州刑獄多為其中小有未盡即卻之今國家封疆闊遠來徃動是五七千里再令勘覆轉是淹延今後冝令遣使分詣諸州令周細詳酌如不干人命使至便與㫁决不須重勘琪等曰謹奉詔即日分遣殿中侍御史李範等八人徃両浙淮南西川廣南録問刑獄以金部貟外郎奚嶼為京東轉運使壬辰詔曰朕恤念烝民憂勤庶政每令詢訪以導鬰堙苟規益之有聞豈卑髙之是間應天下幕職州縣官俱負吏才咸通時務其或知民俗利害政令否臧並許于本州附傳置以聞如所言有可收採必行旌賞或無所取亦不加罪先是轉運使及知州通判皆得上書言事而州縣官屬則否上慮下情壅塞故降是詔乙未鎮安軍節度使守中書令石守信薨守信字徳貞開封沒儀人事周祖爲小校累遷散指揮使從丗宗征并汾遇敵扵高平以戦疾力遷親衛左第一軍都指揮使師還授鐡騎左廂都指揮使顯徳二年從征淮南以功遷鐵騎控鶴四廂都指揮使領嘉州防禦使從平関南以功授殿前都虞侯未㡬遷殿前都指揮使領江州防禦使㳟帝嗣位授滑州刺史充義成軍節度使軍職如故太祖陳橋之入也時守信宿衛内庭聞変登左掖門嚴兵設備閉関以守太祖之典親軍官署在門内太后居其中太祖未至先遣帳下親信楚昭輔問太后起居及昭輔至守信啓関納之太祖甚徳之踐祚改領宋州刺史歸徳軍節度使從平李筠以功加同平章事李重進據淮揚叛命守信充行營招討使兼知揚州行府事維揚平改鄆州刺史天平軍節度使兼侍衛親軍馬步軍都指揮使上章乞解軍職詔許之以其子保吉尚許國公主加兼侍中上嗣位加兼中書令移河南尹西京留守進位守中書令從征幽州以失律降授随州刺史崇信軍節度使兼中書令尋進封衛國公乆之改陳州刺史鎮安軍節度使復守中書令至是薨年五十七詔輟視朝三日贈尚書令追封衛王謚曰武烈守信累任節鎮惟以聚斂為事性貪嗇積財鉅億萬計雅信尚釋教多所施捨在西京造崇徳佛寺役人輦運瓦木督責既急而所給不充其傭直人皆苦之丙申上岀粟豆数十本以示近臣因謂樞密使人顯等曰今年風雨雖調猶慮禾稼未得豊茂昨令徃京城四面百里外取得粟豆凡数種皆長数尺大是好田喜形扵色是日草澤上書言時政引對詞甚狂勃上不之罪慰諭以遣之因謂宰相曰徃昔帝王多以尊極自居詞氣嚴厲左右無敢貢一言者朕雖布衣言事必温顏以待之只如每與卿等款曲商榷時事蓋欲通上下之情無有所隐宋琪等頓首稱謝丁酉宰相以東封在近導駕儀衛合取進止上曰此行蓋為告謝天地與蒼生祈福廣陳儀衛即是勞擾非朕意也但一如令式己亥舒州言五色雲見於靈仙觀上庚子詔曰先是六年十二月辛卯詔書應諸道刑獄長吏每五日一録問今天下亦幾於治矣然頗為煩劳特示改更永期遵守今後冝令十日一録問杖罪以下便可依理踈决壬寅詔曰朕以眇躬嗣膺丕􅌟涉道猶淺布衣未孚中心惕然常所祗懼頼昊天垂祐黔首小康豊年屡臻四鄙不聳豈敢暇逸自謂宴安昨者文武羣臣洎手耆耋盈廷抗䟽連袂扣閽謂乎治平之時請舉升中之禮頋惟凉徳豈可克堪而陳請再三因以俞允載惟盛礼終覺愧懐况封禅之儀廢之已乆百司祇奉辦集尤難萬姓供輸勞優斯甚且令停罷更俟後期國門之南圓丘素備冝輟登封之禮聿修柴燎之誠朕以十一月二十一日有事于南郊凡爾臣僚當體兹意甲辰以定國軍節度使宋偓為右衛上将軍丁未免開封府推官張雍左右軍巡判官韓昭裔宋延煦愽州愽平縣令楊䖏仁等左右軍巡使殿直龎則王業並降充殿前承㫖醫人陳士良等並决杖流海島𥘉寡婦劉氏有姦状恐事露遂成憂悸之疾復懼其子陳告遂令侍婢陳訴稱其子王元吉寘毒于食中因病但未死事下開封府右軍巡按之未得實状移于左軍巡推典受劉氏賕掠治元吉遂自誣及開封府引問元吉始以實對府中不能决又移扵司録司盡捕兩軍巡元推胥吏按問之稍見誣􅌟之迹而府中以追捕者衆遂列状引見上以元吉薬母事状暗昧令免死决徒開封府将杖元吉元吉大呼曰元吉苟受刑府中官吏豈得了乎頃盡還元吉所用貨賂府中不敢决因問元吉行賂之状元吉暦指之遂具元吉詞𣢾上言元吉復令妻張氏撾登聞鼓以聞上覧之臨軒頋問悉見其冤枉之状亟令中使收捕元推官吏送御史䑓再鞫之至是獄具引見自雍而下上一一親問咸伏其辜特詔免元吉而有是命先是元吉繋左軍巡爲獄吏繋縛榜笞備諸惨毒不勝其苦至是上復令縛獄吏以其法償之獄吏宛轉號呌惟求速死上曰汝猶不勝其苦他人能勝之乎及觧其縛兩手不能舉良乆方復上因謂宰相曰刑獄中有如此惨酷京城尚如此况僻逺乎遂以右諫議大夫辛仲甫代劉保勲知開封府保勲洎判官李繼凝各奪一季俸郴州刺史張再興責授右率府副率坐知雄州日以麤率自任失政故也秋七月己酉朔以保平軍節度使杜審進為右衛上将軍壬子改乹元殿為朝元殿文明殿為文徳殿丹鳯門為乹元門癸丑詔曰先是郊禋五使權用他司印冝令有司各鑄印以賜之乙邜詔曰御史府憲令所繋獄訟攸歸凡在官聮皆為要劇所冝恪謹以承重任彊毅以肃羣姦豈可因循恣成縦弛如聞䑓中鞫獄多是委之有司御史但雍容端坐飬高自重而已故令羣吏為姦無所不至豈所謂徇公求理欽恤慎重之意乎今後凡有刑獄當推御史並頃躬親訊問研究詞情不得信任胥吏仍令中丞及知雜御史常加糾舉庚申詔改匭院為登聞院東延恩匭為崇仁檢南招諌匭為思諌檢西申冤匭為申明檢北通玄匭為招賢檢壬戌中元節上幸建隆觀謂宰相曰道門以冲澹為本夫道者天地萬物之祖而其教終㣲豈主之者非其人乎移幸太平興國寺回御東華門楼觀燈賜從官飲夜分而罷已已兵部侍郎致仕程羽卒羽字冲逺深州陸澤人少好學能屬文晋天福八年擢進士第解褐為鄆州陽榖縣主簿秩滿授易定祁等州觀察支使歴虞郷新都醴泉三縣令皆有政績開寳中選為兩使判官及引對太祖詢其時事稱㫖擢為著作郎出知興州踰年改知興元府詔歸闕上方尹京邑羽以本官充開封府判官羽性淳厚莅事恪謹上亦以長者待之及上嗣位拜給事中賜金紫知開封府未幾出知成都府為政寛簡蜀人便之入朝拜礼部侍郎充文明殿學士以年老艱于歩履求罷近職拜兵部侍郎請告百日假滿上章乞致仕詔從之仍給全俸至是卒年七十三上嗟悼数四官給葬事贈礼部尚書癸酉有司言有挟私逼脅人致死者請以抵罪上曰朕讀唐書見李義府逼畢正義死獄中然小人之情何所不至亦不足怪也令論如律歸州言古玉虗觀内天尊以木為骨其木忽生枝葉乙亥以前朔州觀察使駙馬都尉石保吉起復雲麾将軍新州刺史威塞軍節度使以前如京使石保興起復雲麾将軍領順州團練使太宗皇帝實録卷第三十書冩人張容𥘉對班紹宗覆對霍良弼
