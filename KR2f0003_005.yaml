body:
  text: 太宗皇帝實録卷第三十起太平興國九年五月盡七月五月庚戌朔上御乾元殿受朝賀辛亥車駕出南薰門觀稼召從官列坐於田中令民刈麥咸賜以錢帛回幸玉津園觀魚張樂習射久之宴飲極歡而罷壬子西州回鶻與波斯外道來朝貢西州婆羅門僧永丗自云本國名利得國王姓牙羅五得名阿喏你縳衣黃衣冠金冠以七寶飾之每出乘肩輿或乘象馬以音樂鑼鈸前導多遊佛寺博施貧乏妃摩訶你尾衣大袖縷金紅衣歲一出多振施人有冤抑俟王及妃出即隨之伸訴置宰相四貟國中庶務庫藏皆宰相裁制之五榖六畜果實與中國無異市易用銅錢其錢有文縵大如中國所用者但無穿耳東至大食國六月程又東至西州二月程又東至夏州三月程波斯外道阿里熛自云本國王號黑衣王子姓張名㬈里沒似衣錦綵衣好乘馬遊獵每出二月至三日即還委大臣九人同理國事男子以白㲲布為衣婦人豪冨者衣錦綺貧下者止服綃布種陸田無稻秝土産絲蠶羊馬果實無錢貨以雜物相貿易東至婆羅門六月程又東至大食國六月程又東至夏州二月程癸丑以西京作坊使順州刺史李克文起復雲麾將軍麟州防禦使依舊知夏州事詔銀州宥州復隸夏州戊午詔曰國家欽恤刑章重惜人命豈容酷吏恣為深文掠治無辜致其殞絶損傷和氣莫甚於斯鳯翔司理參軍楊酀許州司理參軍張睿並掠囚至死已從私罪決遣訖今後犯者並以私罪罪之先是酀睿各無辜考掠人至死法寺定為公罪上怒故有是詔甲子以左神武大將軍吳元輔領平州刺史以監察御史宋璫為陕西轉運使乙丑詔曰司理參軍專於推鞫研核情實尤在得人如聞諸道多闕此官蓋吏部拘以資敘難為注擬自今應有闕處冝令本州于見任前任簿尉判司內選擇明敏有官業者充秩滿當與升奬其罷軟不任職者便可選官代之先是諸處多闕此官而吏部以資敘相妨難於注擬上以庶獄為重不可暫闕故委本部選擇焉庚午以東上閣門使田仁朗判四方館事辛未以左拾遺直史館宋凖守本官知制誥壬申歸州刺史高繼元卒繼元字若虗中書令南平王保融之第二子也保融承祖父業據有荊南事具五代史及保融卒弟保朂立保朂卒保融子繼沖立建隆四年朗州周保權以部內將衡州刺史張文表叛求救於朝太祖遣山南東道節度使慕容釗帥師援之假道於荊南繼沖不敢拒之師既入城繼沖乃舉其地內有屬而入覲焉繼元即繼沖弟也繼沖卒後授繼元歸州刺史上親征太原命繼元京師巡檢車駕還京以繼元為河隂兵馬都監至是卒年三十一丙子以判四方館事田仁朗自京至泰山督治道之役丁丑乾元文明二正殿哭是日既夕隂雲四合風雷暴作夜漏𥘉上澍雨如傾雷電震激火發自月華門抱關者不之覺延燒漸北煙焰上出上遣小黃門開關視火勢已盛亟命宿衛數百人毁回廊連屋比明役士皆至併力救之至辰已乃息已卯以栁州團練使田欽祚為郢州團練使知夏州著作佐郎杜凝除籍為民以其知道州日居喪聽樂為人所訴故也六月壬午以􅐭鐵判官虞部郎中樊若水為荊湖轉運使封故燕國長公主次女髙氏為延昌縣主乙酉麟州防禦使李克文來朝以唐僖宗賜其祖夏州節度使拓跋思恭鐡劵朱書御扎上獻上因觀其詞旨卑替謂宰相曰朕嘗覽韓偓金鑾記見昭宗在鳯翔梁太祖引兵至城下號為迎駕其實脅君韓偓為翰林學士昭宗欲見之而為中官所隔潛匿伺便方遂一見可為歎息也宋琪對曰唐末亂離諸侯強盛其勢固不能久以雷德驤石熙古魏庠朱昂李惟清祖吉雷有終陳白楊緘李琯崔邁吕備分為兩浙峽路京西西川淮南荆湖江南廣南河北陕西轉運使丁亥詔曰朕以不明託于兆人之上夙夜祗惕罔敢怠荒賴九廟儲祥上玄垂祐萬務粗治于今九年而數日前雷之中烈火遽作既延哭于正殿蓋示譴於眇躬祗畏震驚罔敢寧處上天警戒必有由然豈非燭理之所未明賞罰之所未當物情尚多於壅塞政理未洽于和平生靈未息於瘡痍獄訟未除于枉橈賦調未得均一賢良多所淪滯有一于此足敗政經載深馭朽之誠思啓納言之路卿等列于有位咸切致君所冝各竭忠規共申讜議揚朝廷之闕失陳時務之否臧當悉乃心必期無隱朕將親覽用自警焉已丑登聞院引對婦人李氏自陳云無兒息身且病恐一旦溘死家業委棄欲未死有所屬上因謂宰相曰此婦人數日前朕已令開封府依所欲裁置之今復來告訴稱其父已𬒳繫矣此是小事何用禁繫京輦之下尚敢如此天下至廣冤枉可知朕恨不能遍閲天下獄訟親行決斷每見大理寺斷遣諸州刑獄多為其中小有未盡即卻之今國家封疆闊遠來往動是五七千里再令勘覆轉是淹延今後冝令遣使分詣諸州令周細詳酌如不干人命使至便與斷決不須重勘琪等曰謹奉詔即日分遣殿中侍御史李範等八人往兩浙淮南西川廣南録問刑獄以金部貟外郎奚嶼為京東轉運使壬辰詔曰朕恤念蒸民憂勤庶政每令詢訪以導鬱堙苟規益之有聞豈卑髙之是間應天下幕職州縣官俱負吏才咸通時務其或知民俗利害政令否臧並許于本州附傳置以聞如所言有可收採必行旌賞或無所取亦不加罪先是轉運使及知州通判皆得上書言事而州縣官屬則否上慮下情壅塞故降是詔乙未鎮安軍節度使守中書令石守信薨守信字德貞開封沒儀人事周祖為小校纍遷散指揮使從丗宗征并汾遇敵于高平以戰疾力遷親衛左第一軍都指揮使師還授鐡騎左廂都指揮使顯德二年從征淮南以功遷鐵騎控鶴四廂都指揮使領嘉州防禦使從平關南以功授殿前都虞侯未幾遷殿前都指揮使領江州防禦使恭帝嗣位授滑州刺史充義成軍節度使軍職如故太祖陳橋之入也時守信宿衛內庭聞變登左掖門嚴兵設備閉關以守太祖之典親軍官署在門內太后居其中太祖未至先遣帳下親信楚昭輔問太后起居及昭輔至守信啓關納之太祖甚德之踐祚改領宋州刺史歸德軍節度使從平李筠以功加同平章事李重進據淮揚叛命守信充行營招討使兼知揚州行府事維揚平改鄆州刺史天平軍節度使兼侍衛親軍馬步軍都指揮使上章乞解軍職詔許之以其子保吉尚許國公主加兼侍中上嗣位加兼中書令移河南尹西京留守進位守中書令從征幽州以失律降授隨州刺史崇信軍節度使兼中書令尋進封衛國公久之改陳州刺史鎮安軍節度使復守中書令至是薨年五十七詔輟視朝三日贈尚書令追封衛王諡曰武烈守信纍任節鎮惟以聚斂為事性貪嗇積財巨億萬計雅信尚釋教多所施捨在西京造崇德佛寺役人輦運瓦木督責既急而所給不充其傭直人皆苦之丙申上出粟豆數十本以示近臣因謂樞密使人顯等曰今年風雨雖調猶慮禾稼未得豐茂昨令往京城四面百里外取得粟豆凡數種皆長數尺大是好田喜形于色是日草澤上書言時政引對詞甚狂勃上不之罪慰諭以遣之因謂宰相曰往昔帝王多以尊極自居詞氣嚴厲左右無敢貢一言者朕雖布衣言事必溫顏以待之只如每與卿等款曲商榷時事蓋欲通上下之情無有所隱宋琪等頓首稱謝丁酉宰相以東封在近導駕儀衛合取進止上曰此行蓋為告謝天地與蒼生祈福廣陳儀衛即是勞擾非朕意也但一如令式己亥舒州言五色雲見於靈仙觀上庚子詔曰先是六年十二月辛卯詔書應諸道刑獄長吏每五日一録問今天下亦幾於治矣然頗為煩勞特示改更永期遵守今後冝令十日一録問杖罪以下便可依理踈決壬寅詔曰朕以眇躬嗣膺丕􅌟涉道猶淺布衣未孚中心惕然常所祗懼賴昊天垂祐黔首小康豐年屢臻四鄙不聳豈敢暇逸自謂宴安昨者文武羣臣洎手耆耋盈廷抗疏連袂扣閽謂乎治平之時請舉升中之禮顧惟涼德豈可克堪而陳請再三因以俞允載惟盛禮終覺愧懷况封禪之儀廢之已久百司祇奉辦集尤難萬姓供輸勞優斯甚且令停罷更俟後期國門之南圓丘素備冝輟登封之禮聿修柴燎之誠朕以十一月二十一日有事于南郊凡爾臣僚當體兹意甲辰以定國軍節度使宋偓為右衛上將軍丁未免開封府推官張雍左右軍巡判官韓昭裔宋延煦博州博平縣令楊處仁等左右軍巡使殿直龎則王業並降充殿前承旨醫人陳士良等並決杖流海島𥘉寡婦劉氏有姦狀恐事露遂成憂悸之疾復懼其子陳告遂令侍婢陳訴稱其子王元吉置毒于食中因病但未死事下開封府右軍巡按之未得實狀移于左軍巡推典受劉氏賕掠治元吉遂自誣及開封府引問元吉始以實對府中不能決又移于司録司盡捕兩軍巡元推胥吏按問之稍見誣􅌟之迹而府中以追捕者衆遂列狀引見上以元吉藥母事狀暗昧令免死決徒開封府將杖元吉元吉大呼曰元吉苟受刑府中官吏豈得了乎頃盡還元吉所用貨賂府中不敢決因問元吉行賂之狀元吉曆指之遂具元吉詞𣢾上言元吉復令妻張氏撾登聞鼓以聞上覽之臨軒顧問悉見其冤枉之狀亟令中使收捕元推官吏送御史臺再鞫之至是獄具引見自雍而下上一一親問咸伏其辜特詔免元吉而有是命先是元吉繫左軍巡為獄吏繫縛榜笞備諸慘毒不勝其苦至是上復令縛獄吏以其法償之獄吏宛轉號呌惟求速死上曰汝猶不勝其苦他人能勝之乎及解其縛兩手不能舉良久方復上因謂宰相曰刑獄中有如此慘酷京城尚如此况僻逺乎遂以右諫議大夫辛仲甫代劉保勳知開封府保勳洎判官李繼凝各奪一季俸郴州刺史張再興責授右率府副率坐知雄州日以粗率自任失政故也秋七月己酉朔以保平軍節度使杜審進為右衛上將軍壬子改乾元殿為朝元殿文明殿為文德殿丹鳯門為乾元門癸丑詔曰先是郊禋五使權用他司印冝令有司各鑄印以賜之乙邜詔曰御史府憲令所繫獄訟攸歸凡在官聮皆為要劇所冝恪謹以承重任強毅以肅羣姦豈可因循恣成縱弛如聞臺中鞫獄多是委之有司御史但雍容端坐飬高自重而已故令羣吏為姦無所不至豈所謂徇公求理欽恤慎重之意乎今後凡有刑獄當推御史並頃躬親訊問研究詞情不得信任胥吏仍令中丞及知雜御史常加糾舉庚申詔改匭院為登聞院東延恩匭為崇仁檢南招諌匭為思諌檢西申冤匭為申明檢北通玄匭為招賢檢壬戌中元節上幸建隆觀謂宰相曰道門以沖淡為本夫道者天地萬物之祖而其教終微豈主之者非其人乎移幸太平興國寺回御東華門樓觀燈賜從官飲夜分而罷已已兵部侍郎致仕程羽卒羽字沖逺深州陸澤人少好學能屬文晉天福八年擢進士第解褐為鄆州陽榖縣主簿秩滿授易定祁等州觀察支使歷虞鄉新都醴泉三縣令皆有政績開寶中選為兩使判官及引對太祖詢其時事稱旨擢為著作郎出知興州踰年改知興元府詔歸闕上方尹京邑羽以本官充開封府判官羽性淳厚蒞事恪謹上亦以長者待之及上嗣位拜給事中賜金紫知開封府未幾出知成都府為政寬簡蜀人便之入朝拜禮部侍郎充文明殿學士以年老艱于步履求罷近職拜兵部侍郎請告百日假滿上章乞致仕詔從之仍給全俸至是卒年七十三上嗟悼數四官給葬事贈禮部尚書癸酉有司言有挾私逼脅人致死者請以抵罪上曰朕讀唐書見李義府逼畢正義死獄中然小人之情何所不至亦不足怪也令論如律歸州言古玉虗觀內天尊以木為骨其木忽生枝葉乙亥以前朔州觀察使駙馬都尉石保吉起復雲麾將軍新州刺史威塞軍節度使以前如京使石保興起復雲麾將軍領順州團練使太宗皇帝實録卷第三十書寫人張容𥘉對班紹宗覆對霍良弼
