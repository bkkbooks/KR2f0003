body:
  text: 太宗皇帝實録卷第二十九起太平興國九年三月盡四月三月壬子朔宴中書門下翰林學士文武常參官節度觀察防禦團練使刺史諸軍校百夫長已上外國蕃客於大明殿上謂宰相曰天下無事良辰宴飲無辭盡醉飲畢以虗爵示羣臣宰相言飲酒過度恐有失儀之責上召權御史中丞滕中正笑而謂曰今日宴㑹蓋以君臣相遇為樂朕賜酒欲其歡洽苟小有失儀卿可勿舉劾也既罷因召渤海都指揮使大鸞河慰撫久之謂殿前都指揮使劉延翰曰鸞河渤海豪將投身歸我朕甚嘉之夷戎之俗以射獵馳逐為樂待秋凉當與馬數十匹令出游獵以遂其性仍賜酒及錢十萬鸞河渤海之酋帥也上征并汾首率小校李勳等十六人部族三百騎來降上憐其忠順故有是賜是日以河决將塞命翰林學士宋白乘傳詣白馬津以一太牢沈祠加璧甲寅詔曰蓋聞刑者不可復屬死者不可復生故三聽行誅聖人之所至慎一成不變君子之所盡心朕勤恤兆民哀矜庶獄每至三伏炎蒸之際隆冬寒沍之時未嘗不念彼圎扉憫兹徽纆而猾胥姦吏弄法舞文或苛虐以立威㦯稽留而不决撓憲令之綱紀傷天地之和平而欲百姓阜安四時順序其可得乎應天下繫囚宜令逐處州府軍監每十日一具所犯事由收禁月日聞奏仍委刑部糾舉乙卯日本國僧奝然與其徒五六人自其國至進銅器十餘事并本國職貟古今年代紀各一卷奝然衣緑自云俗姓藤原氏父為真連真連者其國之五品官也奝然善書扎與中國無異而不通華言問其土風但書以對云國有五經及釋氏經教並得自中國有白居易集七十卷五榖果實四時寒暑大抵類中國多米而少麥交易用錢其文曰乾文大寶無槖駝有水牛驢羊及犀象産絲蠶織絹薄緻可愛樂有中國及高麗二部國東鄰海島夷人所居身面皆有毛其東則大海無際東粵則産黃金西别島生白銀為國貢賦國王以王為姓年號天地元管六十八州土地廣而人民少壽百餘歲者往往有之其國王傳襲今六十四丗矣文武僚吏亦皆丗官上聞之歎曰此島夷耳而丗嗣長久臣下亦丗官此皆古道中國近自唐季海內分裂梁唐至周丗數甚促大臣子孫鮮能繼襲父祖之業朕雖德不及往聖然孜孜求理恐庶獄有枉橈未嘗敢自暇自逸以畋游聲伎為樂兾上玄降鍳亦以為子孫計使皇家運祚永久而臣僚丗襲祿位卿可各冝盡心以輔朕之為治無使逺夷獨享斯慶因賜奝然紫衣館于太平興國寺丙辰選祕書丞揚延慶等十餘人分為諸州知州上因謂宰相曰刺史之任最為親民非其人則下受其弊昔後漢秦彭為潁川郡守教化大行百姓懷惠乃有鳯凰麒麟嘉禾甘露之瑞足為善政故也以一太守善為政猶若此况君天下者乎何謂太平之不可致和氣之不可招也丁已駕幸相國寺回習射於後園上中的者五召近臣飲宴上甚恱因謂宰相曰夏州蕃部並己寧謐向之徑悍難制者皆委身歸順凡得酋豪三百七十餘人約三五萬帳族得十年已來戎人所掠人畜凡二萬五千口朕間者所遣將帥皆丁寧誡諭如蕃部中有狡惡為害者必以威武臨之順伏易制者必綏緝慰勞之是以戎人畏威而感惠昨亦不勞饋運秖令齎茶於蕃部中貿易供給亦無所闕又謂李繼捧曰爾在夏州能制蕃部乎對曰諸族狡惡不可制臣但羈縻而已若非天威所加豈能制御者乎命國子禮記博士孔維判監事已未滑州言河决已塞羣臣稱賀先是河决於韓村數州之地皆罹其災上患之集丁夫十餘萬治之自秋逾冬功既旱而復决上以方春播種不欲重煩民力於是發卒五萬人以侍衛步軍都指揮使田重進總督其役供奉官劉吉副之吉河東人有膽勇不畏彊禦明習河堤利害自贊請行且言河决未塞願夷族上壯之命吉領其役吉親負土與役徒晨夜兼作至是而塞吉之功居多即以吉為西京作坊副使賜豫甚厚上製平河歌賜宰臣宋琪等因謂曰昔漢武有瓠子之歌今朕聊志一時之事壬戌以左羽林統軍周保權知并州以右屯衛上將軍孟玄珏為宋曹兖鄆都巡檢乙丑召宰相近臣賞花於後園上曰春氣暄和萬物暢茂四方無事朕以天下之樂為樂宜令侍從詞臣各賦詩上習射於水心殿宰相宋琪等各以應制詩進上吟味久之翰林學士承㫖扈䝉有微臣自愧頭如雪也向鈞天侍玉皇之句上笑謂曰卿善因事陳情也䝉頓首謝辛未詔曰昨以河堤偶决近甸罹哭言念編民載深軫慮應開封府管內諸縣無出今年租賦壬申駕幸含芳園習射上中的者四宋琪奏曰陛下控弦發矢一如十五年前在晋邸時上曰朕比往時筋力雖未覺衰然少時好馬上馳射今不復為矣因謂琪曰囿游之地三數年不一至此且非數出宴游也時劉繼元孟玄珏錢惟濬李繼捧亦侍坐宋琪奏曰繼元以下各江南塞北之人嘗各據土疆纍丗不賔今並束身歸命入侍旒扆非神功聖德冠絶千古豈有如此之盛乎宋琪李昉吕䝉正李至各賦詩進上皆和而賜之上又製晚春游含芳園五言十韻詩一首賜宋琪等癸酉麟州言閝門使田仁朗敗戎人斬首三百級獲駝馬生口器甲千計乙亥以連州刺史任知杲本官致仕上章告老故也丙子甘露降太一宫祠庭柏樹先是都城東南建五福太一祠既成致饗於神祠官悉集未明前數刻而降已卯召宰相近臣宴於後苑上賦詩一章賜侍臣俾之屬和夏四月壬午光祿卿湯恱卒恱字德川其先陳人後家於江東之青陽父文圭乾寧五年進士登第以丗方亂將南歸梁祖時節制夷門愛其才欲辟于幕府文圭不欲就遁去至㑹稽錢鏐欲縻之亦不願止去詣宣州田頵頵執甥姓之禮待之文圭但從容談笑無所預頵敗獲免至淮南楊渥以為掌書記恱幼頴悟九歲而孤善屬文仕吳為祕書省校書郎時張廷翰宋齊丘皆掌吳政以恱俊敏共推薦之授祕書郎直門下遷水部貟外郎改本曹郎中並知制誥李升建國授中書舍人時書命填委恱援筆立成詞理典贍未幾擢為翰林學士李景繼立加學士承㫖遷禮兵部侍郎改中書侍郎簽署省事罷職拜户部尚書依前充學士承㫖周丗宗舉兵至淮上李景以機務方繁命恱知樞密院事顯德五年淮南平景遣入貢先是丗宗駐蹕于揚州孝先寺見恱所撰碑歎賞久之及至待之禮甚優異太祖受禪景擢遷洪州以子煜守金陵留恱佐之煜嗣位拜右僕射充樞密使加同平章事節制潤州不樂在鎮改授太子太傅監修國史旋守司空判尚書省再秉政江南平歸朝改授太子少詹事上即位以恱素有才名召直學士院踰年改光祿卿至是卒年七十三輟視朝一日恱本姓犯翼祖廟諱而名崇義後改姓又改名有詞人從江南來因謁恱從容評及江南文士謂恱曰二徐及公詩皆善帷崇義差不及耳聞者傳以為笑癸未以涪陵王子德恭為峯州刺史德隆為瀼州刺史女壻韓崇義為靜難軍節度行軍司馬右衛率府副率假守榮决杖仍削籍為民坐華州監倉概量為姦故也甲申命宰相及羣官分禱京城祠廟祈雨是夕雨足以東上閣門副使王侁為西上閣門使戊子宰相宋琪率文武百官及諸軍將校蕃夷酋長僧道耆老二萬六千三百五十人詣東上閣門再拜稽首上言曰臣等聞皇王大功莫大于混一中夏古今盛禮莫盛于登封介丘其或鯨海雞林已聞于效貢金泥玉檢尚闕於告成則何以繼三五之鴻猷副億兆之䖍望臣琪等誠惶誠懼頓首頓首伏惟應運統天睿文英武大聖至明廣孝皇帝陛下紹勛華之正統施造化之玄功亘地罄天罔不率俾望雲就日無所不賔爰自唐室衰微四方雲優東吳西蜀瓜䚯豆分民無邊歸亂靡有定梁唐祚短不暇經營晋漢綱頽莫能恢復陛下膺圖出震執契嚮明四海於是㑹同二儀以之交泰歷代之典章畢舉生民之耳目惟新極千古以牢籠掩八絃而覆肓離肩反踵之俗襲冠帶者以百數白環碧砮之貢充蠻邸者以千計鑿空萬里攘地千都豈止廣長榆而通大夏靈貺交集珍符揔至豈獨歌赤鴈而頌白麟暢玄化于胥庭均至和于㝢縣歷選列辟盛德大業未有如此之盛者也是以三事大夫洎于黃髮之叟咸願延頸企踵以觀大禮于升中是冝訪制云亭追蹤八九以答玄貺以徇羣心若却之而不顧抑之而弗處則何以塞神祇之望慰夷夏之心哉伏請申命有司草定儀注擇吉日登泰山昭厥成功以光盛禮臣等不勝大願詔答曰朕嘗乙夜觀書鍳前王之事迹多矣若乃至聖同堯大功超舜砥績類於伯禹敷佑比于成湯然後可以髙蹈介丘遐登日觀告成功於上帝祈景福于下民歷萬代以流光冠百王而擅美者也其或功虧治定德謝欽明道未洽于黎氓信未孚于㝢縣安可告成天地展禮云亭朕自纘丕圖若涉淵水方思日慎以答天休止期粗洽于小康焉敢輒言于大禮卿等忠于事主善則稱君誠雖可嘉事則未暇省覽數四愧畏良深所請冝不允辛卯羣臣再上表曰臣琪等今月八日拜章丹陛瀝懇明庭叙華夷億兆之心述天地神祇之意乞展告成之禮聿修帝類之儀庶耀玄功式昭盛德遽頒明詔未允丹誠中外顒顒萬知所處伏惟應運統天睿文英武大聖至明廣孝皇帝陛下道侔覆載明並照臨追三五以同符體隂陽之不測而自紹開寶運光啓鴻圖親駕戎車自秉武節靈旗所指并汾摧破竹之威文誥所施東南無負海之固此陛下武功震耀之力也視朝之暇靡倦觀書聽政之餘常聞論道酌百王之步驟盡得英華考夏商之質文皆窮奧妙淳化由是丕變玄功以之孔昭此陛下文德化成之功也若乃萬機在念常切宵衣一物疚懷未嘗高枕故得刑清訟息俗阜民和草木效祥盡入朱絃之奏羽毛薦瑞皆登清廟之歌臣等歷觀自古受命封禪之君交三神之歡接千歲之統未有如陛下之盛也况道超軒昊功冠古今而尚闕登封之儀猶稽肆覲之禮臣等有所未諭也伏願拾謙讓之小節思光大之逺圖特詔禮官申明大典遂萬國侍祠之願諧百靈望幸之心俾耀寰區以光簡冊詔答曰朕懨纘丕圖誕膺駿命屬九服清宴四時順成祥瑞荐臻哭沴不作斯蓋天地之垂祐宗廟之降靈至于庶政允釐彝倫攸叙則輔弼之力戎夷畏服疆場砥寧則將帥之效在于凉德何能致是而文武百辟華夷衆心繼瀝懇以同辭願升中而展禮雖歸功于上足見忠誠而涉道未深殊增愧畏再煩啓迪徒切嘉稱所請冝不允癸已內外文武羣臣三上表曰臣琪等言近者以升平斯久告謝猶稽再陳率土之心乞展泥金之禮臣誠既竭乃春未回彌增深薄之憂寧逭再三之瀆臣琪等誠懇誠迫頓首頓首伏惟應運統天睿文英武大聖至明廣孝皇帝陛下慶演丹陵道光赤水勵清明而御俗躬玄默以化人武暢九垓則華夷偃革恩覃萬彚則翔泳懷仁頳莖玄甲之祥昭宣緗史文鉞碧砮之貢洋溢槀街去冬鄒魯遺氓班白舊老掎裳連𬒮萬衆一心咸陳盛德之容願覩升中之慶而皇帝陛下未回宸想猶執謙尊况今上瑞仍臻休徴沓至欽崇玄館則湛露垂甘堙塞洪河則榮光順道漢武之窮兵逺代遽紀三山丗祖之乘運中興仍修八陛功微大定業謝時雍豈若皇帝陛下今日之盛也又安可久違玄貺高謝鴻名鬱宗社之耿光略皇王之丕訓伏覬采倪寬之往議詢梁松之舊言俾掌故奏儀司歷練日儼搢紳以戒路肅羽衛于周廬日觀儲精俟俟蒼璧之禮天孫寫望迎黃屋之來金泥玉檢以盡誠六舞五聲而節步大備闕典咸秩無文驅彼黎元躋于仁夀垂統成化億萬斯年豈不盛哉豈不偉哉臣等本以微生親承大化儻獲侍和鑾而登降事宋琪為封禪大禮使翰林學士承㫖扈䝉為禮儀使翰林學士宋白為鹵簿使賈黃中為儀仗使辛丑以駕部貟外郎劉蟠監察御史索湘為泰山路轉運使太府卿馬峯卒峯太原人仕劉繼元至右僕射致仕歸朝為將作監稍遷太府卿分司西京至是卒年八十餘詔輟視朝一日峯善服食為壽康彊無疾好持論性鄙吝無他可稱述焉癸卯以儀鸞副使康仁寶等部署丁匠七千五百人修宫壇于泰山甲辰布衣趙垂慶詣匭上書言皇家當越五代而上承唐統為金德若以梁上繼唐傳後唐至國朝亦合為金德矧自禪代已來符瑞狎至羽毛之類色白者不可勝紀皆金德之應也望改正朔易車旗服色以承天統事下尚書省集百官定議右散騎常侍徐鉉等奏議曰五運相承國家大本著于前載具有明文頃以唐末喪亂朱梁篡代莊宗以早編屬籍繼立丗功親雪國讎天下稱慶即以梁比于泚羿王莽之徒不可以為正統也莊宗中興唐祚重新土德自後數姓相傳晋以金漢以水周以木天造皇宋運膺火德况國𥘉便祀火帝為感生帝于今二十五年矣而又圎丘展禮已經六祭自是日盛一日年榖豐登干戈偃戢必若聖統未合天心焉有太平得如今日此皆上玄降祐清廟垂休致成恢一統之運也豈可輒因獻議便從改易恐違眷命深所未安又云梁至周不合迭居五運欲我朝上繼唐統冝為金德且後唐以下奄宅中區合該正統今便廢絶禮實無謂且五代運遷皆親承授質文相次間不容髮豈可越數姓之上繼百年之運此不可之甚也按唐書天寶九載崔昌獻議自魏晋至周隋皆不得為正統欲唐逺繼漢統立周漢子孫為王者後備三恪之禮當時朝議是非相半集賢學士衛􅊶挾同李林甫遂行其事至十二載林甫卒後復以魏周隋之後依舊為三恪崔昌衛包並皆逺貶此又前載之甚明也况今國家封禪有日冝從定制上答玄休伏乞聖宋永為火德從之丙午以坊州刺史馮鐸澤州刺史齊超分巡黃河堤堰戊申以侍御史張昉本官知雜事從憲臺之舉也太宗皇帝實録卷第二十九書寫人楊思恭𥘉對班紹宗覆對霍良弼
