body:
  text: 太宗皇帝實録卷第七十八起至道二年五月盡八月五月辛丑詔開封府判官楊徽之等三人分按行管內諸縣田畒旱損甚者蠲其稅壬寅新作相國寺三門成上親書額金填其字以賜之癸卯四方館使曹璨自河西來奏邊事云李繼遷率衆萬餘窺靈州上召宰相等於北苑門語其故曰繼遷因劫得輜重遂猖蹶自恣敢窺靈武驅烏合之衆頓堅城之下固無持久之理却緣城中人齎表告急為賊所獲賊以為危窘因頓兵未即引去卿等冝熟慮之朕固有成算矣吕端奏曰靈武軍儲甚闕逆黨又據守瀚海津要環慶路不通臣愚以為朝廷於麟府丹延環慶三道各發徑卒約輕齎徑走平夏攻取繼遷帳幕繼遷必顧惜巢穴望風引退如此則靈武之圍解而糧餽得通矣上曰不然三道起兵深入其所發甲卒凡幾萬人何人為將領何人將輜重況塞垣表裏沙磧三道兵馬於何處會合須更熟籌其事不可輕舉向來芻粟朕令分三輩護送丁夫悉令持弓矢自衛并給拒馬徑弩以衛車乘行李士卒令為方陳而行若冦之至則分布拒馬發徑弩士卒列陳以待之誠能遵守紀律豈至敗衄而將校皆自率胸臆不用條教當冦之至戰具未暇施設而丁夫先潰亂相蹂踐而死豈謨畫不臧蓋違朕節制所致也參知政事張洎曰盛暑之月水泉乏絶芻粟未集而議者欲三道舉兵深入以分賊勢陛下以為未見其利誠如聖旨丙午上飛白書數幅以示近臣字皆廣袤盈尺先賜宰相呂端一幅侍臣因競前爭取上笑曰昔劉洎登床正如此矣戊申詔劾廣南西路轉運使張觀採訪使太常丞陳士隆坐先奏交州黎桓為亂兵所殺丁璿復位不實故也庚戍司天中官正韓顯符言熒惑犯輿鬼秦雍之分國家當有兵在西北冬官正趙昭益言犯輿鬼中積尸秦分野有兵人民災害之象上語宰相等曰天文謫見如此秦地民罹其災五星凌犯朕常候之未嘗無其應朕旦夕念之不遑寧處李繼隆等兵馬巳到環慶賊聞王師之至固巳破膽其如靈州救援未及萬一不守城中皆漢民必盡為此賊所屠戮自閉壘來居人乏食飢死者必衆上因嗟嘆久之辛亥降手詔云靈州孤絶救援不及賊遷猖蹶未就誅夷居廟堂侍幃幄者正合運竒兵而伸婉畫冝令宰相吕端知樞密院趙鎔等各述所見利害再護送軍儲至靈武合發軍民多少舉兵深入賊境以分其勢又合用兵幾何何人將領何人監護直書其事言不必文只今日實封來上吕端等相率詣長春殿見上言曰臣等若各陳所見乖詢謀僉同之義望共為一狀述其利害張洎越次奏曰吕端等備位廊廟上有所詢問乃緘默而不言深失訏謨之體端曰洎欲有言不過揣摩陛下意爾必無逆鱗忤旨之事上默然壬子張洎上疏徴賈捐之棄朱崖事願棄靈武以省關隴餽餉上𥘉有意既而悔之覽洎奏不恱却以付洎謂之曰卿所陳朕不曉一句洎惶恐流汗而退上召知樞密院事向敏中等謂曰張洎上言果為吕端所料朕以其奏付之矣癸丑以給事中魏羽知潭州上曰魏羽雅有心計通明吏道但無執持與物遷徙爾朕自任使來末十年髭鬢盡白亦可憐也丙辰以左諫議大夫李惟清為嶺南東西路都轉運使丁巳以河北轉運使祠部郎中陳緯為陜西轉運使以江南轉運副使起居舍人梁鼎為陜西轉運副使太常博士直史館陳堯叟為廣南西路轉運使已未以西京作坊使敘州刺史御帶石普繫御史府驗問坐為西川巡檢擅離本部入奏事故也上謂宰相等曰石普恃在朕左右不畏王法徑赴闕庭朕巳令禁繫鞫問使知有刑獄艱苦昔蕭何周勃韓安國皆將相大臣猶不免於縲絏況此小臣乎既而召見赦其罪復遣歸任辛酉詔曰濵州管內蒲臺南北口岸等五處先是置渡官以船渡行旅取其課今水潦不降河道枯涸而吏猶責其直冝除之以靈州牙校丁惟清為殿直知西涼州事從戎人之請也六月甲戍上遣中使齎飛白書二十軸賜宰相吕端等人五軸又以四十軸藏於袐閣字皆方圎數尺吕端等相率詣便殿稱謝上謂之曰飛白依小草書體與隸書不同朕君臨天下復何事於筆硯乎中心好之不能輕棄歲月既久遂盡其法焉向來有江浙人稱能小草書因召問之殊未知向背但務填行塞白裝成卷帙而巳小草書字學難究飛白筆勢難工朕亦恐此書遂成廢絶矣庚辰溫州言永嘉縣民陳侃五丗同居內無異爨侃事親至孝為鄉里所稱詔旌表門閭賜侃母粳米束帛上因謂侍臣曰江州德安縣義門陳旭一族孝友恭儉無比參知政事張洎奏曰旭家長幼千餘口丗丗守家法孝謹不衰閨門之內肅如公府上曰近聆本郡歲或小歉以官倉米二千石貸之旭但肯受其半且云省嗇而食可以及秋成謂之曰何不受而糶之以邀善價旭曰朝廷以旭羣從千口聚居荒歉之歲特以王賦借貸私室豈可見利忘義為罔上之事乎此深可嘉賞甲申月有食之壬辰駙馬都尉魏咸信上言以其父仁浦郊祀覃慶自晉王進封齊王有避乞改封他國上以問宰相吕端奏曰晉國之上唯秦國為大冦準對曰自來中書不與朝廷執綱紀如魏仁浦進王爵當用三等以次追敘豈合便封晉國況晉國是陛下藩邸舊封用為贈典非允乃致邇來自晉封齊不滿望託以他故求改上曰可因此下詔以近丗巳來天下多故憲章隳壞古道者若干事並從釐改有司不能遵守者許憲司彈劾既而宰相等終不能奉行上旨甲午以五溪蠻酋向通漢為冨州刺史從其請也乙未以兵部貟外郎韓國華為京東轉運副使袐書丞任中正為江南轉運副使追復故靜難軍節度行軍司馬徐鉉左散騎常侍寧國軍節度行軍司馬李符右諫議大夫徐鉉等先坐事左遷沒於貶所至是始復之也丁酉河南府言瀍澗洛三水漲壞鎮國橋亳州言蝗從北飛來食田稼戊戌會州觀察使靈州兵馬部署田紹斌徴赴闕以引進使慕容德豐知靈州斬布衣鄭元輔於都市坐告醫官副使趙自化隂事不實故也始元輔依吏部令史張崇敏家崇敏自化之姻也元輔嘗從自化丐乞無所獲心銜之因詣檢上書告自化漏泄禁中語及指斥非所冝言等事上𥘉甚駭亟命宣政使王繼恩就御史府鞫之皆無狀故抵於法自化坐侍醫禁中與非類交結貶郢州別駕秋七月已亥朔綿州言魏城縣麥秀兩𡵨以殿前都指揮使王超為夏綏麟府州兵馬都部署庚子新作壽寧觀成觀在崇明門之北所費巨萬計凡數年而功畢辛丑建州言溪水漲溢入州城壞倉庫居民廬舍萬餘區鄆州言河水漲壞連堤四處甲辰賜嵩陽書院及版本九經書疏從本道轉運使之請也乙巳宴近臣於崇政殿以殿前都指揮使王超赴河西行營故也戊申陜西都轉運使刑部郎中宋太初責授懷州圑練副使轉運使吏部貟外郎盧之翰副使袐書丞竇玭並除籍以之翰為許州司户玼為商州司户掾並貟外供歷官閣門祗候李守仁決杖配隸汝州禁錮皆坐違制發軍糧詣靈州為李繼遷所剽劫故也嶺南諸州言大雨水以西京作坊使張守恩領綿州刺史河南府言河南縣民崔策家牛生三犢已酉以侍御史任肅為工部郎中河北轉運使壬子宋州言河決榖熟縣詔發丁夫塞之以馬步軍都軍頭劉能護其役給事中知襄州劉昌言上言臣自下車視事巳來屬連歲水旱之後百姓艱食輸納王賦多是後期先是六月開倉臣先一月令開倉受民輸納應管內館驛臣並權冝制置許民於逐處輸稅以備經費不受轉運司約束以便民部內擒獲羣盜臣盡令窮究沈命去處準近詔杖脊配役丁壯先準詔遣吏部送闕下臣恐吏柔懦不能制再亡命悉杖脊配隸本城禁錮此二事皆臣權冝處置不如詔書慮讒慝之口因而􅎊潤願陛下察之上賜璽書曰制詔劉昌言國家徴納租賦以資國用宣布律令以肅天刑三時之限甚寬畫一之法巳定何乃妄率胸臆作為聰明不循舊章撓亂經制廢格明詔建立新規斂怨於民莫斯為甚自今敢叛離官次背棄詔條當遣薄責不復恕也以京東轉運使韓國華為峽路轉運使甲寅青州言益都縣蝗生庚申太常博士直史館陳靖上言願募民墾田官給耕具糧種五年外輸租稅敷引利害凡數千言上覽之喜謂宰相曰地廣荒大而不治士之辱也朕常念五代戰爭巳來民多捨本趨末極目千里汚萊不闢心欲恢復古道驅民於南畒致於冨庶晝夜思之未嘗暫捨前後上書言農田利害者多矣或知其末而暗其本有其説而無其用陳靖此奏甚詣理舉而行之正是朕之本意因召對奬諭賜食而遣之吕端奏曰上失其道民散久矣今靖所立田法更易舊制大費國家資用望令三司詳議其可否從之乙丑宋州言榖熟縣河決巳塞丙寅以給事中參知政事冦準守本官罷知政事先是郊祀行慶中外官吏皆進秩準遂率意輕重其素所喜者多得臺省清秩所惡及不知者即序進焉廣州左通判馮拯任右正言右通判彭惟節任太常博士惟節序於拯之下及改秩為貟外郎拯得虞部惟節得屯田反在拯上惟節自以素居拯下如舊不易位會奏報準覆視怒其亂班制下詔書切責之拯憤曰上日閲萬機安察見此細事蓋冦準弄權爾因上疏極言并及嶺南管內官吏除拜不平凡數事條列以聞嶺南東路轉運使康戬又上書言除拜不平事因言吕端張洎李昌齡皆準所引端心德之洎曲奉準昌齡畏愞皆不敢與準抗故得以任胸臆亂經制皆準所為也上大怒準適祀太廟行事召吕端等詰責之端曰臣等皆陛下擢用待罪相府至於除拜專恣實準所為也準剛強自任臣等忝備大臣不欲忿爭慮傷國體因再拜請罪會準入對上説及馮拯事準抗言與端等同議除拜上曰廷辨是非又深失執政之體準猶力爭不巳上先巳惡準因歎曰雀鼠尚知人意況人乎翌日準又抱中書簿領論曲直於上前上益不恱至是遂罷丁卯以主客郎中直昭文館李若拙使交州戊辰詔曰峽路諸州民先欠至道元年租稅及沿徴物並除之劒州言尤溪縣民鄭安母疾安割股肉為羮以飼母母病愈許州宿州齊州言蝗生不為災皆抱草死邢州言內丘縣民劉顯父死割左乳以祭閏七月已巳朔以給事中冦準知鄧州庚午有司言諸州闕釐務京朝官共五十餘貟詔左右丞李至等八十四人各於州縣幕職中保舉廉恪有吏幹可任以事者一人辛未詔曰自今中書門下只令宰相押班知印其參知政事遇正衙橫行參假並重行異位非議軍國政事不得升都堂祠祭行香署敕並以開寶六年六月庚戍詔書從事先是吕端入相因上言臣兄餘慶任參知政事日班制悉與宰相同願舉而行之上從其請至是既逐準即命復舊甲戍慶州言懹安鎮屬國戎人誘諸族為冦護軍趙繼升率兵擊敗之獲羊馬數千計斬首三百級乙亥陜州言河水漲一丈三尺有大樹流下衝壞浮禍失巨艦一丙子吏部引對常選人內一人自言臣在本州掌法按牘多晨夜讀之眼盡瘡生上謂之曰一州巳如是若在廷尉決獄即當喪明矣笑而遣之丁丑罷嶺南都轉運使詔李惟清乘傳赴闕詔曰先是邢州監牧草地為民所占佃者俟秋成收刈畢並以入官更以他處間田給之丙戌以深州團練使尹繼倫為本州防禦使充靈慶路兵馬都部署丁亥桂州上言前轉運使起居郎張觀先坐奏交州事不實使者就劾獄未具而死觀字仲賔毗陵人江南舉進士及第歸朝為興元府掾復舉進士第改忠武軍掌書記上書言事稱旨召拜監察御史獻文章賜進士及第會三司言劒外賦輕詔遣觀乘傳按行諸州因稍增之觀上疏言俗異民逺不可撓動因而撫之猶慮其失所況擾之乎上深然之因留不遣俄兼度支判官改左司諫上疏諫治佛寺不報又諫上與計臣論錢榖失尊嚴之道願一切責有司不親細務出為諸路茶鹽副使上疏言更置茶鹽非便不合旨改知廣州遷揚州有善政徴為三司河南東道判官會詔計司官屬不離得局言他事觀自以任諫官上書指言拾遺輔闕之職上怒出知道州移嶺南西南轉運使𬒳劾至是卒年五十三觀博通史漢雅好論事典麗切直有古人之風采焉免國子博士李元吉坐知宋州日河決故也單州言大雨水淹沒管內諸縣民田苗稼盡死庚寅詔曰江南兩浙福建等路州府軍監部內先是貧民負欠冨人息錢物無以償沒入男女為奴婢者限詔到並令檢勘還其父母敢隱慝者許鄰里告訴差定其賞焉八月已亥朔司天言壽星丙地是日詔江南兩浙淮南諸州置糴分遣京朝官蒞之以歲熟故也辛丑許州舞陽縣尉劉蒙杖脊配役少府監三年坐決殺本縣役夫故也密州言蝗生不為災患抱草死丁未容州觀察使傅思讓卒思讓冀州信都人武勇善騎上在藩邸日以隸帳下輔親事都校即位輔衛士直長纍遷馬步軍副都軍頭領平州刺史北征破虜於唐興口以戰功纍遷龍衛右廂都指揮使領奬州圑練使出為鄭州防禦使知冀州兼兵馬都部署改容州觀察使知莫州移知隴州至是卒年七十四詔贈保順軍節度使已酉以前虞部貟外郎李宗訥為駕部貟外郎前太常博士直昭文館李宗諤為禮部貟外郎直昭文館前袐書省校書郎李宗諒為大理評事前國子四門助教李昭迪為袐書省校書郎皆故司空昉之子及孫也上推恩舊老而有是命蜀州言捕獲劫賊十人內文次年十三其父令持兵器從行法當死上以其幼騃特宥之庚戍前商州豐陽令喻蟾接宰相自言江東人歸朝廷凡四任令宰年七十五吏部以年當免望許歸故郡宰相以聞上憐之特授以光州定城令壬子以右贊善大夫袁及甫為殿中丞峽路轉運副使免前轉運副使太常丞張曄仍削一任曄均定果閬等州民歲輸租絹為有司所糾故也先是峽路諸州承孟氏偽政賦稅輕重不等閬州稅錢千八百為絹一匹果州稅錢六百為絹一匹民前後詣闕擊登聞鼓陳訴者凡二十年矣詔下本道官吏多因循不為理曄年少氣鋭會受詔按覆因便冝行之鹽鐵使陳恕奏曄擅改法制計果州歲虧上供絹萬餘匹以是獲罪駕部貟外郎李宗訥上言乞河南府官地五十畒以廣父塋城從之甲寅以給事中魏庠知審刑院張佖判大理寺丙辰遣翰林畫工二人赴國子監畫三禮圖待詔一人督其事已未潮州言有胡僧一人在海岸持帝鐘鈴杵銅鈴各一銅佛一軀貝葉書一篋與之語不能曉免太常博士劉皓仍削一任坐先受詔鞫獄真定擅掠治囚致死故也庚申深州防禦使靈慶路兵馬副部署尹繼倫卒繼倫開封浚儀人父勳終郢州防禦使以父任輔殿直上即位改供奉官纍遷至洛苑使北面沿邊巡檢破虜於唐徐二河間大克獲虜畏之以繼倫狀貌竒偉面黧黑相戒曰當避黑大王威聲大震戎人自是不敢窺邊以功領長州刺史朝議以賞薄改尚食使領長州團練使遷深州團練使兼兵馬部署會分遣將帥五道討李繼遷大將李繼隆部署靈環路逗撓不進軍上怒急召繼倫改本州防禦使充靈慶兵馬副部署繼倫先以𬒳病聞詔遽起受詔即自殿門乘驛赴行營既至病甚而卒年五十上聞之嗟悼追録其功賻贈加等遣中使護其喪歸葬京師辛酉以太常博士直史館陳靖為勸農使按行陳許潁蔡襄鄧唐汝等州勸民墾田以大理寺丞皇甫選光祿寺丞何亮副之選等上言以為功難成願罷其事上初不從猶詔靖經度未幾三司議以為費用官錢多萬一水旱恐遂散失上重違羣議遂寢癸亥殿中丞柳冝上言第三男蒙叟願於楊州崇道觀度為道士許之乙丑月入太微垣端門丙寅詔制置劒南峽路諸州旁户先是巴蜀民以財力相君每冨人家役屬至數千户小民歲輸租庸亦甚以為便上言者以為蜀川兆亂職豪民嘯聚旁户之由也遂下詔令州縣檢責俾鄉豪更相統馭三年能肅靜冦盜民庶安堵者並以其豪署州縣職以勸之遣職方貟外郎時載監察御史劉師道乘傳齎詔書諭旨既而載等復奏旁户素役屬豪家民皆相承數丗一旦更以他帥領之恐人心遂擾因有他變上然之其事遂寢丁卯史館以史記雕版成上之詔以諸州販易私鹽三十九人黥面為卒號平河指揮以潤州亡卒十二人隸焉先是御馬以織成帊覆鞍勒詔以黃絹代之太宗皇帝實録卷第七十八書寫人王壽昌𥘉對訖王良弼
