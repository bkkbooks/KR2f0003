body:
  text: 太宗皇帝實録卷第三十一起太平興國九年八月盡雍熈元年十二月八月戊寅朔詔曰國家撫育黎民哀矜庶獄累降詔敕以儆有司而約束之言猶有未盡更條其事申而明之應兩京及諸道州府有鬭競至杖罪以下本處長吏便可躬親決斷不必更下所司廣有逮捕使獄吏因縁爲姦及逺郡刑獄有無可疑而奏案待報者自今並禁止之初上謂宰相曰朕於刑獄尤所疚懷今西蜀嶺南皆數千里往來覆淹延刑禁冝有條約乃降是詔壬午御製四成字四髙字詩各一首賜近臣令屬和以殿中侍御史趙安易監察御史趙齊並爲宗正少卿甲申以靜難軍節度行軍司馬劉知信爲左衞將軍領營州刺史嘉州言江水暴漲壞官寺廬舎溺死者千計乙酉以監察御史索湘爲河北轉運副使壬辰詔曰錢刀之用以通有無輕重相權泉流不匱漢魏之後其弊蓋多國家即山鑄銅奄有呉蜀冨姬周之九府法上林之三官而民俗之間犯禁者衆姦僞旣廣輕重滋多自今兩宫及諸道州府冝申明舊禁不得雜用私鑄細小及鐵鑞錢仍每貫須重四斤半巳上其細雜錢限一月内並須納官癸巳有布衣以皂囊封書獻者其詞狂妄上覽而不之罪因謂宰相曰比降詔書許人言事近有上章者朕皆一一覽之但外人不知朝廷要務所言孟浪不切機㑹本欲下情上逹庶事無壅故雖狂勃亦不加罪宋琪等對曰陛下廣納言之路苟百中得一亦是國家之利甲午延州淄州言大水壞官寺民舎漂溺人畜丙申太一宫成上將親祠先一日遣翰林學士賈黃中致祭告之其詞曰維太平興國九年歳次甲申八月戊寅朔二十日丁酉皇帝謹遣翰林學士尚書司封郎中知制誥賈黃中稽首上告于五福君基十神太一帝君之神夫明靈之降難可度思精意茍存必垂昭格顧惟寡昧嗣守丕基而德敎未孚化源猶鬱日愼一日于兹九年苟非上帝垂休明靈降鑒則安得民庶和樂豐穰荐臻荷此殊休實由玄貺惟神功施造化道貫幽明握上帝之靈符作羣生之司命頃者觀臺效職保章獻言以爲躔次所經將莅斗牛之分永惟靈馭下屬勾呉且欲伸蠲㓗之誠豈復以封域爲限載營間館卜此近郊庶苾芬之儀親承於祀事飈欻之駕時覿於神光所望納九有於胥庭躋蒼生於冨壽但以正詞而陳信敢言袐祝以求恩謹以至誠上祈冥祐丁酉車駕親祠太一宫壬寅澶州言河漲損民田雅州言江水漲九丈壞民廬舎以神武大將軍石曦知襄州左領衞大將軍趙延進知揚州甲辰以監察御史周渭爲兩浙西南路轉運使白州言大風壞官寺民舎九月戊申朔以磁州團練使潘光𥙿爲右千牛衞大將軍丙辰以太子中允崔邁爲陜府西路轉運使副吕備爲轉運使壬戌宰相率文武百官上言曰臣聞道之大也二儀生焉萬物母焉而豈辭希夷罔象之謂天之髙也四時行焉三光麗焉而靡謝昭回乾健之稱斯蓋物理之常情而聖人所以無避者也伏惟應運統天睿文英武大聖至明廣孝皇帝陛下功參玄極道貫往初思溢六虚恩覃萬彚納百王於軌度懷九有於胥庭大夏九眞條支越裳之貢雜沓乎槀街合穗連理華平闊逹之秀充盈乎瑞諜天人昭荅符應荐臻猶且翼翼小心乾乾夕惕訪峒山而問道遇乙夜以觀書游神於蠖濩之中端拱於穆清之際昨者人神合契億兆同心將以交歡三神接統千祀追云亭之盛禮踐八九之遐蹤檢玉之祠不陳於袐祝射牛之禮巳講於儒臣而勞謙載懷中道而止神貺集而不荅盛禮闕而弗營今柴燎在辰華夏畢至咸以爲羣心固而天聽不回則何以綏懷萬國盛德著而名號不稱則何以對越穹旻澤以􅎊之德以覆之昆虫草木罔不咸遂可不謂至仁乎恩以懷之威以肅之華夷蠻貊罔有不率可不謂明德乎臣等不勝大願上尊號曰應運統天睿文英武大聖至仁明德廣孝皇帝伏惟上奉天明下從人欲誕受典策光昭永圖荅詔不允丙寅羣臣三上表詔曰朕祗膺丕構奉若昊天常懼燭理不明聽斷乖誤日慎一日于今九年賴上帝顧懷宗社儲祉兵戎甫定民俗小康載循沖人何能致此愧畏之意不敢弭忘今者輟升中之儀修柴燎之禮匪敢自大要在致誠夫溢美之累於道虚言之過於實朕所不取也無爲煩數當體至懷所請冝不允庚午免太常博士李頌仍削兩任以知齊州日坐部内與尼姦故也辛未度支使左衞大將軍陳從信卒從信字思齊譙郡人也上在藩邸命從信典財用之出入恭謹彊力心計精敏府中無事大小悉委之開寶二年秋有司言太倉儲廩止於明年二月請分屯諸軍仍盡率民船以資江淮糧運太祖大怒切責計司曰國無九年之蓄曰不足汝不素爲計度而使倉儲垂盡乃請分屯兵師括率民船以資饋運是可卒致乎且設汝何用苟有所闕必爾乎取之三司使楚昭輔惶懼計不知所出乃詣晉邸見上泣告乞於太祖解釋稍寛其罪使得盡力營辦上許之昭輔出上召從信告之曰理將安出對曰從信嘗游楚泗間見糧運停阻之由蓋是逐處勘給主船軍人糧食是以凝滯若令往復自初起程即令計日併支沿路日食便可責其定限又楚泗間運米入船及至京輦米入倉皆令促其程限如此每運可減數十日楚泗至京千里舊八十日一運一歳三運若此則歳可増一運焉今又聞三司使令籍民船無好惡皆取之則冬中京師薪炭殆絶不若以新好船令運糧惡者任民載樵薪則公私俱濟今市中米貴官乃定價令㪷計錢七十商賈聞之以不獲利無敢載致京師者雖冨人儲物亦隱匿不糶是以益貴而貧民將憂其餒殍也今若聽其自便四方商旅皆至即米多而價自賤矣上曰然明日具以白太祖盡從其言於是事集焉上即位遷東上閤門使樞密都承旨坐事責授閑廏使閤門祗候上征并汾以從信爲大内都部署遷左衞將軍復爲樞密都承旨未幾以本官罷踰年以本官充度支使加本衞大將軍至是卒年七十二贈太尉從信無他才好詭誕有李八百者自言八百歳從信事之甚謹冀傳其術而終無所得侯莫陳利用者挾左道有妖術因從信推薦獲寵人以此非之壬申以諌議大夫許仲宣權判三司乙亥詔史館所編文集將就可令接續進來上謂宰相曰自去年冬末日讀御覽三卷未嘗廢闕有故即追𥙷之巳讀八百餘卷矣冬十月庚辰以知叙州舒德郛爲敘州刺史谿洞之首領來請命也詔曰應諸道州府自今犯竊盗五貫巳上十貫以下並決杖配隷所在徒役不必更奏十貫巳上及兇惡尤甚爲人患者即得取裁先是竊盗獄成皆取裁多致凝滯上知之故降是詔癸未乹明節羣臣上壽先是飲羣臣酒三行乃止是日上恱顧謂權御史中丞滕中正曰三爵之儀是謂常禮朕欲與羣臣更飲一巵可乎對曰陛下聖恩甚厚臣敢不奉詔殿上皆稱萬歳甲申詔曰華山陳摶養素丘樊韜光巖穴載應順風之請是増少微之耀慕我至化來儀帝廷不有嘉名何彰貞範可賜號希夷先生仍賜紫衣一襲摶頗工詩什居華山雲臺觀周丗宗聞其名召之旣至館於禁中月餘厚禮遣之還山及上即位來朝今復至上待之甚厚謂宰相曰摶獨善其身不于勢利所謂方外之士也入華山四十年度其年近百歳人且言天下安治故來朝覲此意亦可念也即令引至中書卿可試與之語摶旣至琪等因問曰先生得玄黙修養之道可以授於人乎摶白山鵶一乾州貢赤烏一趙州貢白鷹五霸濮潞晉夏等州貢白鷺鷥鷹二商坊等州貢白鶻一夏州貢赤鶻一歸州貢白鷂一鳳翔府貢白鸚鵡一朗州貢白銅觜一光州貢青花山鵲一房州貢琪等拜表稱謝請圖之付史館詔從之戊戌杖殺忠州録事參軍卜元幹免知州國子博士徐澤官仍削兩任並爲受賕枉法故也庚子杖殺禁軍鐵林小校李超坐牧馬濟州求掠民錢及劫殺道上行人故也先是國家以諸軍戰馬數多其外軍屯戍者皆在外而禁軍中騎兵尚多皆本軍飼養之每至三月分出於近京州郡放牧至九月復還本軍故超因牧馬而爲姦焉十一月壬子髙麗國王王治遣使以方物來貢庚申日有青赤背氣甲子上齋宿正殿乙丑宿太廟上以天氣晴和作歌詩三首賜近臣令屬和丙寅親饗五室出宿於齋宫丁卯日南至親祀南郊回御乹元門下制曰惟皇撫運樹洪業於中區惟辟奉天表至誠於大報朕自祗膺睠命嗣守丕基夕惕晨興宵衣旰食九年于此罔敢怠荒而豐歳屢臻五兵不試符瑞昭應書軌大同顧惟沖人何能致此蓋玄穹之所降鑒宗社之所儲休所以躬事禋燔告謝天地文物以之大備聲明於是孔昭六變升聞百神降假純嘏之錫豈獨在予思與萬邦同兹大慶冝改紀元之號仍覃作解之恩可大赦天下改太平興國九年爲雍熈元年自雍熈元年十一月二十一日昧爽巳前應天下繫囚除故殺人并十惡罪至死及官典犯枉法贓不赦外其餘罪無輕重咸赦除之内外馬歩諸軍將卒並等第賞給文武前任見任官諸軍將校致仕官並與加恩禁軍指揮使巳上未有功臣者特賜功臣諸道州府民户少欠太平興國八年終巳前夏秋稅物及義倉并賑貸斛㪷並與除放文武常參官及内外諸司使副禁軍都虞候已上諸道行軍副使藩方馬歩軍都指揮使父母妻未有官封者並與官封亡殁者亦與封贈文資常參官衣緋緑及二十年者許於吏部投牒以名聞諸處配流徒役人内有曽任職官巳經恩放還者委所司條奏貶官未量移者與量移巳量移者與復巳復資者量與叙用諸處征討將校殁於王事者自副兵馬使巳上並與贈官有親的子弟孫並與録用諸處監管埸務虧失官物及人户増起課額自後不敷者應舟船沈没及遭水火損敗錢帛西川諸州鹽井煎煉不及者昇杭州等見有積欠係官地基錢物等特與除放兩浙先欠淮海國王回圗質庫錢鹽等應自開寶七年以後舒掦泉福歙等州𬒳江南燒爇却斛㪷故涪陵王先於在京及諸州借過省倉庫錢帛斛㪷見勒元借人填納者河東管内僞命日於人户上舊率配錢物及江南舊日於興國軍人户上白配供軍茶貨等並特與除放應江南兩浙湖南嶺南人户見有丁身錢起今後並以年二十成丁六十入老其未成丁巳入老者及身有廢疾並與放免應郊廟諸司職掌及行事官並與加恩欠一選者令銓司注擬欠兩選巳上者減一選應自前亡命軍人及草冠聚集之處限詔到兩月並令於所在陳首限滿不首即論其罪諸道進奏使前資官等赴郊廟陪位者並與加恩西川廣南荆湖江浙漳泉發遣到僞命官吏等如正身亡殁其骨肉一任歸還應諸抵法人及殁於貶所者並許骨肉歸葬癸酉詔曰建州進士楊億年方髫齓冨有文華召試於前筆不停綴詞體優贍粲然可觀言念俊竒冝加秩序噫進不巳砥礪彌堅越景絶塵一日千里予有望于汝也可特授將仕郎守袐書省正字億建州浦城人刑部郎中徽之從孫也年十一能屬文援筆立成上聞其名乃詔江南轉運使張去華就加考試去華試以詩賦文論咸有可觀送至闕引對便殿神采俊爽占對閑雅上出詩賦題試之億援筆頃刻而成詞采靡麗上大嗟賞因謂宰相曰童蒙敏慧未嘗有如此者宋琪等奏曰陛下好文獎善故異人間出上曰可與一官留於京師時召之令賦詩於前以釋心耳故有是命襄州言襄賜縣百姓劉昉五丗同居長㓜百口内無異爨詔旌表門閭常稅外免其他役十二月庚辰楚王元佐陳王元佑韓王眞宗舊名冀王元儁益王元傑各加食邑一千户以太師尚書令兼中書令淮海國王錢俶爲漢南國王改賜寧江鎭國崇文耀武宣德守道功臣以刑部尚書平章事宋琪爲門下侍郎昭文館大學士工部尚書平章事李昉爲中書侍郎監修國史左諌議大夫參知政事吕蒙正李至皆爲給事中參知政事如故宣徽南院使兼樞密副使柴禹錫進封平陽郡侯右諌議大夫同簽署樞密院事張齊賢王沔並加左諫議大夫自藩鎭及内外文武官並進秩有差以丁卯詔書加恩故也癸未詔京城耆老百歳已上者凡百許人至長春殿上親慰撫之老人皆言自五代已來未有如今日之盛也賜束帛衣服茶荈以遣之乙酉詔曰王者賜酺推恩與衆共樂所以表昇平之盛事契億兆之歡心累朝已來此事乆廢蓋逢多故莫舉舊章今四海混同萬民康泰嚴禋始畢慶澤均行冝從士庶之情共慶休明之運可賜大酺三日酺飲起自秦法三人巳上㑹飲則罰金故因事賜酺吏民得㑹飲過則禁之魏晉之後無聞焉唐景雲開元天寶間曽舉行之至是郊禋始畢大慶溥洽故有是詔上因謂宰相曰朕讀唐書見睿宗巳後賜酺或連夜至七日九日亦或彌月無乃太甚乎娯樂不可過度三日爲得冝矣玄宗令三百里内刺史縣令各率音樂集都下亦勞擾之甚也丙戍月犯昴以少府監段思恭爲右諌議大夫袐書少監郭䞇爲左諌議大夫丁亥詔曰敦本抑末教化於是興行抵璧捐珠浮靡於焉止息朕祗承丕􅌟緬慕古風思欲崇尚儉朴革去澆競却難得之竒貨復大化之淳源冝自我先以率天下其嶺南諸州採珠埸罷之己丑以左領軍衞大將軍致仕孫守彬爲右屯衞將軍壬辰制曰王者祗膺寶圖奉若天命必在詳求淑哲所以翊宣風敎故姬周之盛本自姜任之烈虞舜之聖亦資皇英之助蓋化行於内而隂教以孚位正於中而人倫以叙始於宫閫迨于家邦前典具存敢忘脩舉隴西李氏柔嘉維則和順積中茂慶著於侯藩盛則傳於勲閥清芬桂郁睿問川流明惠成於自然仁孝本於天賦頃自作嬪帝室毓德椒塗象服垂風光昭令則關雎播美巳著樂章内理肅而九御有倫婦道著而六宫承式服阿保之箴誡知臣下之勤勞固已績茂公桑道光彤管而造舟之禮未加於徽命厭翟之貴未正於中宫豈所謂昭德垂訓嗣丗繼統者乎冝考舊章煥兹縟禮法軒星而踐位配皇極以爲尊可立爲皇后有司擇日備禮冊命甲午駕幸城北水磑回召近臣宴於後苑丙申大酺自丹鳯樓至朱雀門張樂遷四市貨殖五方士女大㑹作山車旱船往來御道爲魚龍曼延之戯又集開封府諸縣及諸軍樂人列於御街音樂雜發觀者隘道上御樓臨視召羣臣宴飲畿甸耆老列坐其下賜之酒食丁酉賜文武常參官詣尚書省宴飲上賜詩二首特降中使宣㫖曰今日卿等宴㑹恐未盡歡可更賜來日宴樂於是三日羣臣獻歌詩頌賦稱美者數十人並宣付史館庚子以濟州刺史陳廷山爲光州刺史壬寅以氊毯使張延景爲尚食使癸卬麟州防禦使李克文爲博州防禦使甲辰雨雪先是上謂宰相曰今冬天氣和暖開春恐有疫癘今郊禮酺宴之後若得三五寸雪大佳至是隂雲四合積雪盈尺太宗皇帝實録卷第三十一書寫人李竒初對吕興宗覆對霍良弼
