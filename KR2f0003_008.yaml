body:
  text: 太宗皇帝實緑卷第三十三起雍熙二年四月盡八月夏四月乙亥朔詔曰朕撫御寰區惠養黎庶軫憂勤而是切在夙夜以寧忘江南數州向罹旱歉雖行賑貸未救疲羸更均推食之恩以表憂人之意今遣監察御史安國楨等乘驛至彼與長吏度人户闕食者賑給之仍發官廩減價出糶因令訪察郡縣官吏為政善惡民間利病以聞先是去秋䖍吉洪撫饒信等州旱歉人民艱食雖巳令賑貸至是又遣國楨及太常丞馮拯榮見素左贊善大夫馬得一王茂之張茂才樊素著作郎宋鎬張維嵩張濤等分往慰撫察視之丙子詔曰夫經術者王化之本也故懸科取士要在得宜明經入用期於專業向者以毛詩周易尚書三經各為一科顧其本大小不相倫等況復選序之一致豈容藝學之不侔今後以周易尚書各為一科而附以論語爾雅孝經三小經毛詩卷秩差大可令專習法家之學最切於時廢之已久甚無謂也可復置明法一科亦附以三小經庶使為學精專用功均一是日上習射於後苑召近臣賞花釣魚張樂賜飲上連中的者五戊寅遣忠武軍節度使潘美復屯于三交以國子博士鄭濬文為水部貟外郎致仕老病求解官故也己卯啓聖禪院成詔僧睿齊主之其地即晉之護聖營也宣祖時典禁軍天福四年上誕於其地上即位太平興國中詔建為寺六年而功畢所費巨數千萬計殿宇凡九百餘間皆以琉璃瓦覆之先是平江南得旃檀瑞像并桑門寶志真身初置內寺至是並遷於是院辛巳詔諸郡選胥吏之廉幹者隸於三司初上以三司積弊之淵藪也舊吏姦猾尤為難制故於外郡選吏補之優給糧祿冀其畏法而自謹也己丑月掩心後星殿前承旨王著棄市坐監護資州兵馬為姦贓故也庚寅詔曰判四方館事田仁朗任寄腹心職居親近昨因戎羯騷擾邊陲令總師徒往伸平蕩而稽違詔旨詿誤軍謀畏懦不前張皇邊事遂使腥膻餘類敢搖蠆毒傾陷我城堡俘掠我吏民玩寇長姦實由於爾敗吾師律合置嚴誅尚念嘗侍軒墀久經歲月屈於朝憲伸我私恩勉懷思過之心以荷曲全之意可特責授商州團練副使令御史臺遣吏監送赴任初李繼遷率蕃部屢為邊患是歲二月攻麟州汝州團練使曹光實領兵檄巡為其所誘而殁又圍三族寨麟州馳驛以聞上遣仁朗與閣門使王侁宫苑使李繼隆閣門副使董願馳發邊兵數千擊之仁朗兵至綏州駐月餘奏請益兵於是三族寨蕃將折御乜殺監軍使者與繼遷合上聞之大怒亟遣軍器庫使劉文𥙿自三交疾馳代仁朗先是繼遷巳攻陷三族因急攻府寧寨報至仁朗喜謂諸將曰戎人隨逐水草散保巖險常烏合蝟聚以寇邊境勝則進敗則退無以窮其巢穴今繼遷嘯聚羌戎數萬衆圍守孤城慮王師之至必盡鋭攻之謂朝夕可拔府寧城小而堅戎兵雖少皆徑卒猶可以旬日受敵我俟其困率大兵擊之遣一將將彊弩三百以邀其歸路北虜成擒矣部署已定㑹使者齎詔召仁朗赴闕下御史按問仁朗陷三族狀對云所征兵在銀綏夏等州本州以城守為備不遣有兵千餘乃曹光實舊卒器甲不完故請益兵轉運芻粟復未備三族寨與綏州道逺非元詔所救也昨臣已定擒繼遷䇿㑹詔至其謀不果因言繼遷得蕃情願且降優詔懷來之或懸厚賞以誘部落酋長令斬其酋不爾恐他日漸為難制雖大益兵深入其地無益也臺司以聞上大怒切責憲府官吏御史遂重劾之法司以乏軍興者斬征人違期二十日者絞上止令降黜焉是行也仁朗誠為稽緩然計巳決而為王侁等媒孽􅌟成其罪故及於貶人皆惜之丙申上幸金明池因幸瓊林苑習射上為歌詩賜羣臣庚子夜甘露降于後苑花木之上辛丑夏州行營上言破西蕃悉利族斬首六百級虜生口三千梟僞代州刺史折羅遇并弟埋乞獲馬牛羊畜三萬計皆繼遷之黨也癸卯以香藥庫使張遜領媯州刺史五月庚戌以商州團練使翟守素知延州左諌議大夫滕中正知河中府辛亥天長軍上言有蝗食苗稼癸丑命右諌議大夫權御史中丞劉保勳同知京朝官考課庚申左羽林軍統軍周保權卒保權武平軍節度使行逄之子也建隆三年行逄卒保權尚幼部將衡州刺史張文表叛率兵襲朗州保權不能制及王師致討逃于山谷事定來見太祖不之罪授諸衛大將軍纍遷上將軍統軍至是卒壬戌亳州獻兩歧秀麥癸亥賜近臣御製五言詩草書扇各一又草書李白廬山瀑布詩共二十幅分賜之謂宋琪等曰朕公事之外未嘗晝寢讀書寫書自得其趣琪等對曰天下庶務陛下皆親決之又以讀書染翰為樂前代帝王所不能及也甲子上幸城南觀麥賜田夫布帛有差庚午中書門下言有常任職官譴謫在外者昨經赦宥望令歸闕責其後效上不許謂宰相曰朝廷致理當任賢良君子小人宜在明辨大抵人君宜先正其身亦如治家家長不正家亦亂矣故聽讒邪之言則骨肉至親坐成離間豈能致肥家睦族之道歟大小雖殊其致一也今海島瓊崖逺處甚有竄謫之人郊禋以來豈不在念蓋此等為行巇嶮若小得其志即復結朋樹黨恣其毁譽如害羣之馬豈宜輕議哉辛未以虞部郎中王龜從水部貟外郎王素左拾遺畢士元袐書丞張茂直充諸王府記室參軍上謂龜從等曰諸子生長深宫未知丗務必資良士贊導為善使日聞忠孝之道卿等皆謹恪有行故兹慎選各宜勉之龜從等頓首謝仍詔各賜衣一襲銀帶銀鞍馬以寵之壬申霸州獻白烏癸酉鳯翔府言歧山縣周公廟有泉忽湧耆老相傳云時平則流丗亂則竭唐安史之亂泉竭至大中年復流賜號德潤泉自後又涸今泉忽湧清澄甘潔甚異於常因圖之以進六月甲戌朔將作監丞木令儀削籍為民以知化州日坐贓故也己卯詔兩街供奉僧於內殿建道場上謂宰相曰今夏麥豐登比聞歲稔則民多疾疫朕恐百姓有災患今建此為民祈福未必便能獲祐且表朕請禱之意壬午中書門下言州縣官舊制南曹判成申流內銓注擬其職事官經中書陳狀除官中書不見本官歷任功過須下南曹勘覆方除官今後望令罷任職事官並赴銓曹準格注擬其特除拜不在此限從之乙酉中書門下言近日諸州府官吏去官赴舉者禮部貢院考試多是所業未精今後望令本處先呈試合格以聞待報方得解送貢舉院考試若所業紕繆其考試舉送官必當加罪本人免所居官從之丙戌以新及第第一等進士梁皓等二十一人為節度觀察推官第二等第三等并諸科三等人令右諫議大夫劉保勳兵部郎中楊徽之屯田郎中孔承恭同於吏部依常調注擬戊子詔曰去年有司上請通行江浙鹽商蓋欲均利於民而絶其犯禁者然變法易制自古所難故且行之歲時以觀其利害如聞罷榷之後重擾於民庶便於時宜仍舊貫自今宜依太平興國九年七月己酉已前禁法從事己丑詔曰先是兩浙轉運司言罷杭州榷酤令民隨稅輸麴錢自聞更改未甚便宜郡縣豪舉之家坐專其利鄉村貧弱之户歲責所輸求便於民反罹其害復從舊法庶協通規其所均錢宜並停庚寅詔廢西京稻田務辛卯內客省使麟州巡檢郭守文等上言自四月至六月三族寨諸蕃四十七族來降已令復舊業岌羅賦等一十四族拒命尋率兵擊之斬首數千級焚千餘帳獲人馬牛羊七千計乙未以金部貟外郎楊緘為江南轉運使比部貟外郎許驤副之庚子崖州人言長流人盧多遜卒年五十三辛丑詔曰古人云父母之名耳可聞而口不可道則知卒哭而諱止可施於私家閨門之事豈冝責於公府如聞州縣長吏頗以私諱責人甚無謂也今後內外臣僚三代名諱只可行之於已州縣長吏不得出家諱新授職官內有家諱者除三省御史臺五品文班四品武班三品已上許凖式上言其餘不在請改之限秋七月甲辰朔以刑部貟外郎李繼凝為兩浙轉運使丙午府州上言三族寨折御乜率中府黃乜三族五百餘户來降丁未蕃族寇金明寨巡檢李繼周率兵破之丁巳月有食之是日中元節駕幸啓聖院回御東華門樓觀燈召宰相親王節度使及近臣宴飲夜分而罷庚申詔曰存救之術儲廩是資所以攘凶災防水旱也備豫無素災至而思禦之其可及乎今豐穰屢臻宜多積蓄可令諸道轉運使與所在長吏共計度之考察倉儲無令敗損初上謂宰相曰國家以百姓為本百姓以食為命是知儲蓄最為急務昨江南災旱朕亟遣賑貸果無流亡盜賊之患若非積粟何以救之因下是詔甲子詔輟視朝一日以陳王元佑夫人李氏卒故也夫人故隰州防禦使謙浦之女既歸於王未封而卒朗州上言江水溢害稼乙丑以和州防禦使陸萬友為右監門衛大將軍庚午賜太平州道士趙王九錢三十萬仍改名自然自然當塗人也丗為縣民年十六嘗蘿一人年七八十狀貌甚偉自云我是隂君也汝有道氣今以辟榖之法授汝因出柏一枝令啖之曰自此當不食矣啖訖復教篆籀數百字覺以示人皆不能識或曰此天篆也道家符籙用之自是三五夕或一見於蘿中自然遂不食神色俊爽鄉里異之長吏以聞召至闕自云不食已三年矣故有是賜而遣之八月癸酉朔詔曰朕以庶政之中獄訟為切欽恤之意何嘗暫忘蓋郡縣至廣械繫者衆苟有冤抑即傷至和今遣袐書丞崔維翰等分路案問小事即決之大事須證佐者促行之仍廉察官吏勤惰以聞己卯以度支貟外郎直史館張宏為主客郎中史館修撰庚辰詔曰王者任人各有攸處茍適其用則無曠官近以新及第人為司理參軍恐其初列官常未通刑法令州郡長吏視其不勝任者於判司簿尉中兩易之內戌熒惑與歲星合于軫癸巳西南奉化王子以慈等三百五十人以方物來貢丙申教坊使郭守忠上言求外任上賜以束帛因謂宰相曰朕承纍朝喪亂之後所以勵情為治祁寒暑雨未嘗自便蓋恐政事壅滯今天下治自謂勞苦有效矣若以酒樂自娛則萬務將壅百姓何所訴哉然守忠之情亦可念也宋琪等對曰陛下求理切至未嘗游心宴樂徘優之徒無所施其技故守忠求外任以自效辛丑瀛莫二州上言大水損民田太宗皇帝實録卷第三十三書寫人馬頎初對吕興宗覆對劉孝廉
