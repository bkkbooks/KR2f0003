body:
  text: 太宗皇帝實録卷第七十七起至道二年三月盡四月三月辛丑朔上幸晉國公主第省疾也台州言黃巖縣民郭琮年七十四歲兄弟三人事母年一百四歲終身𬞞食為鄉里所稱詔旌表門閭賜其母米五碩帛十匹壬寅詔曰淮南西川峽路等處州府軍監每歲度僧尼並如江浙福建之例癸卯訪王府侍講邢昺上言𬒳皇太子令召臣於府內講毛詩久之賔客李至李沆皆列坐共聽戊申靈州言兵馬部署安州觀察使郭密卒密大名涇城人氣貌雄偉膂力絶人少喪父隨母適同郡人王乙因冒姓王氏瀛帥馬仁瑀聞其名使人召之因以隸帳下上在晉邸方寤寐竒傑仁瑀薦密得侍左右即位補衛士始復姓郭氏遷直長纍遷至都虞候領冨州刺史改馬步軍都軍頭出為棣州刺史遷本州團練使髙陽關兵馬都部署㑹李繼遷冦邊郡以密有武略擢領安州觀察使充靈州兵馬部署至是卒年五十八贈保順軍節度使庚戌以府州界五族大首領折突厥移為安逺大將軍父死來請命故也詔曰應伎術官見任京官者自今遇慶澤只加勳階不得擬常參官仍著為定式癸丑靈州言部署洋州觀察使皇甫繼明卒繼明信都蓨人也父濟仕至汾川令繼明身長七尺善騎射以膂力聞於郡中刺史張延翰以隸左右國𥘉𥙷衛士遷本班直長上即位纍遷至馹騎都指揮使領檀州刺史龍神衛四廂都指揮使領羅州防禦使未幾改領洋州觀察使出環慶路兵馬部署受詔護送輜重靈州繼明巳先約靈州部署田紹斌率軍迎援適𬒳疾篤禆將白守榮謂繼明曰君疾甚不可行恐失期㑹我率兵先往繼明宿將慮守策等輕佻與戎人接戰失利因謂之曰我疾少間遂矍鑠𬒳甲上馬彊行至清逺軍而卒年六十三上聞之惜悼詔贈彰武軍節度使繼明性謹願御下嚴肅士卒頗畏憚之甲寅保州團練使曹思進卒思進中山人少時戎人入冦虜其父思進奮擊得之州里稱其勇應募𥙷本城永順軍使選為鐵騎軍使纍遷至馹騎指揮使馬步軍都軍頭領澄州刺史受詔護邊兵屢與戎虜接戰殺獲甚衆以功遷領本州團練使改濮州圑練使定州兵馬副部署移保州團練使至是卒年七十贈滄州觀察使司天言熒惑守東井河北轉運使言順安軍民鄭彥圭六丗同居內無異㸑詔旌表門閭常稅外免其他役庚申詔曰先是諸道州府借官民錢令市耕牛皆貧無價以償並除之吏勿復徴督辛酉桂陽監言方鎔銀次騞然有聲銀液皆湧起若山峯狀以獻以宗正少卿趙安易為宗正卿丙寅有流星過中天分為三星相隨而隱丁卯內殿崇班閻光澤國子博士邢用之上言請開白溝河自京師抵吕梁口凡五六百里以通漕運無山源每歲京師水潦甚則通流可勝百餘石舟踰月不雨即渴涸光澤等妄言其利上聽之大發數郡丁夫以充役末幾宋州通判王矩上表極陳其不可且言用之襄邑有田園每歲苦水潦河渠成即無患矣上覽奏知其終不可成因詔罷其事以皇后母陳留郡太夫人吳氏進封衛國太夫人以歲旱宿戒乘輿將出諸寺觀祈雨㑹大風不果遣宣政使王繼恩巳下分禱焉戊辰詔曰自今侍御史寒暑服及殿中侍御史左右司俸料春秋賜帛並如貟外郎例給之上以京師少雨命有司講求故實有司言凡京都旱則祈嶽鎮海瀆及諸山川能興雲雨者於北郊望而告又祈宗廟社稷每七日一祈不雨還從北郊如初雨足則報賽用酒脯醢如常祀詔以給事中參知政事李昌齡祠北郊張洎祠太廟冦準祠社稷己巳以崇信軍節度使王顯知泰州鎮寧軍節度使柴禹錫知涇州以皇太子妃郭氏進封秦國夫人庚午以比部貟外郎陳如錫為河東轉運副使誠州觀使趙滔卒滔貝州清河人嘗給事壽帥趙贊上在藩邸日以隸帳下即位補衛士遷直長纍遷至都虞候領敏州刺史龍衛右第三軍都指揮使領本州團練使出護鎮州屯兵從破虜徐河降璽書褒諭遷本軍右廂都指揮使出為博州團練使俄充鎮州兵馬副部署遷誠州觀察使部署如故至是卒年七十詔贈歸義軍節度使葬事官給夏四月甲戌以侍衛馬步軍都指揮使李繼隆為環慶靈等州兵馬都部署殿前都虞候范延召副之以㑹州觀察使知靈州田紹斌為靈州兵馬都部署內外都巡檢使先是上命洛苑使白守榮馬紹忠等率兵護送芻粟四十萬於靈州李繼遷偵知之要擊於浦洛河我師與戰不利役夫棄輜重潰走悉為繼遷所獲始上令調發車乘分為三輩護送冦至易為禦而民力不匱乏轉運使違旨擅併為一遂致陷沒而丁夫相踏藉死者數萬人上聞之怒遽命繼隆等率師討致又遣國子博士王用和乘傳捕轉運副使竇玭繫獄詔驗問丙子宴近臣於長春殿餞李繼隆等赴河西行營故也丁丑命宰相及羣官分於京城寺觀祠廟祈雨布衣韓拱辰詣檢院上言訴宣政使王繼恩有平賊大功當秉機務今止得防禦使賞甚薄無以慰中外之望上大怒以拱辰妖言惑衆杖脊黥面配隸崖州禁錮癸未澍雨霑足近臣稱賀甲申屯田貟外郎吕奉天上言臣伏見經史年曆自漢魏巳降雖有編聮周秦巳前多無甲子太史公司馬遷雖言歲次詳求朔閏則與經傳都不符合乃言周武王元年歲在乙酉唐兵部尚書王起撰五位圖言周桓王十年歲在甲午四月八日佛生常星不見又言孔子生於周靈王庚戌之年卒於周悼王四十一年壬戌之歲皆非是也馬遷乃古之良史王起又近丗名儒後人因循莫敢改易臣竊以史氏凡編一年則有十二月有晦朔氣閏則須與歲次合同苟不合同何名歲次恭惟聖朝文教聿興禮樂咸備唯此一事久未刋詳臣探隱百家用心十載乃知唐堯即位之年歲在丙子迄太平興國元年歲亦在丙子凡三年三百一年矣虞夏之間未有甲子可證成湯既沒太甲元年始有二月乙丑朔旦冬至伊尹祀于先王至武王伐商之年正月辛卯朔二十八日戊午二月五日甲子昧爽又康王十二年六月戊辰朔三日庚午朏王命作冊畢自堯即位年距春秋魯隱公元年凡一千六百七年從隱公元年距今至道二年凡一千七百一十五年從太甲元年距今至道二年凡二千七百三十二年魯莊公七年四月辛卯夜常星不見距今至道二年凡一千六百八十一年從周靈王二十年孔子生其年九月庚戍十月庚辰兩朔頻食距今至道二年凡一千五百四十五年從魯哀公十六年四月已丑孔子卒距今至道二年凡一千四百七十二年巳上並據經傳正文用古曆推校無不符合乃知史記及五位圖所編之年殊為闊略諸如此事觸類甚多若盡披陳恐煩聖覽臣耽研既久引證尤明起商王小甲七年二月甲申朔旦冬至自此之後每七十六年得一朔旦冬至至此及古曆一蔀每蔀積月九百四十積日二萬七千七百五十九率以為常直至春秋魯僖公五年正月辛亥朔冬至了無差爽用此為法以推經傳縱小有增減抑有經傳之誤皆可以發明也古曆到齊梁巳來或差一日更用近曆校課亦得符合伏望聖慈許臣撰進不出百日其書必成儻有可觀願藏袐府詔許之書終不就戊子賜川峽路知州袁逢吉朱協李虛已薛顔邵曄查道劉檢等七人璽書奬諭章衮部內不理即令代還韓起嗜酒郡務多稽留不決李文斐得狂易病舉事乖當下轉運使問狀張嵩不曉時務委轉運使按驗以聞皆採訪使廉得其狀故也庚寅錫劒南招安使上官正手札曰言者君子之樞機也樞機之發榮辱之主禍福無門唯人所召不可以不愼不密遇事輒發悔不可追至若劒南遺妖尚未殄滅民庶未得安堵朝廷未得髙枕其誰罪乎汝律身御下雖為允當然而為之首領如有聞見善惡但當密具奏陳不令喜怒形於顔色使巴蜀官吏各安其所豈不善乎先是上謂近臣曰上官正於國家甚著忠節蜀川盜起之際氣𦦨甚盛朝廷深以棧道為憂正時在劒門逆黨奄至以孤軍破賊數萬之衆首挫其鋒及李順就誅其餘黨多亡命山澤憑恃巖險復相結集攻劫郡縣甚為民患王繼恩等多方招誘猶未能致正外抗威稜內推信誓諭以朝廷恩德稍稍投戈來降蜀境漸寧正之力也正自以受朕特逹之知左右􅒓潤之不行由是不畏彊禦不求聲援勵力盡瘁乃心公家人有所不及必面攻其短至於詬詈兩川官吏咸懷怨怒屢有封章訴其違越者朕以其嘗著功效意欲全愛之縱謗書押至朕終與明辨其如衆怒難犯古人不侮鰥寡柔亦不茹正終是武人不知書率意粗暴因知人之材力兼備者亦云鮮矣朕恐正功業未終而禍難先作因親書一幅以戒之癸巳上以梁雍宿兵歲凶歉心憂之令宰相召司天少監苗守信問以天道咎徴安在守信具為奏曰臣仰瞻玄象及推驗太一經歷宫分其荆楚吳越交廣並安寧自來五緯凌犯彗星出見及四神太一臨井鬼之間屬秦分雍及梁益之地民罹其災四神太一來歲入燕分歲在房心正當京都之地自兹朝野多有喜慶上覽奏令付史館乙未詔自今五品以上官任子不得復攝太祝悉令同學究出身依例赴選集先是上謂宰相曰膏粱之族官勳固以崇貴子孫仕宦者多至四五人每覃慶中書多授以攝官末幾即授正貟不十數年至閨籍此甚弊政亟冝革之故有是詔丁酉大理寺丞皇甫選光祿寺丞何亮等言先受詔往諸州興水利臣等先至鄭渠相視舊疏按史記鄭渠元引涇水自仲山西抵瓠口並北山東注洛三百餘里溉田四萬頃收皆畒一鐘白渠引涇水首起谷口尾入櫟陽注渭中袤二百餘里溉田四千五百頃兩處共田四萬四千五百頃今之存者不及二千頃乃二十二分之一分也詢其所由皆云因近代職守之人改修渠堰坼壞舊防走失其水故灌溉之功絶不及古況此水二郡六縣資其利以溉田畒望令增築堰埭舊有於水斗門一百六十七處悉巳毀壞望繕治之嚴禁豪民盜用水移大石洪門就近上河岸不損處開渠口通河水愼選能吏專掌其事又言鄧許陳潁蔡亳宿等七郡民力耕種不及之處官私間田共二十二萬餘頃凡三百五十一處並是漢魏巳來邵信臣杜詩任峻司馬宣王鄧艾等制置墾闢之地內鄧州界鑿山穿嶺疏導河水散入唐鄧襄等三州灌溉田土又諸處陂塘防埭大者長三十里至五十里闊五丈至八丈髙一丈五尺至二丈其溝渠大者長五十里至一百里闊三丈至五丈深一丈至一丈五尺可行小舟臣等按視諸處增築陂堰大費工役欲望於舊防未壞可以疏引水利處先耕二萬餘頃漸興置之詔從其請令自鄧州始但募民耕墾免其稅令選等保舉一人與鄧州通判同掌其事選與亮分路按察焉以右諫議大夫雷有終知許州戊戍右領軍衛大將軍薛惟吉卒惟吉字丗康故相國居正之養子居正妻妬悍不生育婢妾皆不得侍側養惟吉為已子愛之甚篤少有勇力形質魁偉多追逐京師無賴少年蒲博角抵縱酒為不法事居正不能禁及居正卒上親臨哭之居正妻拜謁上撫存數四問不肖子安在頗改節否必不能負荷堂構如何惟吉適在苫塊中聞其言驚懼愧赧伏不敢起自是益變節謝絶故與遊不逞輩居喪哀戚甚為得禮惟吉以父纍遷至左千牛衛大將軍出知澶州改揚州俄丁母艱抗表求終制國朝故事唯環衛之列有墨縗從事之文多卒哭起視事至是惟吉懇求居喪時論異之優詔不從起復知河南府連典歧秦二郡改左領軍衛大將軍受詔知延州未行而卒於秦州之治所年四十二惟吉長貴家既能折節下士視財如糞土輿議稱之然治閨門無法度及其死家人競財物妻子滿獄矣以西上閣門使張昭允護靈州屯兵己亥殿前都虞候并代州都部署王昭逺徴赴闕福州言天雨黃菽詔曰諸州司法參軍有不明律令者冝令本路轉運司於管內判司簿尉選通明格法者兩換之先是興國軍軍資庫卒十六人共盜官錢並按棄市獄上有司駮奏內六人止坐徒十人並合流三千里上覽奏驚悼故有是詔太宗皇帝實録卷第七十七書寫王壽昌𥘉對訖王良弼再對霍良弼
