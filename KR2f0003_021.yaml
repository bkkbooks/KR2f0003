body:
  text: 宋太宗實録本八十卷今厪存十二卷每卷後有書寫人及𥘉對覆對姓名字畫精妙紙墨亦古遇宋諱皆缺筆即慎惇廓筠諸字亦然決為南宋館閣鈔本以避諱澄之當在理宗朝也前朝實録唯唐順宗一代附昌黎集以傳宋元絶無存者盖正史修扵易姓之後汗青甫睪實錄遂成廢紙題有過而問焉者矣頃蕘圃孝廉岀此見示雖寸縑斷璧猶是五百年前舊物銘心絶品正不在多許耳丙辰臘月十二日竹汀居士錢大昕書扵吴门寓館余嘗淂宋時玉押銅押以癸辛雜識所載十五帝御押證之一爲宋太祖玉押一爲太宗銅押寶蔵之數年矣今次侯先生出示宋鈔閣本太宗實録十二卷有汪氏士禮居圖章知係黄氏蕘圃光生舊蔵每卷後有書冩人及初對覆對姓名卷中缺筆字如慎貞署筠朗構樹玄徴讓敦廓胊詬廵桓等十餘字竹汀居士寀爲理宗朝冩本今世蔵古家淂宋刻印本書數卷珍如拱璧況墨本官書乎況次侯爲趙王孫數典而不忘其祖不尤可寳乎余所淂銅押爲太宗舊物亦當与是書同帰趙氏坿記扵此以爲券光緒乙未臘月吴大􅊹題光緒己丑八月卄八日翁同龢獲觀敬題記光緒乙未十一月六日常孰曽之撰武進費念慈同觀扵舊山樓念慈題記
