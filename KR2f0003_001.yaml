front:
  text: 太宗皇帝實録卷第二十六起太平興國八年六月盡十月六月乙酉朔以給事中直學士院徐鉉為右散騎常侍以職方貟外郎髙繼申為兩浙諸州轉運使丙戌河南府言洛水漲五丈餘壞鞏縣官寺軍壘民廬舍殆盡左諌議大夫知開封府邊珝卒珝字待價華州下邽人父蔚仕至太常卿珝天福六年舉進士登第解褐授祕書省祕書郎直昭文館遷右輔闕起居舍人改庫部職方貟外郎受詔知通州以牢盆賦於民大煮鹽於郎山歲得萬餘石國𥘉出為洛陽令徴為倉部郎中隴蜀平命珝知三泉縣入為職方郎中揚州言民盜殺廣陵縣尉謝圖父捕繫民凡三百日獄未具州以聞命珝按之盡得其實民抵罪開寶中知揚州會征江表兼領淮南轉運使上即位遷吏部郎中嶺南轉運使徴為右諫議大夫領吏部選事移知開封府至是卒年六十三珝強力有吏材上方欲倚用及聞其死嗟嘆者數四賜其家絹百匹錢二十萬以營葬事丁亥以翰林學士中書舍人李穆知開封府膳部郎中知雜滕中正為右諫議大夫權御史中丞吏部郎中許仲宣為左諫議大夫依前嶺南轉運使兵部郎中劉保勳為右諌議大夫刑部郎中辛仲甫為右諌議大夫依舊知益州以庫部貟外郎楊徽之為刑部郎中大理正孔承恭為庫部貟外郎同考校京朝官殿最甲午河南府言榖水伊水洛水瀍水暴漲溢出岸壞官寺軍壘寺觀祠廟民廬舍萬餘區溺死者以萬計丁酉詔曰自今京朝官知録事參軍及知縣事者見本郡長吏用賔主之禮宴集班位其常參官在判官之上未常參官在推官之上所乘馬並不得用繁纓違者所在以聞當行責罰已亥制曰漢以尚書平處奏議魏以中書參掌機密邦國之務率繫于樞衡軍旅之謀多出于帷幄授受之際厥惟難哉宣徽南院使兼樞密副使金紫光祿大夫檢校司徒上柱國琅琊縣開國男王顯器量懨宏襟靈秀拔常事藩邸備極公忠纍踐榮班遂膺顯用風雨如晦益勵匪躬之誠夙夜惟寅愈挺致君之志樞機之任獻替尤資冝正名稱用伸毗倚勉堅許國之節式副知臣之明可檢校太保充樞密使進封本郡侯上召謂顯曰卿代非儒門少罹兵亂必寡學問今在朕左右典掌萬機固無暇博覽羣書命左右取軍戒三篇賜顯曰讀此亦可免于面牆矣又以宣徽北院使柴禹錫為宣徽南院使依前樞密副使右諌議大夫王明為給事中依前充鹽鐡使左衛將軍陳從信為本衛大將軍依前度支使潭刑言長沙縣民翟景鴻五世同居內無異㸑詔旌表門閭常稅外免其他役陜州言永定澗水漲溢出岸壞民廬舍軍壘千餘區丙午乾寧軍言御河水漲七尺五寸戊申新及第進士王世則以下十八人送中書門下處分餘並送流內銓命文明殿學士李昉樞密直學士張齊賢王沔中書舍人王祐同於吏部注擬上謂李昉等曰天下州縣闕官朕親選多士忘其飢渴召見臨問以觀其才豈望拔十得五但十得三四亦巖穴無遺逸朝廷多君子矣朕每見布衣搢紳間有端雅為衆所推舉者朕代其父母喜或召拜近臣必擇良日欲其保終吉也朕於士大夫無所負矣昉等拜謝已酉兖州言泰山父老并瑕丘等七縣民陳延福等千四百九十三人自言詣闕請封禪遣觀察判官廖文鐸護送之辛亥賜樞密使王顯開封府道德坊宅一區賜宰相文明翰林樞密直學士中書舍人節度觀察使建州所貢新茶秋七月甲寅朔工部侍郎致仕劉載卒載字德輿范陽人唐節度使總之五代孫也父昭任潁州下蔡令載後唐清泰中舉進士及第解褐授祕書省校書郎纍遷左拾遺集賢殿學士改殿中侍御史周顯德中歷倉部貟外郎知制誥擢拜右諫議大夫給事中國𥘉出知貝州代還奉使江表復命知鎮州坐與兵馬部署何繼筠不協為所構太祖惡之出為山南東道節度行軍司馬僅十年上即位徴赴闕復為給事中以老病乞骸改工部侍郎致仕仍賜一子出身至是卒年七十六載頗刻勵為學博通史傳著弔戰國賦萬餘言行于丗雅好釋氏佞佛甚謹晚年專以𬞞食誦經為事雅尚名節頗為流輩所稱戊午泰山父老辭歸故郡各賜束帛以遣之以新及第進士王丗則等一十八人並為大理評事知縣録事參軍又以第二等進士吳鉉為大理評事史館勘書鉉餘杭人舉進士嘗重定切韻及上親試因捧以獻既中第因令隸史館校定字書故有是命鉉所定切韻多以吳音作俗字數千增之鄙陋尤甚尋禮部試貢士為鉉韻所悮有司以聞詔盡索而毁之永不得行用丁卯制曰計功稱代則銘於旗常尚齒優賢則賜以几杖我有舊老時惟宗臣願追赤松之逰盡納水衡之俸不舉殊典何答元勳開府儀同三司檢校太師行右金吾衛上將軍判街仗司事上柱國邠國公王彥超早擁節旄亟更藩閫許國之誠夙厲臨戎之績素高為列辟之楷模實纍朝之勞舊緹騎二百寵以執金之權宸居九重聿成高枕之適遽形表疏願避官榮爰推進秩之恩以遂懸車之請優以廩給表豫眷懷可太子太師致仕仍依舊給右金吾衛上將軍俸料已已安化軍節度使沈承禮卒承禮字正臣吳興人錢鏐辟置幕下攝處州刺史鏐卒子元瓘以其女妻之署以牙校及錢俶襲位加承禮知威武軍節度使王師征江南俶命承禮率所部助攻毗陵平之
