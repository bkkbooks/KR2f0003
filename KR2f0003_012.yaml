front:
  text: 太宗皇帝實録卷第四十二起雍熈四年九月盡十二月九月辛酉朔濰州進嘉禾御製嘉禾合穗五七言詩二首賜宰相李昉等壬戍賜殿前承旨徐半千同進士出身仍賜緑袍及錢十萬以其上章言時政也癸亥以文思使薛繼昭領巒州刺史知江陵府以右拾遺任仲華直史館乙丑御製五七言六韻菊詩各一首賜近臣丙寅駕幸金明池觀魚召從臣垂釣因登水心殿習射上中的者五張樂宴飲極懽而罷以監察御史趙昂爲右拾遺直史館以同進士出身徐半千賜名巖叟仍授陳州司戸參軍丁卯以右補闕直史館胡旦爲戸部貟外郎充修撰已巳右千牛衞上將軍李從善卒從善字子師江南國主景之次子煜之弟也僞封萬安郡公累遷至兵部尚書紀國公周顯德中景遣從善入貢對見之際丗宗器之使還㑹景遷豫章命督諸軍事封鄧王煜立尊奉朝廷制度多所貶損降封楚國公開寶四年復遣入貢時太祖有平呉之志因留不遣制授兖州刺史泰寧軍節度使江南平改右神武大將軍上即位遷右衞大將軍改右千牛衞上將軍出爲通許監軍至是卒年五十輟視朝一日辛未以虞部貟外郎李度直史館翰林學士蘇易簡進乹明節内道埸歩虚詞二十章上覽而嘉之依韻屬和以賜易簡壬申以戸部貟外郎直史館石熈古爲尚食使癸酉以善醫司徒正等二十一人並充翰林醫學先是詔諸郡訪醫工之良者送闕下令太醫署校其業術優長者得正等故録焉丁丑以起居舎人田錫守本官知制誥錫進乹明節祝壽詩上覽之深所稱賞因和以賜之故有是命庚辰以屯田貟外郎崔䇿爲福建路轉運使國子博士范正辭爲江南轉運副使以著作郎王綸直史館辛巳以主客貟外郎知制誥宋準爲金部貟外郎罷制誥之職病故也詔曰王者上事穹蒼下臨黎獻遵執古御今之道推子民育物之心必務嗇以勸農庶家給而人足朕嗣守大寶惟懷永圖發一言必念生靈甞一膳先思稼穡雖燔柴吿類紫壇屢薦於至誠而執耒親耕青輅未行於盛禮敦本之道不其闕歟三推冝舉於舊章百代永垂於信史其以來年正月擇日有事於東郊行耤田之禮冝令所司詳定儀注以聞無至勞煩務遵典故是禮廢之乆矣制下之日中外歡洽以翰林學士宋白賈黃中蘇易簡同詳定耤田儀注已丑詔以滑州黎陽縣隷澶州冬十月庚寅朔以中書舎人王祐爲兵部侍郎祐乆在病告上以其舊德優之也壬臣召親王近臣射於後園上中的者五以左諫議大夫郭䞇爲鹽鐵使丙申乹明節羣臣上壽已亥賜宰相及近臣御製苑中見羣鶴飛七言詩一首令屬和壬寅詔曰江南道録問刑獄覆視災傷本處請官或多推避自今並須承牒即往從本道轉運使范正辭所奏也癸卯太白犯進賢星甲辰下元節京城張燈是日宴中書門下翰林學士文武常參官節度觀察防禦團練使刺史諸軍校百夫長巳上諸州進奉使外國蕃客於大明殿乙巳詔宰相李昉召樞密使王顯等於私第宴飲仍降中使賜羊酒丙午詔曰右驍衞上將軍劉廷讓位居上將任處邊城兼資統帥之權制彼㓂戎之境而乃擅離治所輒赴京都不畏憲章頗孤委寄有司議罪當在極刑特行寛貸之恩止降削除之命所冝自省知此優恩冝除削在身官爵送商州安置廷讓本幽州人唐盧龍軍節度使仁恭之曽孫也祖守文襲滄州盧彦威遂據其城邀節鉞於昭宗因與之後弟守光囚其父仁恭於幽州別室守文因舉兵討之軍敗爲守光所殺廷讓與其父延進南遷焉廷讓始與上同名故改之少有勇力周祖節制魏博以中㳙從周有天下擢爲内殿直押班累遷龍捷都指揮使從丗宗征淮南以功領雷州刺史尋遷鐵騎右廂都指揮使領涪州團練使國初改龍捷右廂都指揮使領江州防禦使李筠叛上黨以廷讓爲行營先鋒使澤潞平以功授平江軍節度使侍衞馬軍都指揮使乹德中討西蜀以廷讓爲陜西路行營都部署蜀平王全斌崔彦進皆坐縱部下掠人女子玉帛左授唯廷讓所至秋毫不犯以功授陳州刺史鎮安軍節度使從征太原改澶州刺史鎮寜軍節度使上即位加檢校太尉改右驍衞上將軍雍熈三年曹彬敗於歧溝關復詔廷讓爲瀛州兵馬都部署及君子館之敗詣闕請罪上知爲李繼隆所誤不之責四年復爲雄州兵馬部署未幾以疾聞不待報擅離治所上怒下御史按其罪故有是命因怏怏不食數日行至華州卒年五十九上録其舊勲詔贈太師壬子左僕射致仕沈倫薨倫字順冝陳留太康人名上一字與上舊名下一字同倫頗精戴禮常於嵩洛間以敎授自給漢乾祐中白文珂鎭陜召致門下周丗宗即位太祖節制同州宣徽使昝居潤甞與倫厚善乃薦倫於太祖太祖辟在幕府後遷滑許宋三鎮皆爲從事及即位自睢陽召至賜五品服翌日授戸部郎中建隆三年遷給事中賜金紫爲陜西轉運使乹德中蜀平以倫爲計度制置使先是大將王全斌崔彦進等入成都也皆厚掊斂民家玉帛子女洎倫至獨居佛寺𬞞食而巳及受代歸闕篋中唯圖書數卷太祖廉知之故貶全斌等擢倫爲戸部侍郎樞密副使開寶二年太祖征太原以倫判留司事六年授中書侍郎同中書門下平章事集賢殿大學士兼判荆南劒南水陸發運等使九年太祖郊祀西洛復以倫留守上即位遷右僕射兼門下侍郎依前平章事監修國史太平興國四年上征太原又以倫爲留守判開封府事河東平進位左僕射盧多遜之敗責授工部尚書罷知政事是年秋被病請告上憐之復授左僕射致仕至是薨年七十九輟視朝兩日贈侍中追封魯國公謚曰恭惠倫純朴謹厚故車駕每出多以倫爲留守然十年相位但齷齪固寵不能有所建明性尤好釋氏雅信因果之說常盛夏祼坐室中恣蚊蚋噆其膚通夕不寐以徼福人皆笑之倫微時妻老且醜有妾田氏甚寵之及貴於太康治居第令故妻處焉遂以田氏爲魯國夫人搢紳以此非之翰林學士賈黃中等以所集神醫普救方一千卷來上賜詔曰盧扁之方雷桐之術佇之以十全之效言之於七日之前古法在焉人命所繫朕纂承大寶撫育兆人毎念夭傷思伸救療而方書舛誤編秩繁多因命分以部居條其類例黃中等思窮精詣識本䟽通集彼羣方著成千卷垂於後丗所利益多克副朕懷深嘉乃績冝加頒賚以示優恩仍宣付史館令刋板流布天下黃中等賜器幣有差丙辰出益州所進九穗禾牛生三犢圖并六眸龜以視近臣戊午以右賛善大夫程文度爲監察御史荆湖轉運副使詔建廣德軍郎歩鎮爲建平縣十一月庚申朔山南東道節度使趙普上表以耤田乞入朝詞甚懇切上憫之謂宰相曰普開國元臣朕所尊禮冝從其意癸亥兵部侍郎王祐卒祐字景叔魏郡人也父徹唐同光初與桑維翰同年登進士第授晉昌軍節度推官拜右拾遺祐少孤篤志詞學性倜儻而俊急遇事輒發中無所隱洎維翰入相祐以父同年門生裁書自陳維翰竒之禮待甚厚自是文價益重鄴帥杜重威辟爲觀察支使漢初重威叛祐責授遼州司戸參軍周有天下歷魏縣南樂二令召赴闕時楚州有滯獄累遣使不能決命祐鞫之研究其情即時具伏還奏拜監察御史出知光州轉殿中侍御史歸闕遷禮部貟外郎知制誥時方平蜀詔命填委祐致思敏速有餘力焉翰林學士陶榖見之深加歎伏遷戸部貟外郎集賢殿修撰太祖親征并門已濟河召祐謂曰上黨素爲要害之地汝爲吾暫往控制之遂知潞州踰年又知大名府太祖謂曰此卿之故郷所謂晝錦者也詔還改知襄州移知潭州所至皆理代還以本官知吏部選事及知貢舉未幾坐事出爲鎮國軍行軍司馬上即位知河中府事徴爲左司貟外郎復判大理寺知吏部選事拜中書舎人史館修撰受詔撰普照王寺碑經宿上進中外驚其神速乆之知開封府以病請告拜兵部侍郎至是卒年六十四上尤悼念賻贈加等祐之知制誥盧多遜同列多遜與宰相趙普相傾每諷祐欲與已協共擠普祐不從以爲唐宇文融嘗與張說有隙時說爲融所擯而出及說復入融遂敗祐因以融傳示多遜多遜不恱及多遜參知政事乃出祐華州後終以隂事中普普復入多遜果及禍與宇文融事正同識者以是許祐之先見上嘗詔於史館集撰神醫普救千卷中官王文壽監視其事權勢甚盛館中學士皆往謁見待之甚厚祐獨不請謁人亦以是多之有集三十卷行於丗祐死之日家無餘財搢紳稱其清儉乙丑以三司開拆推官左拾遺直史館韓國華判開拆司鹽鐵推官叚惟一度支推官朱賦戸部推官崔維翰判本部憑由司專主天下錢榖出入之數不更隷本部癸酉以主客貟外郎安德𥙿直史館庚辰詔曰王者設班爵以馭貴差禄秩以養賢所以各懋厥官共成庶務顧其禄食冝在優豐應内外文武臣僚等折支俸錢舊以八分爲十分支給自今並以實價給之癸未日南至上不受朝羣臣詣閤拜表稱賀十二月庚寅朔詔曰國家設貢舉之任懸俊造之科必在敷求取其藝實使戔戔束帛盡聘竒才一一吹竽更無濫進眷言考覈冝在精詳委於有司誠爲舊典可依往例命官知貢舉應曽取解舉人限來年三月一日巳前到京其未取解者許至秋取解辛卯詔曰冝融柳等三州部内百姓及蠻界人戸等朕纉承皇極臨御萬方覆育之恩惟恐不至矧於逺俗尤所軫懷前知州賛善大夫侯汀委以方州殊無政術不能安集但恣侵陵致此蠻夷肆爲驚擾重煩師旅始獲平寧蓋由綏輯之無方遂使黔黎之被害其侯汀已行降黜汝等冝體兹朝旨各務自安悛革前非保全舊業苟或不遵撫喻尚敢陸梁當議勦除使無遺類壬辰以翰林學士中書舎人宋白右補闕知制誥李沆同知貢舉甲午以時雪稍愆分遣宰相及近臣偏詣京城諸寺觀祈禱己亥以御製自勉五七言詩六首雜言詩一首賜近臣翰林學士知貢舉宋白等上言今進士諸科凡八千餘人其間終埸落者四百九十餘人御前落者六百八十餘人伏請應已曽解送舉人在千里内委本處重加考試發解千里外者兩京發解仍乞誡勵試官務令精覈從之壬寅詔曰應兩京及諸道擒獲劫賊獄成遇赦者隷本城軍仍廪給之先是江南轉運使許驤上言劫盜遇赦得原還本郷讎告捕者多行殺害請以隷軍故從之甲辰上幸建隆觀相國寺祈雪庚戍車駕狩於西郊行次近甸命從臣飲謂翰林學士宋白等曰可各賦臘辰從獵詩及至行宫白等以詩上至暮還宫親獲雉兎五付有司以備宗廟薦饗辛亥以戸部貟外郎胡旦知制誥癸丑詔以常潤二州隷江南道甲寅以左驍衞大將軍趙鎔知滄州兼兵馬部署山南東道節度使趙普來朝召陞殿慰撫普見上感咽流涕上亦爲之動容丁巳大雨雪近臣稱賀太宗皇帝實録卷第四十二
